  { id: 1, category: "0. 志望理由・面接", title: "なぜ九州大学の経済工学科なのか", formula: "", definition: "大学・学科選びの確固たる理由を問う質問。", oral30: "※解答なし。下のメモ欄を使って、自分だけの回答を作ってみよう！", explanation: "「なぜ他大ではなく九大か」「なぜ他学部ではなく経済工学か」の2つの軸を満たす回答を考えよう。ツール開発の経験などをフックにすると強いよ。", application: "面接の冒頭で必ず聞かれる。ここがブレるとその後の数学の出来が良くても落とされる可能性あり。", followups: [{q: "他の大学の経済学部じゃダメな理由は？", a: "（他大のカリキュラムとの違いを説明できるようメモ欄に用意しておきましょう）"}, {q: "高専の機械工学から編入する上で、これまでの学びはどう活きる？", a: "（プログラミングやデータ処理、システムの最適化といった工学的アプローチを経済分析に活かせる点を強調しましょう）"}], isImportant: true, level: "core" },
  { id: 2, category: "0. 志望理由・面接", title: "なぜ機械工学から経済学へ転換したのか", formula: "", definition: "分野変更の明確な動機を問う質問。", oral30: "※解答なし。下のメモ欄を使って、自分だけの回答を作ってみよう！", explanation: "機械工学を否定せず、「学んだからこそ次に行きたい場所が見えた」というポジティブなシフトを強調できると説得力が出るよ。", application: "「機械工学じゃダメだったの？」という少し意地悪な質問に対する完璧なカウンターになる。", followups: [{q: "具体的に、いつ、どんなきっかけでそう思ったの？", a: "（仮想通貨ツールを作った時など、具体的なエピソードを用意しましょう）"}, {q: "機械工学と経済工学で、一番似ていると感じるアプローチは何？", a: "（制約条件下での最適化や、システム全体を俯瞰する視点などを挙げると効果的です）"}], isImportant: true, level: "core" },

  { id: 4, category: "0. 志望理由・面接", title: "メカニズムデザインとは何ですか", formula: "", definition: "経済制度を設計する逆問題。", oral30: "人々が自分の利益を追求して行動した結果、社会全体にとって望ましい状態が達成されるように、最初から「ルール（仕組み）」を逆算して設計する経済学の分野です。", explanation: "九大経済工学のキーワードの一つ。通常の経済学が「ルールが与えられた時に人々がどう動くか」を予測するのに対し、メカニズムデザインは「望ましい結果を得るために、どうルールを作るか」という工学的なアプローチを取ります。", application: "制度設計への興味や、工学的なアプローチとの親和性を示すのに使える。", followups: [{q: "身近な例で、メカニズムデザインが使われている仕組みを一つ挙げてください。", a: "「オークションの制度設計や、研修医の病院配属（マッチング理論）、学校の入学選抜などです。」"}, {q: "これを工学の視点で言うと、何に近いですか？", a: "「制御工学における『システム設計』そのものだと認識しています。」"}], isImportant: true, level: "core" },

  { id: 12, category: "0. 志望理由・面接", title: "経済学部のアドミッションポリシーについて説明してください", formula: "", definition: "大学が求める学生像を理解し、自分がそれに合致しているかを示す質問。", oral30: "1つ目は基礎的な『知識・技能』、2つ目は多面的に考え自分の言葉で伝える『思考力・判断力・表現力』、3つ目は多様性を尊重し向上心を持って学ぶ『主体性・協働性』です。", explanation: "ただ暗記して言うだけでなく、「自分がこれまでの高専での活動（ツール開発など）を通じて、どのポリシーに合致する資質を磨いてきたか」をセットで語れるようにしておくと完璧。", application: "大学側とのマッチング度合い、事前準備の周到さを測られる。", followups: [{q: "この3つの中で、あなた自身が最も自信を持っているものはどれですか？", a: "（自分のガクチカや自己PRと一番つながるものを1つ選び、理由を説明しましょう）"}, {q: "逆に、今自分に一番足りないと思うポリシーはどれですか？", a: "（足りない点を素直に認めつつ、入学後にどう伸ばしたいかを語りましょう）"}], isImportant: true, level: "core" },

  // --- 第1群 微分・一変数関数 ---
  { id: 104, category: "1. 一変数微積", title: "微分とは何ですか", formula: "f'(x) = \\lim_{h \\to 0} \\frac{f(x+h) - f(x)}{h}", formulaMust: true, definition: "関数の変化の割合、接線の傾き。", oral30: "微分とは、関数の瞬間的な変化率であり、ある点での接線の傾きを表します。経済では限界費用や限界効用の分析に使われます。", explanation: "ある変数をほんの少しだけ増やしたときに、結果がどれくらい変化するかという「瞬間の変化率」を求める操作です。", application: "経済学における『限界（Marginal）』の概念そのものです。", followups: [{q: "離散的なデータしかない場合、微分の考え方をどう応用しますか？", a: "「データ同士の『差分』を取ります。例えば今日の価格から昨日の価格を引いて変化量を見ることで、微分と同じように瞬間のトレンドを捉えることができます」"}], isImportant: true, level: "core", trap: true },
  { id: 108, category: "1. 一変数微積", title: "最大値と最小値はどう判断しますか", formula: "f'(x) = 0, \\quad f''(x) > 0 \\text{ (Min)}", definition: "微分が0になる点とその前後の変化。", oral30: "まず1階微分が0になる点（停留点）を探します。その上で、2階微分がプラスなら下に凸なので最小値（谷）、マイナスなら上に凸なので最大値（山）と判定します。", explanation: "傾きが0で平らになる点を探し、それが山か谷かを二階微分の符号で確かめます。", application: "利益関数の最大化やコスト関数の最小化という最適化問題の基本アプローチです。", followups: [{q: "微分が0でも、最大でも最小でもない点は存在しますか？", a: "「はい、$y=x^3$ の原点のように、傾きは一瞬0になりますが、そのままさらに上がっていくような点（変曲点）が存在します」"}, {q: "グラフの端っこにある最大・最小値は微分で見つけられますか？", a: "「見つけられません。微分で探せるのはあくまで曲線の『山と谷』なので、定義域の境界（端っこ）の値は直接代入して計算・比較する必要があります」"}], isImportant: false, level: "core" },
  { id: 114, category: "1. 一変数微積", title: "合成関数の微分（チェインルール）", formula: "\\frac{dy}{dx} = \\frac{dy}{du} \\cdot \\frac{du}{dx}", definition: "関数の中に関数が入っている場合の微分ルール。", oral30: "「xが動けばuが動き、uが動けばyが動く」といった連鎖的な変化を、それぞれの微分の掛け算として求める計算ルールです。", explanation: "マトリョーシカのような関数の変化率を、外側から順に微分して掛け合わせることで求めます。", application: "「原油価格が上がると物流コストが上がり、最終的な物価が上がる」といった連鎖的影響を追う時に使います。", followups: [{q: "経済のデータ分析で、連鎖的な影響を計算した経験はありますか？", a: "（自分が開発した仮想通貨分析ツールで、複数の指標がどう価格に影響するかを計算した経験などを語りましょう）"}, {q: "多変数の場合にこれを拡張するとどうなりますか？", a: "「全微分の考え方を使って、各変数ルートの偏微分と連鎖律を掛け合わせたものをすべて足し合わせる形になります」"}], isImportant: false, level: "core" },
  { id: 115, category: "1. 一変数微積", title: "ロピタルの定理とは何ですか", formula: "\\lim_{x \\to a} \\frac{f(x)}{g(x)} = \\lim_{x \\to a} \\frac{f'(x)}{g'(x)}", definition: "不定形の極限を、微分を用いて求める定理。", oral30: "「0分の0」や「無限大分の無限大」といった不定形の極限を求める際に、分母と分子をそれぞれ微分してから極限をとっても、元の極限値と一致するという定理です。", explanation: "計算が難しい極限を、微分の力を使って簡単に解くための強力なツールです。ただし、適用条件（不定形であることなど）をしっかり確認する必要があります。", application: "複雑な経済モデルにおいて、パラメータが極端な値をとった場合の漸近的な挙動を調べる際に使われます。", followups: [{q: "ロピタルの定理を使ってはいけないのはどんな時ですか？", a: "「分母と分子の極限が『不定形（0/0や∞/∞）』になっていない時に使うと、全く違う間違った値になってしまいます。」"}], isImportant: false, level: "core" },

  // --- 第2群 多変数・最適化 ---
  { id: 201, category: "2. 多変数・最適化", title: "偏微分とは何ですか", formula: "f_x = \\frac{\\partial f}{\\partial x}", formulaMust: true, definition: "1つの変数だけを動かす微分。", oral30: "複数の要因がある関数において、他のすべての要因を一定に固定し、ある1つの要因だけを微小に動かした際の変化率を求める操作です。", explanation: "特定の要因が結果に与える『純粋な影響』を切り分けて知りたい時に使います。", application: "経済学の基本である『他の条件を一定とした場合（Ceteris Paribus）』の分析そのものです。", followups: [{q: "労働と資本で生産量が決まる時、労働で偏微分したものは何と呼ばれますか？", a: "「『限界労働生産力』です。資本を固定して、労働を1単位増やした時にどれくらい生産量が増えるかを表します」"}], isImportant: true, level: "core" },
  { id: 203, category: "2. 多変数・最適化", title: "勾配とは何ですか", formula: "\\nabla f = \\left( \\frac{\\partial f}{\\partial x_1}, \\dots, \\frac{\\partial f}{\\partial x_n} \\right)", formulaMust: true, definition: "各変数での偏微分を並べたベクトル。", oral30: "各変数での偏微分を並べたベクトルであり、関数が『最も急激に増加する方向』を示すベクトルです。", explanation: "すべての方向に対する傾きの情報をまとめたものです。山の斜面で『どの方向にどれくらいキツいか』を示す矢印です。", application: "機械学習などにおいて、関数を最も効率よく最大化（または最小化）する方向を決定するナビとして機能します。", followups: [{q: "逆に、最も急激に減少する方向を見つけるにはどうすればいい？", a: "「勾配ベクトルの逆向き、つまりマイナスをつけた方向へ進めば、最も急に下ることができます」"}, {q: "勾配ベクトルは、関数の等高線に対してどのような角度を持ちますか？", a: "「等高線に対して常に『垂直（90度）』になります。等高線に沿って動いても高さは変わらないので、一番早く高さを変えるには直角に進むのが最短だからです」"}], isImportant: true, level: "core", trap: true },
  { id: 209, category: "2. 多変数・最適化", title: "全微分とは何ですか", formula: "df = \\frac{\\partial f}{\\partial x} dx + \\frac{\\partial f}{\\partial y} dy", definition: "すべての変数が同時に微小変化したときの総変化量。", oral30: "偏微分が「1つだけ動かす」のに対し、全微分は「すべての変数が同時にほんの少しずつ動いた時の、結果全体の総変化量」を足し合わせたものです。", explanation: "各方向の偏微分（傾き）に、それぞれの実際の微小変化量（dx, dy）を掛けて足し合わせたものになります。", application: "複数の経済的ショックが同時に起きた時の、全体としての市場への影響を計算するのに使います。", followups: [{q: "全微分が0になる方程式（全微分方程式）を見たことはありますか？", a: "「はい、完全微分方程式のことですね。ポテンシャルが存在する物理や経済のシステムを解く際に使われます」"}], isImportant: false, level: "core" },
  { id: 210, category: "2. 多変数・最適化", title: "ヘッセ行列とは何ですか", formula: "H = \\begin{pmatrix} f_{xx} & f_{xy} \\\\ f_{yx} & f_{yy} \\end{pmatrix}", formulaMust: true, definition: "多変数関数のすべての2階偏微分を並べた行列。", oral30: "多変数関数のすべての2階偏微分を成分として並べた正方行列です。その地点が山の頂上なのか、谷底なのか、あるいは鞍点なのかという「関数の形状」を判定するために使います。", explanation: "1変数の「二階微分（曲がり具合）」を多変数の空間に拡張したもので、最適化の仕上げの判定に必須です。", application: "最適化問題を解いたときに、そこが本当に利益最大化（またはコスト最小化）の点なのかを判定します。", followups: [{q: "ヘッセ行列の行列式がプラスで、f_xxもプラスなら、そこは最大値？最小値？", a: "「最小値（谷底）になります。」"}, {q: "ヘッセ行列は通常、何行列になりますか？", a: "「対称行列です。微分する順番を入れ替えても結果が同じになる（$f_{xy} = f_{yx}$）ため、対角線を挟んで対象な形になります」"}], isImportant: true, level: "core" },
  { id: 212, category: "2. 多変数・最適化", title: "凸最適化とは何ですか", formula: "f(tx + (1-t)y) \\le t f(x) + (1-t) f(y)", definition: "凸関数を最小化する、確実に解が求まる問題。", oral30: "目的関数がお椀のような形（凸関数）をしていて、極小値が必ず全体の最小値（大域的最小値）に一致するという、数学的に非常に解きやすい最適化問題のことです。", explanation: "どんな場所からスタートしても、坂を下っていけば確実に一番底にたどり着けるため、機械学習などで好まれる性質です。", application: "ポートフォリオ最適化や最小二乗法など、実用的なデータ分析のモデルの多くが凸最適化に帰着するように設計されています。", followups: [{q: "逆に、凸ではない（凹凸が入り組んだ）関数の場合、どんな問題が起きますか？", a: "「局所的最小値（小さな谷底）にハマってしまい、全体での本当の最小値（大域的最小値）が見つけられないという問題が起きます」"}, {q: "局所的最小値と大域的最小値の違いは何ですか？", a: "「局所的はその周辺での一番の底、大域的は定義域全体での本当の一番の底のことです。」"}], isImportant: false, level: "advanced" },
  { id: 213, category: "2. 多変数・最適化", title: "ヤコビアン（ヤコビ行列式）とは何ですか", formula: "J = \\det \\begin{pmatrix} \\frac{\\partial x}{\\partial u} & \\frac{\\partial x}{\\partial v} \\\\ \\frac{\\partial y}{\\partial u} & \\frac{\\partial y}{\\partial v} \\end{pmatrix}", definition: "変数変換に伴う、面積や体積の「拡大・縮小の倍率」。", oral30: "複数の変数を別の座標系に変換する際、元の微小な面積や体積が、新しい座標系で「どれくらい拡大・縮小されるか」という歪みの倍率を表す行列式のことです。", explanation: "重積分などで変数を置き換えるとき、面積のつじつまを合わせるために掛け合わせる補正値です。", application: "統計学において、複雑な確率分布を変数変換して扱いやすくする際（正規分布の証明など）に必須の処理となります。", followups: [{q: "直交座標 (x,y) から極座標 (r,θ) に変換する際のヤコビアンはどうなりますか？", a: "「計算すると r になります。そのため重積分の dxdy は r dr dθ に変わります。」"}], isImportant: false, level: "advanced" },
  { id: 214, category: "2. 多変数・最適化", title: "陰関数定理とは何ですか", formula: "\\frac{dy}{dx} = - \\frac{F_x}{F_y}", formulaMust: true, definition: "方程式をyについて解かずに、微分の値（傾き）を求める定理。", oral30: "F(x,y)=0 という方程式をわざわざ y=... の形（陽関数）に解き直さなくても、元の関数Fをxとyでそれぞれ偏微分した値の比から、直接 dy/dx（傾き）を求められるという強力な定理です。", explanation: "経済学では「効用関数を一定（U=定数）」としたまま、x財とy財の交換比率（限界代替率）を求める際などに、この定理が無意識に使われています。", application: "比較静学（あるパラメータが変化した時に均衡がどう動くか）の分析において、複雑な連立方程式の微小変化を追うための必須ツールです。", followups: [{q: "この定理を使うための条件（分母に関する条件）は何ですか？", a: "「分母にくる yでの偏微分 F_y が、その点で 0 でないことです（0割りを防ぐため）。」"}], isImportant: true, level: "core", trap: true },

  // --- 第3群 ラグランジュ未定乗数法 ---
  { id: 301, category: "3. ラグランジュ", title: "ラグランジュ未定乗数法", formula: "L(x, y, \\lambda) = f(x, y) - \\lambda g(x, y)", formulaMust: true, definition: "制約条件のもとで極値を求める手法。", oral30: "「予算」などの制約条件がある中で、目的の関数を最大化・最小化するための数学的手法です。新しい変数λを使って、制約付きの問題を制約なしの問題に変換して解きます。", explanation: "制約関数g(x,y)=0を、ペナルティ項として目的関数に組み込むことで、連立方程式として解けるようにします。", application: "限られた予算で満足度（効用）を最大化する消費者行動の分析に必須です。", followups: [{q: "これを解く際、Lをどの変数で偏微分して0とおきますか？", a: "「$x, y$ に加えて、設定した $\\lambda$ の3つすべてで偏微分して0とおき、連立方程式を解きます。$\\lambda$で偏微分した式は、元の制約条件そのものになります」"}], isImportant: true, level: "core" },
  { id: 304, category: "3. ラグランジュ", title: "λ（ラグランジュ乗数）の意味は？", formula: "\\lambda = \\frac{\\partial f^*}{\\partial c}", formulaMust: true, definition: "制約を1単位緩めたときの目的関数の増加量。", oral30: "λは「影の価格」とも呼ばれ、制約（予算など）を1単位緩めたときに、目的関数の最大値が限界的にどれだけ増えるかを表す価値の指標です。", explanation: "ただの計算上の係数ではなく、「あと1円予算が増えたら、どれくらい利益が増えるか」という経営指標として直接使えます。", application: "リソースを追加投入したときの費用対効果を示すため、経営判断に直結する重要な数値です。", followups: [{q: "λ=0になった場合、その制約はどういう状態だと言えますか？", a: "「その制約が全く足かせになっていない、例えば予算が余っていて使い切っていない状態です」"}, {q: "環境問題などで、この「影の価格」の考え方はどう使われますか？", a: "「二酸化炭素の排出枠（制約）の『影の価格』を計算することで、排出権取引における適切な価格設定などに直接応用されます。」"}], isImportant: true, level: "core", trap: true },

  // --- 第4群 テイラー展開 ---
  { id: 401, category: "4. テイラー展開", title: "テイラー展開とは何ですか", formula: "f(x) \\approx \\sum_{n=0}^{k} \\frac{f^{(n)}(a)}{n!} (x-a)^n", formulaMust: true, definition: "関数を多項式で近似する手法。", oral30: "複雑な関数を、特定の点の周辺で「xのべき乗（多項式）」の足し算に展開して近似する手法です。計算機で扱いやすい形に直すために使われます。", explanation: "sinやexpなどのそのままでは計算しづらい曲線を、一次（接線）や二次（放物線）の式に落とし込んで解析します。", application: "非線形の経済モデルを線形化したり、リスク管理で価格変動を近似計算する際に多用されます。", followups: [{q: "展開する中心の点を x=0 とした特別なテイラー展開を何と呼びますか？", a: "「マクローリン展開です」"}], isImportant: true, level: "core", trap: true },
  { id: 411, category: "4. テイラー展開", title: "ニュートン法とは何ですか", formula: "x_{n+1} = x_n - \\frac{f(x_n)}{f'(x_n)}", definition: "方程式の解（f(x)=0）を反復計算で探すアルゴリズム。", oral30: "方程式の解を求めるために、ある点での接線を引き、その接線とx軸との交点を次の候補とする計算を繰り返して、徐々に真の解に近づけていく数値計算の手法です。", explanation: "裏側では関数を一次近似（テイラー展開の1次まで）して、直線の方程式の解を求める操作を繰り返しています。", application: "解析的に解けない複雑な方程式の解や、最適化問題（微分の値が0になる点）をコンピュータで高速に見つけ出すアルゴリズムです。", followups: [{q: "ニュートン法が上手く解にたどり着けない（発散してしまう）のはどんなケースですか？", a: "「スタート地点が本当の解から遠すぎる場合や、途中で関数の傾き（微分）が0に近くなって接線が平行になり、次の点が飛んでいってしまうようなケースです」"}], isImportant: false, level: "core" },
  { id: 412, category: "4. テイラー展開", title: "マクローリン展開の具体例 (e^x, sin x, cos x)", formula: "e^x = 1 + x + \\frac{x^2}{2!} + \\dots \\quad \\sin x = x - \\frac{x^3}{3!} + \\dots", formulaMust: true, definition: "x=0を中心としたテイラー展開の代表的な公式。", oral30: "e^x は微分しても形が変わらないため全項がプラスで階乗がつき、sin は奇関数なので奇数乗のみ、cos は偶関数なので偶数乗のみが現れ、それぞれ符号が交互に入れ替わります。", explanation: "この3つはホワイトボードでサラッと書けるようにしておくことが必須です。e^x に ix を代入するとオイラーの公式が導ける点までセットで覚えておくと面接で強いです。", application: "複雑な関数の計算を四則演算に落とし込む際の基本中の基本です。", followups: [{q: "cos x の展開式をホワイトボードに書いてみてください。", a: "「1 - (x^2 / 2!) + (x^4 / 4!) - ... となります。（偶数乗のみで符号が交互）」"}, {q: "なぜ sin x の展開式には奇数乗しか出てこないのですか？", a: "「sin x は原点対称な奇関数であり、何回微分しても x=0 での偶数階の微分係数がすべて0になるためです。」"}], isImportant: true, level: "core", trap: true },
  { id: 413, category: "4. テイラー展開", title: "テイラー展開の「剰余項」とは何ですか", formula: "f(x) = P_n(x) + R_n(x)", definition: "多項式近似した際の「誤差」を表す項。", oral30: "テイラー展開を途中のn次で打ち切った場合に、実際の関数の値と、近似した多項式の値との間に生じる「誤差」の部分のことです。", explanation: "テイラー展開は「無限に足せば完全に一致」しますが、現実には途中で打ち切ります。その際、「この近似はどれくらい正確か（誤差は最大でどれくらいか）」を保証するために剰余項を評価します。", application: "シミュレーションや数値計算において、計算結果が信頼できる範囲にあるかを証明するために使われます。", followups: [{q: "代表的な剰余項の形（〇〇の剰余項）を一つ挙げてください。", a: "「ラグランジュの剰余項です。微分の中間値の定理の応用のような形で表されます。」"}], isImportant: false, level: "advanced" },

  // --- 第5群 線形代数 ---
  { id: 509, category: "5. 線形代数", title: "連立方程式と Ax=b の関係", formula: "A\\mathbf{x} = \\mathbf{b}", formulaMust: true, definition: "連立方程式の行列表現。", oral30: "複数の連立方程式を、「係数行列A」というシステムに「未知の状態x」を入れたら「結果b」が出た、という1つの行列表現にまとめたものです。", explanation: "バラバラの式をベクトルと行列で一括りにすることで、逆行列を使った全体最適解の計算が一発で可能になります。", application: "複雑な需要・供給の均衡モデルを解く際、変数が増えてもコンピュータで瞬時に計算できる基盤になります。", followups: [{q: "この形式のメリットは、未知数xが何百個に増えてもどうなることですか？", a: "「行列のサイズが大きくなるだけで、$A^{-1}b$ という逆行列を使った解の導き方は全く変わりません。そのため、コンピュータで一気に計算するのに非常に適しています」"}, {q: "逆行列A^-1が存在する場合、解xはどうやって求まりますか？", a: "「$A^{-1}$ を両辺の左から掛けて、$x = A^{-1}b$ で一発で求まります。」"}], isImportant: true, level: "core" },
  { id: 512, category: "5. 線形代数", title: "行列式とは何ですか", formula: "\\det(A) = |A|", definition: "空間の拡大・縮小率。", oral30: "行列による変換を行ったときに、元の空間の面積や体積が「何倍に拡大・縮小されるか」を示すスカラー値です。", explanation: "行列式が0の場合、空間がペチャンコに潰れて次元が下がってしまったことを意味し、逆行列を持たなくなります。", application: "データ分析において、変数間に無駄な重複がなく、システムとして正しく解けるかを判定するチェッカーになります。", followups: [{q: "行列式がマイナスの値になった場合、図形的にはどういう状態ですか？", a: "「空間が裏返しに反転した状態です。鏡写しになったようなイメージです」"}, {q: "固有値と行列式の間には、どんな関係（公式）がありますか？", a: "「行列式は、その行列が持つすべての固有値を掛け合わせた値に等しくなります。」"}], isImportant: false, level: "core" },
  { id: 517, category: "5. 線形代数", title: "固有値とは何ですか", formula: "A\\mathbf{x} = \\lambda \\mathbf{x}", formulaMust: true, definition: "ベクトルの向きを変えない変換の倍率。", oral30: "行列変換において、向きが変わらず長さだけが変化するベクトルの『倍率（スカラー）』のことであり、そのシステム固有の振る舞いを表す値です。", explanation: "固有ベクトルというブレない軸に沿って、どれだけのパワー（固有値）で伸縮するかを表します。", application: "主成分分析で「どの軸がデータの情報を一番多く持っているか」を評価する際や、動学モデルの安定性を測る指標になります。", followups: [{q: "固有値を求めるための方程式（特性方程式）を式で言えますか？", a: "「$\\det(A - \\lambda I) = 0$ です。」"}, {q: "固有値に1つでも「0」が含まれていると、その行列の逆行列はどうなりますか？", a: "「行列式はすべての固有値の掛け算なので、1つでも0があると行列式全体も0になります。つまり、空間が潰れてしまうため逆行列は存在しません」"}], isImportant: true, level: "core", trap: true },
  { id: 526, category: "5. 線形代数", title: "ランク（階数）が落ちると何が起こるか", formula: "\\text{rank}(A) < n", definition: "行列の持つ独立な情報量が不足している状態。", oral30: "行列のランクが変数の数より落ちている場合、方程式の中に無駄な重複（線形従属）が含まれており、解が1つに決まらなくなる（無数にあるか解なしになる）状態が起きます。", explanation: "ランクはその行列が持つ「実質的な情報量」です。変数が3つあるのにランクが2しかない場合、情報不足で答えは出ません。", application: "データを分析する際、多重共線性（マルチコ）が起きていてパラメータが特定できないというエラーの根本原因です。", followups: [{q: "ランクが落ちている正方行列の「行列式」の値はいくつになりますか？", a: "「0になります。独立な次元が減ってペチャンコになっているからです」"}, {q: "データ分析でこの状態に陥った場合、どう対処しますか？", a: "「多重共線性を疑い、相関が高すぎる変数の片方を削るか、主成分分析などで次元を圧縮して対応します。」"}], isImportant: false, level: "core" },
  { id: 527, category: "5. 線形代数", title: "内積とは何ですか", formula: "\\mathbf{a} \\cdot \\mathbf{b} = |\\mathbf{a}||\\mathbf{b}|\\cos\\theta", formulaMust: true, definition: "2つのベクトルが同じ方向を向いている度合い。", oral30: "内積とは、片方のベクトルにもう片方のベクトルを射影した（影を落とした）長さの掛け算であり、2つのデータがどれくらい似た方向を向いているかを示すスカラー値です。", explanation: "内積が0であれば、なす角が90度（直交）となり、互いに全く影響を与えない無関係なデータ同士であると言えます。", application: "統計学における「共分散」や「相関係数」は、データをベクトルと見なした時の内積そのものです。", followups: [{q: "では、内積が「マイナス」になるのは、ベクトルがどんな角度の時ですか？", a: "「なす角が90度より大きい、鈍角の時です。お互いに逆の方向を向き始めている状態です」"}], isImportant: true, level: "core" },
  { id: 528, category: "5. 線形代数", title: "コーシー・シュワルツの不等式", formula: "|\\mathbf{a} \\cdot \\mathbf{b}| \\le |\\mathbf{a}||\\mathbf{b}|", definition: "内積の絶対値は、各ベクトルの長さの積以下になるという法則。", oral30: "2つのベクトルの内積の大きさは、それぞれのベクトルの長さを掛け合わせたものより常に小さくなるか等しい、という線形代数の強力な不等式です。", explanation: "内積の公式に現れる cosθ が必ず -1 から 1 の間に収まることから直感的に導かれます。", application: "統計学において、相関係数が必ず「-1 から 1 の間に収まる」ことの数学的な証明にそのまま使われます。", followups: [{q: "この不等式で「等号（＝）」が成り立つのは、2つのベクトルがどんな関係の時ですか？", a: "「2つのベクトルが全く同じ方向を向いている、つまり平行（一方がもう一方の定数倍）の時です」"}, {q: "これを確率変数 X, Y の期待値の形で表すとどうなりますか？", a: "「$E[XY]^2 \\le E[X^2]E[Y^2]$ という形になります。」"}], isImportant: false, level: "core" },
  { id: 529, category: "5. 線形代数", title: "正定値行列とは何ですか（軽く）", formula: "\\mathbf{x}^T A \\mathbf{x} > 0 \\quad (\\mathbf{x} \\neq \\mathbf{0})", definition: "どんなゼロでないベクトルを掛けても、結果が必ずプラスになる行列。", oral30: "どんなベクトルを掛けても二次形式が必ずプラスになる行列のことです。多変数関数の最適化において、ヘッセ行列が正定値であれば、そこが「最小値（谷底）」であると判定できます。", explanation: "1変数の「二階微分がプラス（下に凸）」という概念を、多変数（行列）に拡張したものです。", application: "最適化問題での最小値の判定条件として必須の概念です。", followups: [{q: "逆に、結果が必ずマイナスになる行列を何と呼びますか？", a: "「負定値行列です。」"}, {q: "正定値行列の固有値は、どのような値になりますか？", a: "「すべてプラス（正の実数）になります。」"}], isImportant: false, level: "core" },
  { id: 530, category: "5. 線形代数", title: "行列の対角化とは何ですか", formula: "P^{-1}AP = \\begin{pmatrix} \\lambda_1 & 0 \\\\ 0 & \\lambda_2 \\end{pmatrix}", definition: "行列を、固有値が対角線に並んだ扱いやすい行列に変換すること。", oral30: "正方行列Aに対して、正則行列Pを用いて P^{-1}AP の形にし、対角成分に固有値が並ぶ「対角行列」に変換する操作です。Aがn個の一次独立な固有ベクトルを持つことが条件です。", explanation: "対角行列になると、行列のn乗の計算が単なる各成分のn乗になり、計算が劇的に簡単になります。過去問でも『対角化の条件』が頻出しています。", application: "マルコフ連鎖などで「n年後の状態」といった行列の累乗を計算する際や、微分方程式のシステムを解く際に必須となるテクニックです。", followups: [{q: "対角化できるための必要十分条件は何ですか？", a: "「n次正方行列が、n個の『一次独立な』固有ベクトルを持つことです。」"}, {q: "固有値に重複がある（重解を持つ）場合、必ず対角化できませんか？", a: "「いいえ、重解を持っていても、その固有値に対応する固有ベクトルが複数（重解の数だけ）存在して一次独立であれば対角化可能です。」"}], isImportant: true, level: "core" },
  { id: 531, category: "5. 線形代数", title: "対称行列の対角化（直交対角化）", formula: "P^T A P = D \\quad (P^T = P^{-1})", formulaMust: true, definition: "対称行列は必ず直交行列を用いて対角化できるという性質。", oral30: "元の行列Aが『対称行列（転置しても元のまま）』である場合、必ず対角化が可能であり、さらに変換に使う行列Pを『直交行列』として選ぶことができるという非常に強力な定理です。", explanation: "対称行列の固有値はすべて『実数』になり、異なる固有値に対応する固有ベクトルは必ず『直交する』という美しい性質を持っています。試験で対称行列が出たらボーナス問題です。", application: "統計学における分散共分散行列（対称行列）の主成分分析において、データを無相関な直交軸に回転させる基礎理論となります。", followups: [{q: "直交行列とはどのような行列ですか？", a: "「転置行列が逆行列と等しくなる（P^T = P^-1）行列のことです。図形的には『回転』や『反転』を表し、ベクトルの長さを変えません。」"}], isImportant: true, level: "core", trap: true },
  { id: 532, category: "5. 線形代数", title: "ケイリー・ハミルトンの定理", formula: "A^2 - (a+d)A + (ad-bc)I = O", definition: "行列自身が、自分の特性方程式を満たすという定理。", oral30: "行列の固有値を求めるための『特性方程式』の変数を、行列そのものに置き換えても、結果が零行列になるという定理です。主に行列の累乗や逆行列を素早く計算するのに使います。", explanation: "2×2行列の場合は上記の公式になります。n次行列にも拡張でき、「行列の高次式を、低次式に次数下げする」ための強力なテクニックです。", application: "対角化が面倒な場合や、対角化できない行列の累乗を計算する際の裏技的なアプローチとして機能します。", followups: [{q: "この定理を使って、正則行列Aの逆行列 A^-1 をどうやって求めますか？", a: "「定理の式 $A^2 - (a+d)A + (ad-bc)I = O$ の両辺に $A^{-1}$ を掛け、$A^{-1} = \\dots$ の形に変形して求めます。」"}], isImportant: false, level: "core" },

  // --- 第6群 最小二乗・回帰 ---
  { id: 601, category: "6. 最小二乗・回帰", title: "最小二乗法とは何ですか", formula: "S = \\sum_{i=1}^n (y_i - (ax_i + b))^2 \\to \\min", formulaMust: true, definition: "誤差の二乗和を最小にする直線を引く手法。", oral30: "実際のデータと予測モデルとのズレ（誤差）を二乗して足し合わせたものを最も小さくするような、最適なパラメータ（直線など）を求める計算手法です。", explanation: "二乗することでプラスマイナスの相殺を防ぎつつ、大きな誤差に重いペナルティを与え、かつ微分がしやすいというメリットがあります。", application: "回帰分析のモデルを作る際の、最も標準的で強力な計算アルゴリズムです。", followups: [{q: "なぜ『絶対値』ではなく『二乗』を使うのですか？", a: "「絶対値はV字型のグラフになって底が尖るため微分がしづらいですが、二乗なら綺麗な放物線（二次関数）になるため、微分して0とおいて最小値を求めるのが非常に簡単だからです」"}, {q: "誤差関数を最小化するために、具体的にどんな数学の操作（微分）をしますか？", a: "「誤差関数を各パラメータ（傾きや切片）でそれぞれ偏微分し、すべてを0とおいた連立方程式（正規方程式）を解きます。」"}], isImportant: true, level: "core" },
  { id: 609, category: "6. 最小二乗・回帰", title: "回帰分析と最小二乗法の違い", formula: "", definition: "分析の目的と、そのための計算手段。", oral30: "「回帰分析」は変数間の関係性をモデル化して予測や要因分析を行うという「目的」であり、「最小二乗法」はその直線を引くための「計算手段（アルゴリズム）」の1つです。", explanation: "家を建てる（回帰分析）ための、トンカチ（最小二乗法）という関係性です。", application: "実務では、データの特徴によって最小二乗法以外のトンカチ（他の推定法）を使うこともあります。", followups: [{q: "回帰分析における「説明変数」と「目的変数」の違いを説明してください。", a: "「説明変数は原因となる変数（x）、目的変数は結果として予測したい変数（y）です。」"}, {q: "最小二乗法は外れ値（異常なデータ）に対して強いですか？弱いですか？", a: "「弱いです。誤差を二乗して評価するため、1つでも遠く離れた外れ値があると、その二乗のペナルティが大きくなりすぎて、直線全体がそっちに引っ張られてしまいます」"}], isImportant: false, level: "core" },
  { id: 611, category: "6. 最小二乗・回帰", title: "相関と因果の違い", formula: "", definition: "連動することと、原因・結果であることの違い。", oral30: "「相関」は2つのデータが一緒に動く傾向のことですが、「因果」はAが原因でBが起きたという明確な理由付けのことです。相関があるからといって因果があるとは限りません。", explanation: "例えば「広告費」と「売上」に正の相関があっても、広告の効果で売上が上がった（因果）のか、売上が良い時期だから広告を多く出せた（逆の因果）のかは式だけでは分かりません。", application: "データ分析の「見せかけの相関」に騙されて、誤ったビジネスの意思決定をしないために最も警戒すべき概念です。", followups: [{q: "広告費と売上の背後にあるかもしれない、第3の要因（交絡因子）の例を挙げられますか？", a: "「例えば『季節』や『ボーナス月』です。ボーナス月だから売上が上がり、同時に広告費も多く投入していただけで、直接の因果はないというケースが考えられます」"}, {q: "因果関係を正しく証明するためには、実務でどんなアプローチをとりますか？", a: "「ランダム化比較試験（A/Bテスト）を行ったり、操作変数法などの統計的因果推論の手法を用いて、純粋な効果を切り分けます。」"}], isImportant: true, level: "core", trap: true },

  // --- 第7群 確率統計 ---
  { id: 702, category: "7. 確率・統計", title: "期待値とは何ですか", formula: "E[X] = \\sum x_i P(x_i)", formulaMust: true, definition: "確率を考慮した平均値。", oral30: "起こりうるすべての結果に対して、それぞれの確率を掛けて足し合わせた「平均的に期待される見込みの値」のことです。", explanation: "宝くじで「1枚買ったら平均していくら戻ってくるか」という数値です。", application: "投資案件を評価する際、リターンの期待値がプラスかマイナスかで、その投資を実行すべきかの基準になります。", followups: [{q: "期待値がマイナスの投資やゲームに参加する合理的な理由はありますか？", a: "「保険がその代表例です。期待値としては損をしますが、万が一の莫大な損失（家が燃えるなど）を回避するために、安心という価値を買っています」"}, {q: "確率変数の定数倍 aX の期待値 E[aX] はどう変形できますか？", a: "「定数aはそのまま外に出せるので、$aE[X]$ となります。」"}], isImportant: true, level: "core" },
  { id: 703, category: "7. 確率・統計", title: "分散とは何ですか", formula: "V[X] = E[(X - \\mu)^2] = E[X^2] - (E[X])^2", formulaMust: true, definition: "平均からの散らばり度合い。", oral30: "データが平均値（期待値）からどれくらい散らばっているか、ブレているかを示す指標です。", explanation: "平均との差を二乗して平均をとることで計算されます。これをルートに戻したものが標準偏差です。", application: "金融工学において「分散＝リスクの大きさ」です。同じ期待値でも、分散が大きい資産ほどハイリスクと見なされます。", followups: [{q: "分散を計算する時、なぜ平均との差を「二乗」するのですか？", a: "「そのまま足すと、プラスとマイナスのブレが相殺して必ず0になってしまうからです。二乗することで全てプラスになり、かつ計算（微分など）がしやすくなります」"}, {q: "分散の公式 E[X^2] - (E[X])^2 を口頭で説明できますか？", a: "「『二乗の平均』から『平均の二乗』を引いたもの、と覚えられます。」"}], isImportant: true, level: "core" },
  { id: 705, category: "7. 確率・統計", title: "条件付き確率とは何ですか", formula: "P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}", definition: "ある事象が起こったという前提の下で、別の事象が起こる確率。", oral30: "「事象Bがすでに起こった」という新しい情報（条件）が与えられた時に、事象Aが起こる確率のことです。ベイズの定理の基礎になります。", explanation: "全体の確率の中で考えるのではなく、前提条件によって絞り込まれた世界の中で確率を計算し直す概念です。", application: "特定の経済指標が悪化したという条件下で、株価が暴落するリスクを評価するような実践的な分析で使います。", followups: [{q: "ベイズの定理を条件付き確率を使って説明できますか？", a: "「$P(B|A) = \\frac{P(A|B)P(B)}{P(A)}$ です。新しい情報が入ったときに事後確率をアップデートするために使います。」"}, {q: "事象AとBが独立の場合、P(A|B) はどうなりますか？", a: "「ただの $P(A)$ になります。Bが起こったという情報が、Aの確率に一切影響を与えないからです」"}], isImportant: true, level: "core" },
  { id: 711, category: "7. 確率・統計", title: "正規分布とはどんな分布ですか", formula: "f(x) = \\frac{1}{\\sqrt{2\\pi\\sigma^2}} e^{-\\frac{(x-\\mu)^2}{2\\sigma^2}}", formulaMust: true, definition: "自然界に最もよく現れる釣鐘型の分布。", oral30: "平均を中心に左右対称な釣鐘型を描く確率分布です。自然界や社会データの誤差など、多くの現象が最終的にこの分布に近似できるため統計学の主役です。", explanation: "「平均」と「分散（標準偏差）」の2つのパラメータだけで、グラフの形が完全に決定されます。", application: "データ分析や金融工学の多くが、「データの誤差や価格の変動は正規分布に従う」という前提で計算式を組んでいます。", followups: [{q: "正規分布において、平均±1標準偏差(1σ)の中にデータ全体の約何％が収まりますか？", a: "「約68%です。ちなみに2σの中には約95%が収まります」"}, {q: "現実の株価の変動は、綺麗な正規分布と比べてどんな違いがありますか？", a: "「現実の市場では、極端な暴落や暴騰が正規分布の予測よりも頻繁に起きる『ファットテール（裾野が厚い）』という特徴があります。」"}], isImportant: true, level: "core" },
  { id: 713, category: "7. 確率・統計", title: "大数の法則と中心極限定理の違い", formula: "\\bar{X} \\to \\mu, \\quad Z \\to N(0,1)", definition: "サンプルサイズを大きくした時の、平均値の「近づき先」と「分布の形」。", oral30: "『大数の法則』は、サンプルを増やすと標本平均が真の平均（母平均）に限りなく近づくという法則です。『中心極限定理』は、元のデータがどんな分布であっても、サンプルを足し合わせた平均の「分布の形」が、正規分布に近づくという定理です。", explanation: "「どこに近づくか（値）」を保証するのが大数、「どんな形になるか（分布）」を保証するのが中心極限定理です。統計的推測はこの2大定理の上に成り立っています。", application: "アンケート調査や製品検査で、一部のサンプル（標本）から全体（母集団）の性質を確率的に推測して意思決定する際の根拠となります。", followups: [{q: "サイコロを振る回数を増やすとどうなるか、この2つの定理を使って説明して", a: "「大数の法則により、出た目の平均値は次第に3.5に近づきます。さらに中心極限定理により、その『平均値のばらつき方（ヒストグラム）』を描くと、3.5を中心とした綺麗な釣鐘型（正規分布）になります。」"}], isImportant: true, level: "core" },
  { id: 714, category: "7. 確率・統計", title: "推定量の一致性と不偏性の違い", formula: "E[\\hat{\\theta}] = \\theta \\quad (\\text{不偏})", definition: "良い推定量の持つべき2つの性質。", oral30: "『不偏性』は、推定量の期待値（平均的な結果）が真の値に一致すること、つまり「偏りがない」ことです。『一致性』は、サンプルサイズを無限に大きくすれば、推定量が真の値そのものに限りなく近づく（大数の法則が成り立つ）性質です。", explanation: "ダーツに例えると、不偏性は「たくさん投げた重心が真ん中にある（けどバラけているかも）」、一致性は「投げる回数を増やすほど、矢が真ん中に一点集中していく」というイメージです。", application: "回帰分析などで使われる最小二乗推定量は、この「不偏性」と「一致性（および有効性）」を満たす最良の推定量（BLUE）であることが証明されています。", followups: [{q: "標本分散を計算するとき、n ではなく n-1 で割るのはなぜですか？", a: "「nで割ると、真の分散よりも少し小さめに見積もってしまう『偏り』が出るため、n-1で割ることで『不偏性（期待値が真の分散と一致する）』を持たせるためです。（これを不偏分散と呼びます）」"}], isImportant: true, level: "core", trap: true },
  { id: 715, category: "7. 確率・統計", title: "ベイズの定理", formula: "P(A \\mid B) = \\frac{P(B \\mid A) P(A)}{P(B)}", formulaMust: true, definition: "結果から原因の確率を逆算する定理。", oral30: "ある結果（B）が観測されたという新しい情報をもとに、その原因（A）が起きていた事後確率を、事前の確率からアップデートして求めるための定理です。", explanation: "「病気の検査で陽性が出た時、本当に病気である確率は？」といった、直感と実際の確率がズレやすい問題（条件付き確率の逆）を正確に計算できます。", application: "スパムメールの判定フィルターや、機械学習のベイズ推定、不確実な情報下での意思決定など、現代のデータサイエンスの根幹をなす定理です。", followups: [{q: "ベイズの定理における『事前確率』と『事後確率』を、検査の例で説明してください。", a: "「事前確率は『検査前に持っていた、その人が病気である確率（罹患率）』、事後確率は『陽性という結果が出た後にアップデートされた、本当に病気である確率』です。」"}], isImportant: true, level: "core" },
  { id: 712, category: "7. 確率・統計", title: "仮説検定の「帰無仮説」と「対立仮説」", formula: "H_0 \\text{ vs } H_1", definition: "否定したい仮説と、主張したい仮説。", oral30: "自分が証明したい主張を「対立仮説」とし、あえて「そんな効果はない」という「帰無仮説」を立てます。そして、データから帰無仮説が『確率的にあり得ない』と矛盾を突くことで、自分の主張を通すアプローチです。", explanation: "背理法のような考え方で、統計的にエビデンスを示すための基本的なフレームワークです。", application: "新しいマーケティング施策を打った時に、売上の増加が「単なる偶然」なのか「本当に施策の効果」なのかを白黒つけるのに使います。", followups: [{q: "帰無仮説を捨てる基準となる確率のことを何と呼びますか？", a: "「有意水準（例えば5%など）と呼びます。」"}, {q: "p値が有意水準より「小さい」とき、帰無仮説はどうなりますか？", a: "「帰無仮説のもとでこんなデータが出るのはレアケースだと判断して『帰無仮説を棄却』します。つまり、対立仮説（自分の主張）を支持します」"}], isImportant: false, level: "advanced" },

  // --- 第8群 微分方程式 ---
  { id: 801, category: "8. 微分方程式", title: "微分方程式とは何ですか", formula: "\\frac{dy}{dt} = f(y, t)", formulaMust: true, definition: "未知の「関数」と「導関数」を含む方程式。", oral30: "普通の方程式が「特定の数字」を当てるクイズだとすれば、微分方程式は「変化のルール」から「元の関数の形そのもの」を復元するクイズです。", explanation: "時間変化を表す動学的なシステムを数式化するための最強のツールです。", application: "経済成長モデルにおいて、資本や人口が時間とともにどう変化し、最終的に定常状態に落ち着くのかというシミュレーションに使われます。", followups: [{q: "微分方程式を解く際に、スタート地点の条件（t=0の時の値）を何と呼びますか？", a: "「初期条件です。これがないと、積分定数（C）が残ったままの一般解しか求まらず、具体的な軌道が確定しません」"}, {q: "2階の微分方程式の解が「波のように振動する」のは、特性方程式の解がどんな数の時ですか？", a: "「解が虚数（複素数）になる時です。オイラーの公式により三角関数が現れるため振動します。」"}], isImportant: true, level: "core" },

  // --- 第9群 経済学基礎 ---
  { id: 901, category: "9. 経済基礎", title: "需要関数とは何ですか", formula: "D = f(P, I, \\dots)", formulaMust: true, definition: "価格と買いたい量の関係を表す関数。", oral30: "商品の「価格」や消費者の「所得」などから、市場でどれだけの「数量」が買われるかを表した関数のことです。通常、価格が上がれば需要は減る（右肩下がり）とモデル化されます。", explanation: "経済学における最も基本的な関数の1つで、消費者行動の最適化（効用最大化）の結果として導き出されます。", application: "「価格を1%上げた時、需要が何%減るか（価格弾力性）」を微分を使って計算し、企業の価格戦略を決定するベースになります。", followups: [{q: "価格以外の要因（例えば流行や所得）が変化した場合、グラフ上ではどんな動きをしますか？", a: "「価格以外の要因が変化すると、需要曲線そのものが右（需要増）や左（需要減）に平行シフトします。」"}, {q: "生活必需品と高級車では、需要関数の「傾き」はどう違いますか？", a: "「生活必需品は価格が変わっても需要が落ちにくいので『傾きが急（非弾力的）』、高級車は価格に敏感なので『傾きが緩やか（弾力的）』になります。」"}], isImportant: true, level: "core" },
  { id: 902, category: "9. 経済基礎", title: "限界費用（Marginal Cost）とは何ですか", formula: "MC = \\frac{dC(q)}{dq}", formulaMust: true, definition: "追加で1つ生産するためのコスト。", oral30: "総費用関数を生産量で微分したもので、「生産量をあと1単位追加で増やした時に、余分にかかるコスト」のことです。", explanation: "経済学では平均のコストではなく、この「限界的なコスト」を見て企業が生産量を決定すると考えます。", application: "完全競争市場では、「価格＝限界費用」となる点が企業の利益を最大化する最適な生産量となります。", followups: [{q: "なぜ企業は「平均費用」ではなく「限界費用」を見て生産量を決めるのですか？", a: "「過去の費用（サンクコスト）は取り戻せないので無視し、『今ここから、もう1つ追加で作るべきか』という未来の損益だけを純粋に比較して意思決定するためです」"}, {q: "固定費（家賃など）は、微分して求める限界費用に影響を与えますか？", a: "「影響しません。限界費用は微分して求めるため、定数である固定費は0になって消えるからです。」"}], isImportant: true, level: "core" },
  { id: 903, category: "9. 経済基礎", title: "限界利益（限界収入）とは何ですか", formula: "MR = \\frac{dR(q)}{dq} \\quad (\\text{最適化: } MR=MC)", formulaMust: true, definition: "生産量（販売量）を1単位追加した時に得られる追加的な収益。", oral30: "商品をあと1つ追加で売った時に、企業に新しく入ってくる追加の収益（売上）のことです。限界費用と一致するまで生産するのが最適だと考えます。", explanation: "経済学では限界費用 (MC) と限界収入 (MR) が等しくなる点 (MR=MC) で企業の利益が最大化されます。", application: "企業が「これ以上作ると赤字になる」ギリギリの生産量を決定する基準になります。", followups: [{q: "完全競争市場では、限界収入（MR）は何と等しくなりますか？", a: "「市場価格（P）と等しくなります。1つ売れるごとに必ず価格分の売上がそのまま入ってくるからです。」"}, {q: "限界効用とは何が違いますか？", a: "「限界効用は消費者が追加で得る『満足度』、限界収入は企業が追加で得る『売上（金銭）』です。」"}], isImportant: true, level: "core" },
  { id: 904, category: "9. 経済基礎", title: "効用最大化とは何ですか", formula: "\\max U(x,y) \\quad \\text{s.t.} \\quad P_x x + P_y y = I", formulaMust: true, definition: "消費者が限られた予算内で最も高い満足度を得るための行動。", oral30: "消費者が、限られた予算の制約のもとで、自分自身の満足度（効用）が最も高くなるような商品の組み合わせを選ぶという、ミクロ経済学の最も基本となる意思決定モデルです。", explanation: "ラグランジュの未定乗数法を使って数学的に解くことができます。最適点では、無差別曲線と予算制約線が接します。", application: "ここから需要関数を導出することで、市場全体の需要の動きを数理的に分析する土台となります。", followups: [{q: "最適点において、限界代替率と価格比にはどんな関係がありますか？", a: "「限界代替率（主観的な交換比率）と、価格比（市場での客観的な交換比率）が完全に一致します。」"}, {q: "所得が増えた場合、予算制約線はどう動きますか？", a: "「傾き（価格比）はそのままで、予算制約線が外側（右上）に平行移動します。」"}], isImportant: true, level: "core" },
  { id: 905, category: "9. 経済基礎", title: "費用関数とは何ですか", formula: "C(q) = FC + VC(q)", definition: "生産量とそれに必要な総費用の関係を表す関数。", oral30: "企業がある量の製品を作るために、どれだけのコストがかかるかを表した関数です。家賃などの「固定費」と、材料費など生産量に応じて増える「変動費」の合計で表されます。", explanation: "この関数を微分したものが限界費用（MC）になり、企業の最適な生産量を決定するための出発点になります。", application: "利益最大化問題を解く際に、売上関数からこの費用関数を引いたものを目的関数として最大化します。", followups: [{q: "長期と短期で、固定費の扱いはどう変わりますか？", a: "「短期では家賃などの固定費は変えられませんが、長期では工場を移転するなどすべてを可変費用として扱うことができます。」"}, {q: "平均費用曲線と限界費用曲線の交点には、どんな経済的意味がありますか？", a: "「その交点は平均費用が最小となる点であり、『操業停止点』や『損益分岐点』の基準になります。」"}], isImportant: true, level: "core" }
];

const oralCategories = ["すべて", "1. 一変数微積", "2. 多変数・最適化", "3. ラグランジュ", "4. テイラー展開", "5. 線形代数", "6. 最小二乗・回帰", "7. 確率・統計", "8. 微分方程式", "9. 経済基礎"];

function App() {
  const [appMode, setAppMode] = useState('oral'); // 'oral' | 'general'
  const [activeCategory, setActiveCategory] = useState("すべて");
  const [selectedCard, setSelectedCard] = useState(null);
  
  const [showAdvanced, setShowAdvanced] = useState(false); 
  const [showUntouchedOnly, setShowUntouchedOnly] = useState(false);
  const [shuffleSeed, setShuffleSeed] = useState(0);
  const [showDueOnly, setShowDueOnly] = useState(false);
  const [showHiddenOnly, setShowHiddenOnly] = useState(false);

  const [mockExamMode, setMockExamMode] = useState(null); // 'oral' | 'general' | null
  const [mockQuestions, setMockQuestions] = useState([]);
  const [mockIndex, setMockIndex] = useState(0);
  const [mockTimeLeft, setMockTimeLeft] = useState(60);
  const [showMockAnswer, setShowMockAnswer] = useState(false);

  const [revealedAnswers, setRevealedAnswers] = useState({});
  const [katexLoaded, setKatexLoaded] = useState(false);

  // ▼ 詳細進捗モーダルのステートを追加
  const [showProgressModal, setShowProgressModal] = useState(false);

  // ▼ 新規：カスタム問題追加用ステート
  const [customQuestions, setCustomQuestions] = useState([]);
  const [showAddModal, setShowAddModal] = useState(false);
  const [addError, setAddError] = useState("");
  const [newQuestion, setNewQuestion] = useState({
    category: "1. 一変数微積",
    title: "",
    formula: "",
    oral30: "",
    explanation: "",
    application: "",
    followups: [],
    isImportant: false,
    level: "core",
    isCustom: true
  });

  const [user, setUser] = useState(null);
  const [dailyHistory, setDailyHistory] = useState({}); 
  const [userNotes, setUserNotes] = useState({}); 
  const [checklists, setChecklists] = useState({}); 
  const [hiddenCards, setHiddenCards] = useState({}); 
  const [isLoading, setIsLoading] = useState(true);
  
  const [editingNote, setEditingNote] = useState("");

  const todayStr = useMemo(() => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  }, []);

  const [selectedDate, setSelectedDate] = useState(todayStr);

  useEffect(() => {
    if (!document.getElementById('katex-css')) {
      const link = document.createElement('link');
      link.id = 'katex-css';
      link.rel = 'stylesheet';
      link.href = 'https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css';
      document.head.appendChild(link);
    }
    if (!document.getElementById('katex-js')) {
      const script = document.createElement('script');
      script.id = 'katex-js';
      script.src = 'https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js';
      script.onload = () => setKatexLoaded(true);
      document.head.appendChild(script);
    } else if (window.katex) {
      setKatexLoaded(true);
    }
  }, []);

  const renderFormula = (formula, isDisplay = false) => {
    if (!formula) return null;
    if (!katexLoaded || !window.katex) return <span>{formula}</span>;
    try {
      const html = window.katex.renderToString(formula, {
        displayMode: isDisplay,
        throwOnError: false,
      });
      return <span dangerouslySetInnerHTML={{ __html: html }} />;
    } catch (e) {
      return <span>{formula}</span>;
    }
  };

  useEffect(() => {
    if (!auth) { setIsLoading(false); return; }
    const initAuth = async () => {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else { await signInAnonymously(auth); }
      } catch (e) { console.error(e); }
    };
    initAuth();
    const unsubscribe = onAuthStateChanged(auth, setUser);
    return () => unsubscribe();
  }, []);

  useEffect(() => {
    if (!user || !db) { setIsLoading(false); return; }
    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'appData', 'progress');
    const unsubscribe = onSnapshot(docRef, (docSnap) => {
      if (docSnap.exists()) {
        const data = docSnap.data();
        setDailyHistory(data.dailyHistory || {});
        setUserNotes(data.userNotes || {}); 
        setChecklists(data.checklists || {});
        setHiddenCards(data.hiddenCards || {}); 
        setCustomQuestions(data.customQuestions || []); 
      }
      setIsLoading(false);
    });
    return () => unsubscribe();
  }, [user]);

  const mergedQuizData = useMemo(() => {
    return [...quizData, ...customQuestions];
  }, [customQuestions]);

  const allMasteredIds = useMemo(() => {
    const ids = new Set();
    Object.values(dailyHistory).forEach(dayRecord => {
      Object.entries(dayRecord).forEach(([id, status]) => {
        if (status === 'mastered') ids.add(Number(id));
      });
    });
    return ids;
  }, [dailyHistory]);

  const touchedIds = useMemo(() => {
    const ids = new Set();
    Object.values(dailyHistory).forEach(dayRecord => {
      Object.keys(dayRecord).forEach(id => { ids.add(Number(id)); });
    });
    return ids;
  }, [dailyHistory]);

  const dueCardIds = useMemo(() => {
    const ids = new Set();
    const intervals = [1, 3, 7, 14, 30];
    mergedQuizData.forEach(q => {
      const id = String(q.id);
      let consecutiveMastered = 0;
      let nextReviewDate = null;
      let lastStudiedDate = null;
      const sortedDates = Object.keys(dailyHistory).sort();
      for (const date of sortedDates) {
        if (date > selectedDate) continue;
        const status = dailyHistory[date]?.[id];
        if (!status) continue;
        lastStudiedDate = date;
        if (status === 'review') {
          consecutiveMastered = 0;
          const d = new Date(date); d.setDate(d.getDate() + 1);
          nextReviewDate = d.toISOString().split('T')[0];
        } else if (status === 'mastered') {
          consecutiveMastered += 1;
          const interval = intervals[Math.min(consecutiveMastered - 1, intervals.length - 1)];
          const d = new Date(date); d.setDate(d.getDate() + interval);
          nextReviewDate = d.toISOString().split('T')[0];
        }
      }
      if (nextReviewDate && selectedDate >= nextReviewDate && lastStudiedDate !== selectedDate) {
        ids.add(q.id);
      }
    });
    return ids;
  }, [dailyHistory, selectedDate, mergedQuizData]);

  const progress = Math.round((allMasteredIds.size / mergedQuizData.length) * 100) || 0;
  const currentDayRecord = dailyHistory[selectedDate] || {};

  const progressDetails = useMemo(() => {
    const stats = {
      total: { total: 0, mastered: 0 },
      core: { total: 0, mastered: 0 },
      advanced: { total: 0, mastered: 0 },
      important: { total: 0, mastered: 0 },
      categories: {}
    };

    mergedQuizData.forEach(q => {
      const isMastered = allMasteredIds.has(q.id);
      
      stats.total.total++;
      if (isMastered) stats.total.mastered++;

      if (q.level === 'core') {
        stats.core.total++;
        if (isMastered) stats.core.mastered++;
      }
      if (q.level === 'advanced') {
        stats.advanced.total++;
        if (isMastered) stats.advanced.mastered++;
      }
      if (q.isImportant) {
        stats.important.total++;
        if (isMastered) stats.important.mastered++;
      }

      if (!stats.categories[q.category]) {
        stats.categories[q.category] = { total: 0, mastered: 0 };
      }
      stats.categories[q.category].total++;
      if (isMastered) stats.categories[q.category].mastered++;
    });

    return stats;
  }, [allMasteredIds, mergedQuizData]);

  // ▼ グラフの基準を「今日」ではなく「選択した日付(selectedDate)」に変更
  const last7DaysStats = useMemo(() => {
    const stats = [];
    let maxCount = 0;
    let weeklyTotal = 0;
    
    // selectedDateを基準に過去7日間を計算
    const targetDate = new Date(selectedDate);
    
    for (let i = 6; i >= 0; i--) {
      const d = new Date(targetDate);
      d.setDate(d.getDate() - i);
      const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      
      const dayRecord = dailyHistory[dateStr] || {};
      let mastered = 0;
      let review = 0;
      Object.values(dayRecord).forEach(status => {
        if (status === 'mastered') mastered++;
        if (status === 'review') review++;
      });
      
      const total = mastered + review;
      if (total > maxCount) maxCount = total;
      weeklyTotal += total;
      
      stats.push({ 
        date: dateStr, 
        displayDate: `${d.getMonth() + 1}/${d.getDate()}`, 
        mastered, 
        review, 
        total 
      });
    }
    return { stats, maxCount, weeklyTotal };
  }, [dailyHistory, selectedDate]);

  // ▼ 新規追加：選択した日付に学習した問題リストを取得
  const dailyStudiedItems = useMemo(() => {
    const dayRecord = dailyHistory[selectedDate] || {};
    return Object.entries(dayRecord).map(([idStr, status]) => {
      const id = Number(idStr);
      const item = mergedQuizData.find(q => q.id === id);
      return item ? { ...item, status } : null;
    }).filter(Boolean);
  }, [dailyHistory, selectedDate, mergedQuizData]);

  const filteredData = useMemo(() => {
    let data = [...mergedQuizData];
    
    if (appMode === 'oral') {
      data = data.filter(q => q.category !== "0. 志望理由・面接");
    } else {
      data = data.filter(q => q.category === "0. 志望理由・面接");
    }

    if (shuffleSeed > 0) {
      for (let i = data.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [data[i], data[j]] = [data[j], data[i]];
      }
    }

    if (showHiddenOnly) {
      data = data.filter(q => hiddenCards[q.id] && !q.isCustom); 
      if (activeCategory !== "すべて") data = data.filter(q => q.category === activeCategory);
    } else {
      data = data.filter(q => !hiddenCards[q.id]);
      
      if (!showAdvanced) data = data.filter(q => q.level !== "advanced");
      if (showDueOnly) data = data.filter(q => dueCardIds.has(q.id));
      if (showUntouchedOnly) data = data.filter(q => !touchedIds.has(q.id));
      if (activeCategory !== "すべて") data = data.filter(q => q.category === activeCategory);
    }

    return data;
  }, [appMode, activeCategory, showAdvanced, showUntouchedOnly, showDueOnly, touchedIds, dueCardIds, shuffleSeed, hiddenCards, showHiddenOnly, mergedQuizData]);

  const updateStatus = async (id, status, e) => {
    if (e) e.stopPropagation();
    const newStatus = currentDayRecord[id] === status ? null : status;
    const newDayRecord = { ...currentDayRecord };
    if (newStatus) newDayRecord[id] = newStatus; else delete newDayRecord[id];
    const newDailyHistory = { ...dailyHistory, [selectedDate]: newDayRecord };
    setDailyHistory(newDailyHistory);
    if (user && db) {
      const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'appData', 'progress');
      await setDoc(docRef, { dailyHistory: newDailyHistory }, { merge: true });
    }
  };

  const saveNote = async (id, text) => {
    const newNotes = { ...userNotes, [id]: text };
    setUserNotes(newNotes);
    if (user && db) {
      const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'appData', 'progress');
      await setDoc(docRef, { userNotes: newNotes }, { merge: true });
    }
  };

  const toggleChecklist = async (id, type) => {
    const currentChecks = checklists[id] || { def: false, mean: false, eco: false };
    const newChecks = { ...currentChecks, [type]: !currentChecks[type] };
    const newChecklists = { ...checklists, [id]: newChecks };
    setChecklists(newChecklists);
    if (user && db) {
      const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'appData', 'progress');
      await setDoc(docRef, { checklists: newChecklists }, { merge: true });
    }
  };

  const toggleHidden = async (id, e) => {
    if (e) e.stopPropagation();
    const newHidden = { ...hiddenCards };
    if (newHidden[id]) {
      delete newHidden[id]; 
    } else {
      newHidden[id] = true; 
    }
    setHiddenCards(newHidden);
    if (user && db) {
      const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'appData', 'progress');
      await setDoc(docRef, { hiddenCards: newHidden }, { merge: true });
    }
  };

  const handleSaveNewQuestion = async () => {
    if (!newQuestion.title.trim() || !newQuestion.oral30.trim()) {
      setAddError("タイトルと30秒回答例は必須です。");
      return;
    }
    setAddError("");
    const newId = Date.now();
    const qToSave = { ...newQuestion, id: newId };
    const updatedCustomQuestions = [...customQuestions, qToSave];
    
    setCustomQuestions(updatedCustomQuestions);
    setShowAddModal(false);
    
    setNewQuestion({ category: "1. 一変数微積", title: "", formula: "", oral30: "", explanation: "", application: "", followups: [], isImportant: false, level: "core", isCustom: true });

    if (user && db) {
      const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'appData', 'progress');
      await setDoc(docRef, { customQuestions: updatedCustomQuestions }, { merge: true });
    }
  };

  const handleDeleteCustomQuestion = async (id, e) => {
    if (e) e.stopPropagation();
    const updated = customQuestions.filter(q => q.id !== id);
    setCustomQuestions(updated);
    if (user && db) {
      const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'appData', 'progress');
      await setDoc(docRef, { customQuestions: updated }, { merge: true });
    }
  };

  const openCard = (item) => {
    setSelectedCard(item);
    setEditingNote(userNotes[item.id] || ""); 
    setRevealedAnswers({}); 
  };
  const closeCard = () => setSelectedCard(null);

  const toggleAnswer = (idx) => {
    setRevealedAnswers(prev => ({ ...prev, [idx]: !prev[idx] }));
  };

  const startMockExam = (type) => {
    if (type === 'oral') {
      const shibou = mergedQuizData.filter(q => q.category === "0. 志望理由・面接" && !hiddenCards[q.id]);
      const others = mergedQuizData.filter(q => q.category !== "0. 志望理由・面接" && q.level !== "advanced" && !hiddenCards[q.id]);
      const randShibou = shibou.length > 0 ? shibou[Math.floor(Math.random() * shibou.length)] : mergedQuizData[0]; 
      const shuffledOthers = others.sort(() => 0.5 - Math.random()).slice(0, 3);
      setMockQuestions([randShibou, ...shuffledOthers]);
    } else if (type === 'general') {
      const shibou = mergedQuizData.filter(q => q.category === "0. 志望理由・面接" && !hiddenCards[q.id]);
      const shuffledShibou = shibou.sort(() => 0.5 - Math.random()).slice(0, 4);
      setMockQuestions(shuffledShibou);

    setMockExamMode(type);
    setMockIndex(0);
    setMockTimeLeft(60);
    setShowMockAnswer(false);
    setRevealedAnswers({});
  };

    if (mockExamMode !== null && !showMockAnswer && mockTimeLeft > 0) {
      timer = setTimeout(() => setMockTimeLeft(prev => prev - 1), 1000);
    }
    return () => clearTimeout(timer);

  const nextMockQuestion = () => {
    if (mockIndex < mockQuestions.length - 1) {

      setMockTimeLeft(60);
      setShowMockAnswer(false);
      setRevealedAnswers({}); 
    } else {
      setMockExamMode(null);
    }

  return (
    <div className="min-h-screen bg-slate-50 text-slate-800 font-sans selection:bg-rose-200">
      <header className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
        <div className="max-w-4xl mx-auto px-4 py-4 sm:py-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
          <div>
            <h1 className="text-2xl sm:text-3xl font-bold text-slate-900 flex items-center gap-2">
              <BrainCircuit className="text-rose-600 w-8 h-8" /> 九大経済工学 面接対策
            </h1>
            <div className="text-sm text-slate-500 mt-1 flex items-center gap-2 min-h-[20px]">
              {isLoading && <Loader2 className="w-4 h-4 animate-spin text-slate-400" />}
            </div>
          </div>
          <div className="w-full sm:w-auto flex flex-col sm:flex-row gap-3">
            <div className="flex flex-col sm:flex-row gap-2 bg-slate-100 p-1 rounded-xl">
              <button 
                onClick={() => { setAppMode('oral'); setActiveCategory('すべて'); setShowHiddenOnly(false); }}
                className={`flex items-center justify-center gap-2 px-4 py-2 rounded-lg font-bold transition-all text-sm ${appMode === 'oral' ? 'bg-white text-rose-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
              >
                <BrainCircuit className="w-4 h-4" /> 数学・経済
              </button>
              <button 
                onClick={() => { setAppMode('general'); setActiveCategory('すべて'); setShowHiddenOnly(false); }}
                className={`flex items-center justify-center gap-2 px-4 py-2 rounded-lg font-bold transition-all text-sm ${appMode === 'general' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
              >
                <User className="w-4 h-4" /> 志望動機・人物
              </button>
            </div>

            <div className="flex items-center justify-center gap-2 bg-indigo-50 border border-indigo-200 px-4 py-2 rounded-xl text-indigo-700 font-bold transition-all hover:bg-indigo-100">
              <Calendar className="w-4 h-4" />
              <input type="date" value={selectedDate} onChange={(e) => setSelectedDate(e.target.value)} className="bg-transparent border-none outline-none text-indigo-900 cursor-pointer font-bold" />
            </div>

            <button 
              onClick={() => setShowProgressModal(true)}
              className="w-full sm:w-64 bg-slate-100 p-3 rounded-xl border border-slate-200 hover:bg-slate-200 transition-colors text-left relative group"
            >
              <div className="flex justify-between items-center mb-1">
                <span className="text-xs font-bold text-slate-600 flex items-center gap-1">
                  <BarChart2 className="w-3 h-3"/> 累計習得度
                </span>
                <span className="text-sm font-bold text-rose-600">{progress}%</span>
              </div>
              <div className="w-full bg-slate-200 rounded-full h-2.5">
                <div className="bg-rose-600 h-2.5 rounded-full transition-all duration-500" style={{ width: `${progress}%` }}></div>
              </div>
              <div className="absolute inset-0 bg-slate-900/5 rounded-xl opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                <span className="text-xs font-bold text-slate-700 bg-white/95 px-2 py-1 rounded shadow-sm flex items-center gap-1">
                  <BarChart2 className="w-3 h-3"/> 詳細分析を見る
                </span>
              </div>
            </button>
          </div>
        </div>
      </header>

      <main className="max-w-4xl mx-auto px-4 py-8">
        <div className="mb-8">
          <button 
            onClick={() => startMockExam(appMode)}
            className={`w-full flex items-center justify-center gap-3 px-6 py-4 rounded-2xl font-black text-white shadow-lg transition-transform hover:-translate-y-1 ${
              appMode === 'oral' 
                ? 'bg-gradient-to-r from-rose-500 to-indigo-600 shadow-rose-200' 
                : 'bg-gradient-to-r from-emerald-500 to-teal-600 shadow-emerald-200'
            }`}
          >
            <Mic className="w-6 h-6 animate-pulse" /> 
            {appMode === 'oral' ? '模擬口頭試問（数学・経済）をスタート' : '模擬一般面接（志望動機・人物）をスタート'}
          </button>
        </div>

        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
          <div className="flex overflow-x-auto pb-2 sm:pb-0 gap-2 hide-scrollbar w-full sm:w-auto">

              <button key={cat} onClick={() => setActiveCategory(cat)} className={`whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all ${activeCategory === cat ? 'bg-slate-800 text-white shadow-md' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-100'}`}>

              <Plus className="w-4 h-4" /> 問題作成
            </button>

            <div className="w-px h-6 bg-slate-200 mx-1 shrink-0"></div>

            <button onClick={() => setShowHiddenOnly(!showHiddenOnly)} className={`flex items-center gap-2 px-4 py-2 rounded-full text-sm font-bold border transition-all shrink-0 ${showHiddenOnly ? 'bg-slate-800 text-white border-slate-900' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>

            <button onClick={() => setShowDueOnly(!showDueOnly)} className={`flex items-center gap-2 px-4 py-2 rounded-full text-sm font-bold border transition-all shrink-0 ${showDueOnly ? 'bg-purple-100 text-purple-700 border-purple-300' : 'bg-white text-slate-500 border-slate-200'}`}>

                「{mockQuestions[mockIndex].title}」
              </h2>

              {!showMockAnswer ? (
                <div className="w-full text-center space-y-6 mt-8">
                  <div className="w-16 h-16 rounded-full border-4 border-rose-500 border-t-transparent animate-spin mx-auto opacity-20"></div>
                  <p className="text-slate-500 font-bold">自分の言葉で、声に出して説明してください。</p>
                  <button 
                    onClick={() => setShowMockAnswer(true)}
                    className="px-8 py-3 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 border border-slate-300 transition-colors"
                  >
                    解答・追撃を確認する
                  </button>
                </div>
              ) : (
                <div className="w-full bg-slate-50 rounded-2xl p-6 border border-slate-200 animate-fade-in text-left max-h-[50vh] overflow-y-auto custom-scrollbar">
                  <h4 className="text-sm font-bold text-rose-600 mb-3 flex items-center"><MessageSquare className="w-4 h-4 mr-2"/> 30秒回答例</h4>
                  <p className="text-slate-800 font-bold text-lg mb-8 bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                    「{mockQuestions[mockIndex].oral30}」
                  </p>
                  
                  {mockQuestions[mockIndex].followups && mockQuestions[mockIndex].followups.length > 0 && (
                    <>
                      <h4 className="text-sm font-bold text-amber-600 mb-3 flex items-center"><Sparkles className="w-4 h-4 mr-2"/> 追撃への備え</h4>
                      <ul className="space-y-3 mb-4">
                        {mockQuestions[mockIndex].followups.map((item, idx) => (
                          <li key={idx} className="bg-white rounded-xl border border-amber-100 p-3 shadow-sm">
                            <div className="flex justify-between items-start gap-3">
                              <span className="text-slate-800 font-bold text-sm leading-snug">Q. {item.q}</span>
                              <button
                                onClick={() => toggleAnswer(idx)}
                                className="text-[10px] px-2 py-1 bg-amber-100 text-amber-700 rounded font-bold shrink-0 hover:bg-amber-200 flex items-center transition-colors"
                              >
                                {revealedAnswers[idx] ? <><EyeOff className="w-3 h-3 mr-1"/>非表示</> : <><Eye className="w-3 h-3 mr-1"/>解答を見る</>}
                              </button>
                            </div>
                            {revealedAnswers[idx] && (
                              <div className="mt-3 pt-3 border-t border-amber-100 text-slate-700 text-sm font-medium animate-fade-in flex items-start gap-2">
                                <span className="text-rose-500 font-black shrink-0">A.</span>
                                <span className="leading-relaxed">{item.a}</span>
                              </div>
                            )}
                          </li>
                        ))}
                      </ul>
                    </>
                  )}

                  {mockQuestions[mockIndex].category !== "0. 志望理由・面接" && (
                    <p className="text-xs font-bold text-slate-400 mt-4">
                      ※さらに「数式で書くと？」「図で説明すると？」と聞かれる可能性にも備えておきましょう。
                    </p>
                  )}
                </div>
              )}
            </div>

            <div className="px-6 py-4 bg-slate-50 border-t border-slate-200 flex justify-between items-center">
              <button onClick={() => setMockExamMode(null)} className="px-5 py-2.5 text-slate-500 font-bold hover:bg-slate-200 rounded-xl transition-colors">
                中断する
              </button>
              <button 
                onClick={nextMockQuestion}
                className="px-8 py-3 bg-slate-900 text-white rounded-xl font-bold hover:bg-slate-800 shadow-lg flex items-center transition-transform hover:-translate-y-0.5"
              >
                {mockIndex < mockQuestions.length - 1 ? '次の問題へ' : '面接を終了する'} <ChevronRight className="w-5 h-5 ml-1" />
              </button>
            </div>
          </div>
        </div>
      )}

      {showAddModal && (
        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm" onClick={() => setShowAddModal(false)}>
          <div className="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]" onClick={e => e.stopPropagation()}>
            <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
              <h3 className="font-bold text-slate-800 flex items-center gap-2">
                <Edit3 className="w-5 h-5 text-rose-600" /> オリジナル問題を追加
              </h3>
              <button onClick={() => setShowAddModal(false)} className="p-2 bg-slate-200 hover:bg-slate-300 rounded-full text-slate-600 transition-colors"><X className="w-5 h-5" /></button>
            </div>
            
            <div className="p-6 sm:p-8 overflow-y-auto custom-scrollbar space-y-5">
              {addError && (
                <div className="bg-rose-50 text-rose-600 p-3 rounded-xl text-sm font-bold flex items-center gap-2">
                  <AlertTriangle className="w-4 h-4" /> {addError}
                </div>
              )}
              
              <div>
                <label className="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wider">カテゴリ</label>
                <select 
                  value={newQuestion.category} 
                  onChange={e => setNewQuestion({...newQuestion, category: e.target.value})} 
                  className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-rose-400 focus:bg-white outline-none font-bold text-slate-700"
                >
                  <option value="0. 志望理由・面接">0. 志望理由・面接</option>
                  {oralCategories.filter(c => c !== "すべて").map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </div>
              
              <div>
                <div className="flex justify-between items-end mb-1.5">
                  <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider">タイトル（問題文） <span className="text-rose-500">*</span></label>
                </div>
                <div className="flex flex-col sm:flex-row gap-2">
                  <input 
                    type="text" 
                    value={newQuestion.title} 
                    onChange={e => setNewQuestion({...newQuestion, title: e.target.value})} 
                    className="w-full sm:flex-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-rose-400 focus:bg-white outline-none text-slate-800 font-bold" 
                    placeholder="例：固有値とは何か" 
                  />
                </div>
              </div>
              
              <div>
                <label className="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wider">30秒回答例（暗唱用） <span className="text-rose-500">*</span></label>
                <textarea 
                  value={newQuestion.oral30} 
                  onChange={e => setNewQuestion({...newQuestion, oral30: e.target.value})} 
                  className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-rose-400 focus:bg-white outline-none text-slate-700 h-24 custom-scrollbar leading-relaxed" 
                  placeholder="口頭で説明する時のスクリプトを入力..." 
                />
              </div>
              
              <div>
                <label className="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wider">数式 (LaTeX記法 - 任意)</label>
                <input 
                  type="text" 
                  value={newQuestion.formula} 
                  onChange={e => setNewQuestion({...newQuestion, formula: e.target.value})} 
                  className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-rose-400 focus:bg-white outline-none font-mono text-sm text-slate-700" 
                  placeholder="\int_{0}^{1} x dx" 
                />
              </div>
              
              <div>
                <label className="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wider">詳細解説 (任意)</label>
                <textarea 
                  value={newQuestion.explanation} 
                  onChange={e => setNewQuestion({...newQuestion, explanation: e.target.value})} 
                  className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-rose-400 focus:bg-white outline-none text-slate-700 h-24 custom-scrollbar leading-relaxed" 
                  placeholder="式の意味や補足情報などを入力..." 
                />
              </div>
            </div>
            
            <div className="px-6 py-4 border-t border-slate-100 bg-white flex justify-end gap-3">
              <button onClick={() => setShowAddModal(false)} className="px-5 py-2.5 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-colors">キャンセル</button>
              <button onClick={handleSaveNewQuestion} className="px-6 py-2.5 bg-rose-600 text-white font-bold rounded-xl hover:bg-rose-700 shadow-md transition-all flex items-center gap-2">
                <CheckCircle className="w-4 h-4" /> 保存して追加
              </button>
            </div>
          </div>
        </div>
      )}

      <style dangerouslySetInnerHTML={{__html: `
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
      `}} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
