function doc(db, ...segments) {
  if (db?.local) return { local: true };
  let ref = db.collection(segments[0]);
  for (let i = 1; i < segments.length; i += 2) {
    ref = ref.doc(segments[i]);
    if (segments[i + 1]) ref = ref.collection(segments[i + 1]);
  }
  return ref;
}
async function setDoc(ref, data, options) {

  { id: 13, category: "0. 志望理由・面接", title: "経済工学科で学ぶ上で、あなたのどんなスキルが活かせますか？", formula: "", definition: "プログラミングや工学知識のアピールにつなげる質問。", oral30: "※解答なし。下のメモ欄を使って、自分だけの回答を作ってみよう！", explanation: "高専生最大の強みは「実装力」と「システムの最適化思考」。経済の理論を学ぶだけでなく、それをデータやプログラムに落とし込んで実証・シミュレーションできる強みを押し出そう。", application: "高専からの編入生ならではの価値（バリュー）をどう捉えているかを見られる。", followups: [{q: "そのスキルを使って、入学後に具体的にどんなデータを分析してみたいですか？", a: "（仮想通貨の市場データ、オークションの入札データなど、興味のある対象を答えましょう）"}], rank: "S" },
  { id: 14, category: "0. 志望理由・面接", title: "これまでに挫折した経験と、そこから学んだことは何ですか？", formula: "", definition: "ストレス耐性や、失敗からのリカバリー能力を問う質問。", oral30: "※解答なし。下のメモ欄を使って、自分だけの回答を作ってみよう！", explanation: "「失敗して辛かった」で終わらせず、「そこから何を分析し、どう行動を変えたか（PDCAサイクル）」に焦点を当てて話すと、論理的な思考力のアピールになるよ。", application: "研究などで壁にぶつかった時に、折れずに乗り越えられる人物かを見極められる。", followups: [{q: "その挫折を乗り越える中で、周囲の人に助けられたことはありましたか？", a: "（自分一人で抱え込まず、適切にSOSを出せるかどうかも評価対象になります）"}], rank: "A" },
  { id: 15, category: "0. 志望理由・面接", title: "チームで何かを成し遂げた経験と、あなたの役割を教えてください", formula: "", definition: "協調性やリーダーシップ、チーム内での立ち回りを問う質問。", oral30: "※解答なし。下のメモ欄を使って、自分だけの回答を作ってみよう！", explanation: "アドミッションポリシーの「主体性を持って多様な人々と協働して学ぶ態度」に直結する質問。自分がリーダーだったかサポート役だったかに関わらず、「チームの課題に対して自分がどう動いたか」を具体的に語ろう。", application: "ゼミや研究室というコミュニティで上手くやっていける人物かを見られる。", followups: [{q: "チーム内で意見が対立したとき、あなたはどのように間を取り持ちましたか？", a: "（論理的・客観的なデータを用いて説得した、あるいは双方の意見を統合したなどのエピソードを用意しましょう）"}], rank: "A" },

  // --- 第1群 微分・一変数関数 ---
  { id: 101, category: "1. 一変数微積", title: "関数とは何ですか", formula: "", definition: "入力と出力の対応規則", oral30: "1つの入力に対して、必ず1つの出力を返す規則。", explanation: "入力をx、出力をyとした時、xを一つ決めたらyがただ一つに決まる関係を指します。", application: "", followups: [], rank: "B" },
  { id: 102, category: "1. 一変数微積", title: "1つの入力に2つの出力があるものは関数ですか", formula: "", definition: "関数の定義外", oral30: "いいえ。関数としては定義されません。", explanation: "関数は1つの入力に対して出力が1つであることが条件です。", application: "", followups: [], rank: "B" },
  { id: 103, category: "1. 一変数微積", title: "極限とは何ですか", formula: "\\lim_{x \\to a} f(x)", definition: "近づく目標値", oral30: "変数をある値に限りなく近づけたときに、関数が近づく目標値。", explanation: "実際にその値に到達しなくても、「どこに向かっているか」を示す概念です。", application: "", followups: [], rank: "B" },
  { id: 104, category: "1. 一変数微積", title: "微分とは何ですか", formula: "f'(x) = \\lim_{h \\to 0} \\frac{f(x+h) - f(x)}{h}", formulaMust: true, definition: "関数の変化の割合、接線の傾き。", oral30: "ある点での変化の割合、つまり接線の傾きを与える操作です。", explanation: "ある変数をほんの少しだけ増やしたときに、結果がどれくらい変化するかという局所的な変化を捉える操作です。", application: "経済学における『限界（Marginal）』の概念そのものです。", followups: [{q: "離散的なデータしかない場合、微分の考え方をどう応用しますか？", a: "「データ同士の『差分』を取ります。例えば今日の価格から昨日の価格を引いて変化量を見ることで、微分と同じように瞬間のトレンドを捉えることができます」"}], rank: "S", trap: true },
  { id: 105, category: "1. 一変数微積", title: "導関数とは何ですか", formula: "f'(x)", definition: "微分の結果の関数", oral30: "各点での微分の値（傾き）を返す新しい関数。", explanation: "微分して得られた、すべてのxでの傾きを表す関数のことです。", application: "", followups: [], rank: "B" },
  { id: 106, category: "1. 一変数微積", title: "微分は何を表していますか", formula: "", definition: "限界的な変化", oral30: "限界的な変化。1単位追加した時の影響。", explanation: "経済学において「Marginal(限界)」という言葉は「微分」そのものを指します。", application: "", followups: [], rank: "A" },
  { id: 107, category: "1. 一変数微積", title: "接線とは何ですか", formula: "", definition: "曲線に最も近い直線", oral30: "ある点で曲線に最もよく似た（触れるだけの）直線。", explanation: "", application: "", followups: [], rank: "B" },
  { id: 108, category: "1. 一変数微積", title: "最大値と最小値はどう判断しますか", formula: "f'(x) = 0, \\quad f''(x) > 0 \\text{ (Min)}", definition: "微分が0になる点とその前後の変化。", oral30: "微分が0になる点（停留点）を探し、その前後の傾きの変化を見る。", explanation: "傾きが0で平らになる点を探し、それが山か谷かを二階微分の符号で確かめます。", application: "利益関数の最大化やコスト関数の最小化という最適化問題の基本アプローチです。", followups: [{q: "微分が0でも、最大でも最小でもない点は存在しますか？", a: "「はい、$y=x^3$ の原点のように、傾きは一瞬0になりますが、そのままさらに上がっていくような点（変曲点）が存在します」"}, {q: "グラフの端っこにある最大・最小値は微分で見つけられますか？", a: "「見つけられません。微分で探せるのはあくまで曲線の『山と谷』なので、定義域の境界（端っこ）の値は直接代入して計算・比較する必要があります」"}], rank: "A" },
  { id: 109, category: "1. 一変数微積", title: "なぜ微分の符号で増減が分かるのですか", formula: "", definition: "符号と増減", oral30: "微分＝傾きだから。プラスなら右上がり、マイナスなら右下がり。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 110, category: "1. 一変数微積", title: "なぜ微分の符号を見ると最大・最小が分かるのですか", formula: "", definition: "山の形、谷の形", oral30: "増加から減少へ変われば山（最大）、減少から増加へ変われば谷（最小）だから。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 111, category: "1. 一変数微積", title: "二階微分は何を意味しますか", formula: "f''(x)", definition: "傾きの変化率", oral30: "傾きの変化の割合。曲線の曲がり方（凸性）。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 112, category: "1. 一変数微積", title: "なぜ下に凸だと最小になるのですか", formula: "", definition: "谷の形成", oral30: "傾きがマイナスからプラスへ変化するから（谷底の形）。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 113, category: "1. 一変数微積", title: "なぜ上に凸だと最大になるのですか", formula: "", definition: "山の形成", oral30: "傾きがプラスからマイナスへ変化するから（山の形）。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 114, category: "1. 一変数微積", title: "合成関数の微分（チェインルール）とは何ですか", formula: "\\frac{dy}{dx} = \\frac{dy}{du} \\cdot \\frac{du}{dx}", definition: "関数の中に関数が入っている場合の微分ルール。", oral30: "関数の中に別の関数が入っている（$y = f(g(x))$）ものを微分する連鎖律の法則。", explanation: "マトリョーシカのような関数の変化率を、外側から順に微分して掛け合わせることで求めます。", application: "「原油価格が上がると物流コストが上がり、最終的な物価が上がる」といった連鎖的影響を追う時に使います。", followups: [{q: "経済のデータ分析で、連鎖的な影響を計算した経験はありますか？", a: "（自分が開発した仮想通貨分析ツールで、複数の指標がどう価格に影響するかを計算した経験などを語りましょう）"}, {q: "多変数の場合にこれを拡張するとどうなりますか？", a: "「全微分の考え方を使って、各変数ルートの偏微分と連鎖律を掛け合わせたものをすべて足し合わせる形になります」"}], rank: "A" },
  { id: 115, category: "1. 一変数微積", title: "ロピタルの定理とは何ですか", formula: "\\lim_{x \\to a} \\frac{f(x)}{g(x)} = \\lim_{x \\to a} \\frac{f'(x)}{g'(x)}", definition: "不定形の極限を、微分を用いて求める定理。", oral30: "「0分の0」や「無限大分の無限大」といった不定形の極限を求める際に、分母と分子をそれぞれ微分してから極限をとっても、元の極限値と一致するという定理です。", explanation: "計算が難しい極限を、微分の力を使って簡単に解くための強力なツールです。ただし、適用条件（不定形であることなど）をしっかり確認する必要があります。", application: "複雑な経済モデルにおいて、パラメータが極端な値をとった場合の漸近的な挙動を調べる際に使われます。", followups: [{q: "ロピタルの定理を使ってはいけないのはどんな時ですか？", a: "「分母と分子の極限が『不定形（0/0や∞/∞）』になっていない時に使うと、全く違う間違った値になってしまいます。」"}], rank: "A" },
  { id: 116, category: "1. 一変数微積", title: "積分とは何ですか", formula: "\\int f(x) dx", definition: "微分の逆操作、または面積。", oral30: "微分の逆操作であり、幾何学的には関数のグラフと横軸に囲まれた部分の面積を求める操作です。", explanation: "「変化の割合（微分）」を全て足し合わせて「全体の量（積分）」を復元する操作とも言えます。経済学では、限界費用から総費用を逆算する際などに使われます。", application: "確率密度関数を積分して確率を求めたり、限界量から総量を求める際に使われます。", followups: [], rank: "B" },
  { id: 117, category: "1. 一変数微積", title: "部分積分法とは何ですか", formula: "\\int f'(x)g(x) dx = f(x)g(x) - \\int f(x)g'(x) dx", definition: "関数の積の積分法。", oral30: "2つの関数の掛け算の形になっているものを積分するテクニックで、「積の微分公式」を逆利用したものです。", explanation: "一方を微分してシンプルになる関数、もう一方を積分しやすい関数として役割分担させることで、積分可能な形に持ち込みます。", application: "確率統計で、期待値や分散を定義通りに計算する際（$x e^{-x}$ の積分など）に頻繁に登場します。", followups: [{q: "対数関数 $\\log x$ の積分はどうやって計算しますか？", a: "「$1 \\times \\log x$ とみなして部分積分を使います。$1$ を積分して $x$ にし、$\\log x$ を微分して $\\frac{1}{x}$ にすることで解けます。」"}], rank: "A" },
  { id: 118, category: "1. 一変数微積", title: "置換積分法とは何ですか", formula: "\\int f(g(x))g'(x) dx = \\int f(u) du", definition: "変数を置き換える積分法。", oral30: "複雑な関数の一部を別の新しい変数で置き換えることで、シンプルな形にして積分するテクニックです。「合成関数の微分（チェインルール）」の逆操作にあたります。", explanation: "置き換えた後は、微小な変化量 $dx$ も新しい変数の $du$ に合わせてスケール調整（微分による補正）をする必要があります。", application: "正規分布などの複雑な確率分布の計算において、扱いやすい標準形に変換する際などに使われます。", followups: [], rank: "B" },
  
  // ▼ ここから追加：平均値の定理・数列・級数・フーリエ級数
  { id: 119, category: "1. 一変数微積", title: "平均値の定理とは何ですか", formula: "f'(c) = \\frac{f(b)-f(a)}{b-a}", formulaMust: true, definition: "区間内の平均変化率と一致する瞬間変化率（接線の傾き）を持つ点が、区間内に少なくとも一つ存在するという定理。", oral30: "グラフの2点を結んだ直線の傾きと同じ傾きを持つ接線が、その2点間のどこかに必ず引けるという定理です。関数の単調性の証明などに使われます。", explanation: "微分積分学の基本定理の証明など、解析学の根幹をなす定理です。", application: "ある期間での平均的な経済成長率と一致する瞬間的な成長率が存在することの数学的な証明などに繋がります。", followups: [{q: "ロルの定理と平均値の定理の関係は？", a: "「ロルの定理は、平均値の定理において $f(a)=f(b)$、つまり平均変化率が0となる特別なケースです。」"}, {q: "この定理が関数の単調性の判定にどう使われますか？", a: "「区間内で常に $f'(x)>0$ ならば、任意の2点間で $f(b)-f(a) = f'(c)(b-a) > 0$ となり、単調増加であることが証明できます。」"}], rank: "S", trap: true },
  { id: 120, category: "1. 一変数微積", title: "数列の収束とは何ですか", formula: "\\lim_{n \\to \\infty} a_n = \\alpha", definition: "数列の項を無限に進めたとき、ある一定の値に限りなく近づく状態。", oral30: "数列の項を無限に進めていったとき、ある一定の値（極限値）に限りなく近づく状態のことです。", explanation: "厳密にはイプシロン・エヌ（ε-N）論法を用いて定義されます。", application: "経済の成長モデルや、時間が無限に経過した際の定常状態への到達を議論するベースになります。", followups: [{q: "発散とはどう違いますか？", a: "「特定の値に近づかず、無限大になったり振動したりする状態が発散です。」"}], rank: "A" },
  { id: 121, category: "1. 一変数微積", title: "等比級数（幾何級数）とは何ですか", formula: "\\sum_{n=0}^{\\infty} ar^n = \\frac{a}{1-r} \\quad (|r| < 1)", formulaMust: true, definition: "一定の比率で掛け合わされる数列の無限和。", oral30: "一定の比率（公比）で掛け合わされる数列の無限和です。公比の絶対値が1より小さい時だけ収束し、その和は $\\frac{a}{1-r}$ になります。", explanation: "経済モデルにおいて非常に頻繁に登場します。収束条件の $|r| < 1$ は必ず答えられるようにしましょう。", application: "将来のキャッシュフローの現在価値の合計（割引現在価値）や、マクロ経済の乗数効果を計算する際に使われます。", followups: [{q: "公比 r が 1 以上の場合、級数はどうなりますか？", a: "「無限大に発散します。」"}], rank: "S" },
  { id: 122, category: "1. 一変数微積", title: "べき級数とは何ですか", formula: "\\sum_{n=0}^{\\infty} c_n (x-a)^n", definition: "変数のべき乗を無限に足し合わせた級数。", oral30: "$x$ の多項式を無限の次数まで足し合わせた級数のことです。テイラー展開は、関数をこのべき級数の形で表した代表例です。", explanation: "関数をべき級数で表すことで、微積分がただの多項式の微積分になり、非常に扱いやすくなります。", application: "解析困難な関数をコンピュータで計算するための基本形です。", followups: [{q: "べき級数が収束する $x$ の範囲の大きさを何と呼びますか？", a: "「収束半径と呼びます。」"}], rank: "B" },
  { id: 123, category: "1. 一変数微積", title: "収束半径とは何ですか", formula: "R = \\lim_{n \\to \\infty} \\left| \\frac{c_n}{c_{n+1}} \\right|", definition: "べき級数が収束する変数の範囲の中心からの距離。", oral30: "べき級数が収束するような変数の範囲の、中心からの距離のことです。この半径の内側では級数は収束しますが、外側では発散します。", explanation: "ダランベールの判定法（隣り合う項の比の極限）などを用いて求めます。", application: "テイラー展開で作った近似式が、どの範囲までなら信用できるか（誤差が発散しないか）を示す指標になります。", followups: [{q: "ダランベールの判定法とは何ですか？", a: "「隣り合う項の絶対値の比 $\\left| \\frac{a_{n+1}}{a_n} \\right|$ の極限が1より小さければ収束する、という判定法です。」"}], rank: "A" },
  { id: 124, category: "1. 一変数微積", title: "フーリエ級数とは何ですか", formula: "f(x) \\approx \\frac{a_0}{2} + \\sum_{n=1}^{\\infty} (a_n \\cos nx + b_n \\sin nx)", definition: "周期関数を三角関数の和で表す手法。", oral30: "複雑な周期関数を、周波数の異なる単純なサイン波とコサイン波の足し算に分解して表現する手法です。", explanation: "テイラー展開が「多項式」での近似なら、フーリエ級数は「波（三角関数）」での近似です。", application: "経済データの季節変動サイクル（周期性）を抽出するスペクトル解析などの基礎になります。", followups: [{q: "フーリエ変換との違いは何ですか？", a: "「フーリエ級数は周期関数を離散的な周波数の和で表しますが、フーリエ変換は非周期関数を連続的な周波数スペクトルに分解します。」"}], rank: "B" },
  {"id": 125,"category": "1. 一変数微積","title": "等比数列とは何ですか","formula": "a_n = ar^{n-1}","formulaMust": true,"definition": "前の項に一定の数（公比）を掛けて次の項が作られる数列。","oral30": "等比数列とは、各項が前の項に一定の数である公比を掛けることで得られる数列です。初項を $a$、公比を $r$ とすると、第n項は $a_n = ar^{n-1}$ と表せます。","explanation": "等比級数は、この等比数列の項を足し合わせたものです。数列は項そのもの、級数はその和、という区別を明確にしておきましょう。","application": "複利計算や人口成長、割引現在価値など、一定比率で増減する経済現象の基本モデルになります。","followups": [{"q": "等比数列と等比級数の違いは？","a": "「等比数列は $a, ar, ar^2, \\dots$ のような項の並びで、等比級数はそれらを足した和です。」"}],"rank": "A"},
  {"id": 126,"category": "1. 一変数微積","title": "オイラーの公式とは何ですか","formula": "e^{i\\theta} = \\cos \\theta + i\\sin \\theta","formulaMust": true,"definition": "指数関数と三角関数を複素数の世界で結びつける公式。","oral30": "オイラーの公式は、複素指数関数 $e^{i\\theta}$ が、実部を $\\cos\\theta$、虚部を $\\sin\\theta$ とする複素数として表せるという公式です。指数関数・三角関数・複素数をつなぐ基本公式です。","explanation": "$\\theta=\\pi$ を代入すると $e^{i\\pi}+1=0$ となり、解析学で重要な定数が一つの式にまとまります。テイラー展開から導ける点も面接で強いです。","application": "振動現象、フーリエ解析、複素数を用いた微分方程式の解法などで使われます。","followups": [{"q": "この公式はテイラー展開とどう関係しますか？","a": "「$e^x$ の展開に $x=i\\theta$ を代入し、実部と虚部に分けると $\\cos\\theta$ と $\\sin\\theta$ の展開が現れます。」"}],"rank": "S","trap": true},
  {"id": 127,"category": "1. 一変数微積","title": "ド・モアブルの定理とは何ですか","formula": "(\\cos \\theta + i\\sin \\theta)^n = \\cos n\\theta + i\\sin n\\theta","formulaMust": true,"definition": "複素数の偏角が累乗によってn倍されることを表す定理。","oral30": "ド・モアブルの定理は、複素数を極形式で表したとき、そのn乗は絶対値がn乗され、偏角がn倍になるという定理です。特に単位円上では $(\\cos\\theta+i\\sin\\theta)^n=\\cos n\\theta+i\\sin n\\theta$ となります。","explanation": "オイラーの公式を使うと、$(e^{i\\theta})^n=e^{in\\theta}$ と一行で理解できます。複素数の累乗やn乗根の計算に便利です。","application": "周期性や回転、振動を扱う計算で、複素数の累乗を簡単に処理できます。","followups": [{"q": "オイラーの公式を使って説明すると？","a": "「$\\cos\\theta+i\\sin\\theta=e^{i\\theta}$ なので、n乗すると $e^{in\\theta}=\\cos n\\theta+i\\sin n\\theta$ になります。」"}],"rank": "A"},
  {"id": 128,"category": "1. 一変数微積","title": "ランダウの記号とは何ですか","formula": "f(x)=O(g(x)), \\quad f(x)=o(g(x))","definition": "関数の増え方や誤差の大きさを、主要なオーダーで表す記号。","oral30": "ランダウの記号は、関数や誤差がどれくらいの速さで大きくなるか、あるいは小さくなるかを表す記法です。$O(g)$ は高々 $g$ と同じ程度、$o(g)$ は $g$ より無視できるほど小さい、という意味です。","explanation": "テイラー展開の余りを $O(x^2)$ のように書くと、細かい係数ではなく誤差の次数に注目できます。厳密には極限で比較します。","application": "近似計算、数値解析、アルゴリズムの計算量評価、経済モデルの局所近似で重要です。","followups": [{"q": "$O$ と $o$ の違いは？","a": "「$O(g)$ は同じオーダー以下、$o(g)$ は $g$ で割ると0に近づくほど小さい、という違いです。」"}],"rank": "A"},
  {"id":129,"category":"1. 一変数微積","title":"ラプラス変換とは何ですか","formula":"F(s) = \\int_{0}^{\\infty} f(t)e^{-st}dt","formulaMust":true,"definition":"時間領域の関数を、複素数sの領域へ変換する積分変換。","oral30":"ラプラス変換は、時間領域で表された複雑な微分方程式を、$s$ 領域という別の世界に移すことで、微分を代数計算に変換して解きやすくする手法です。","explanation":"関数 $f(t)$（$t\\ge 0$）に対して $F(s)=\\int_0^\\infty f(t)e^{-st}dt$ と定義されます。逆ラプラス変換では $F(s)$ から元の時間関数 $f(t)$ を復元します。初期条件を含む微分方程式を扱いやすいのが特徴です。","application":"工学の制御システム設計で必須の考え方ですが、経済学でも時間とともに変化する動学モデル、例えば経済成長モデルや調整過程の振る舞いの解析に応用できます。","followups":[{"q":"フーリエ変換との違いは何ですか？","a":"「ラプラス変換は $t\\ge0$ の時間発展や初期条件つき微分方程式に強く、フーリエ変換は信号や時系列を周波数成分に分解するのに強いです。」"},{"q":"微分方程式がなぜ解きやすくなりますか？","a":"「時間微分が $s$ を掛ける代数操作に対応するため、微分方程式を普通の方程式のように処理できるからです。」"}],"rank":"A","trap":true},
  {"id":130,"category":"1. 一変数微積","title":"フーリエ変換とは何ですか","formula":"F(\\omega)=\\int_{-\\infty}^{\\infty} f(t)e^{-i\\omega t}dt","formulaMust":true,"definition":"関数や信号を周波数成分に分解する積分変換。","oral30":"フーリエ変換は、一見すると不規則で複雑な波やデータを、様々な周波数のサイン波とコサイン波の足し合わせに分解する手法です。","explanation":"関数 $f(t)$ に対して $F(\\omega)=\\int_{-\\infty}^{\\infty} f(t)e^{-i\\omega t}dt$ と定義されます。逆変換 $f(t)=\\frac{1}{2\\pi}\\int_{-\\infty}^{\\infty}F(\\omega)e^{i\\omega t}d\\omega$ によって、周波数領域から元の関数を復元できます。","application":"工学ではノイズ除去などの信号処理に使われます。経済データ分析では、株価や景気変動などの複雑な時系列データから、長期的なトレンドや季節的な周期を抽出するのに役立ちます。","followups":[{"q":"フーリエ級数との違いは何ですか？","a":"「フーリエ級数は周期関数を離散的な周波数の和で表し、フーリエ変換は非周期関数も含めて連続的な周波数スペクトルに分解します。」"},{"q":"なぜ複素指数関数を使うのですか？","a":"「オイラーの公式により、複素指数関数がサイン波とコサイン波を同時に表せるため、計算を一つの式で簡潔に扱えるからです。」"}],"rank":"A","trap":true},

  // --- 第2群 多変数・最適化 ---
  { id: 201, category: "2. 多変数・最適化", title: "偏微分とは何ですか", formula: "f_x = \\frac{\\partial f}{\\partial x}", formulaMust: true, definition: "他の変数を一定とし、1つの変数についての変化率を見る微分。", oral30: "多変数関数で、他の変数を一定とみなして、ある一つの変数についての変化率を見るものです。各要因ごとの影響を分けて分析できます。", explanation: "一変数微分が“全体の変化率”を見るのに対して、偏微分は各要因ごとの影響を分けて見る点が特徴です。", application: "経済学において、価格や需要など複数要因の影響分析に使われます（Ceteris Paribusの概念）。", followups: [{q: "全微分との違いは何ですか？", a: "「偏微分は一変数だけ動かす局所的な変化率を表すのに対し、全微分は全ての変数変化を合わせた全体の変化を表します。」"}, {q: "労働と資本で生産量が決まる時、労働で偏微分したものは何と呼ばれますか？", a: "「『限界労働生産力』です。資本を固定して、労働を1単位増やした時にどれくらい生産量が増えるかを表します」"}], rank: "S" },
  { id: 202, category: "2. 多変数・最適化", title: "なぜ他の変数を固定するのですか", formula: "", definition: "純粋な影響の抽出", oral30: "特定の要因が与える『純粋な影響』を知りたいから。", explanation: "経済現象は多くの要因が絡み合って起きるため、1つだけの要因のインパクトを測るために他を定数とみなします。", application: "", followups: [], rank: "A" },
  { id: 203, category: "2. 多変数・最適化", title: "勾配とは何ですか", formula: "\\nabla f = \\left( \\frac{\\partial f}{\\partial x_1}, \\dots, \\frac{\\partial f}{\\partial x_n} \\right)", formulaMust: true, definition: "各変数方向の偏微分を並べたベクトル。", oral30: "多変数関数において各変数方向の偏微分を並べたベクトルで、関数が最も急に増加する方向を表します。", explanation: "山の斜面で例えると『どの方向に進めば一番急な上り坂になるか』を示す矢印のことです。", application: "機械学習などにおいて、関数を最も効率よく最大化（または最小化）する方向を決定するナビとして機能します。", followups: [{q: "逆に、最も急激に減少する方向を見つけるにはどうすればいい？", a: "「勾配ベクトルの逆向き、つまりマイナスをつけた方向へ進めば、最も急に下ることができます」"}, {q: "勾配ベクトルは、関数の等高線に対してどのような角度を持ちますか？", a: "「等高線に対して常に『垂直（90度）』になります。等高線に沿って動いても高さは変わらないので、一番早く高さを変えるには直角に進むのが最短だからです」"}], rank: "S", trap: true },
  { id: 204, category: "2. 多変数・最適化", title: "なぜ勾配は最も増加する方向なのですか", formula: "", definition: "方向微分係数と最大化", oral30: "各変数の変化率のベクトル和であり、数学的に最大傾斜を向くから。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 205, category: "2. 多変数・最適化", title: "勾配が0とは何を意味しますか", formula: "\\nabla f = \\mathbf{0}", definition: "停留点", oral30: "どの方向に動いても変化しない平坦な場所（停留点）。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 206, category: "2. 多変数・最適化", title: "なぜ勾配=0だけでは十分でないのですか", formula: "", definition: "鞍点の存在", oral30: "鞍点（馬の鞍のような形）の可能性があるため。", explanation: "ある方向からは谷底に見えても、別の方向からは山頂に見える場所があるため、二階微分（ヘッセ行列）で判定する必要があります。", application: "", followups: [], rank: "A" },
  { id: 207, category: "2. 多変数・最適化", title: "制約なし最適化とは何ですか", formula: "", definition: "純粋な極値問題", oral30: "条件に縛られず、関数そのものの純粋な最大・最小を探すこと。", explanation: "", application: "", followups: [], rank: "B" },
  { id: 208, category: "2. 多変数・最適化", title: "制約付き最適化とは何ですか", formula: "", definition: "条件下での極値問題", oral30: "予算や資源などの制限ルールの下で、目的関数を最大化・最小化すること。", explanation: "", application: "", followups: [], rank: "B" },
  { id: 209, category: "2. 多変数・最適化", title: "全微分とは何ですか。（偏微分との違いは？）", formula: "df = \\frac{\\partial f}{\\partial x} dx + \\frac{\\partial f}{\\partial y} dy", definition: "すべての変数が同時に微小変化したときの総変化量。", oral30: "すべての変数が同時に微小変化したときの、関数全体の総変化量。", explanation: "各方向の偏微分（傾き）に、それぞれの実際の微小変化量（dx, dy）を掛けて足し合わせたものになります。", application: "複数の経済的ショックが同時に起きた時の、全体としての市場への影響を計算するのに使います。", followups: [{q: "全微分が0になる方程式（全微分方程式）を見たことはありますか？", a: "「はい、完全微分方程式のことですね。ポテンシャルが存在する物理や経済のシステムを解く際に使われます」"}], rank: "A" },
  { id: 210, category: "2. 多変数・最適化", title: "ヘッセ行列とは何ですか", formula: "H = \\begin{pmatrix} f_{xx} & f_{xy} \\\\ f_{yx} & f_{yy} \\end{pmatrix}", formulaMust: true, definition: "多変数関数のすべての2階偏微分を並べた行列。", oral30: "多変数関数のすべての2階偏微分を成分として並べた正方行列。", explanation: "1変数の「二階微分（曲がり具合）」を多変数の空間に拡張したもので、最適化の仕上げの判定に必須です。", application: "最適化問題を解いたときに、そこが本当に利益最大化（またはコスト最小化）の点なのかを判定します。", followups: [{q: "ヘッセ行列の行列式がプラスで、f_xxもプラスなら、そこは最大値？最小値？", a: "「最小値（谷底）になります。」"}, {q: "ヘッセ行列は通常、何行列になりますか？", a: "「対称行列です。微分する順番を入れ替えても結果が同じになる（$f_{xy} = f_{yx}$）ため、対角線を挟んで対象な形になります」"}], rank: "S" },
  { id: 211, category: "2. 多変数・最適化", title: "多変数関数で、そこが最大（または最小）だとどうやって判定しますか", formula: "", definition: "極値の判定手順", oral30: "勾配が0の停留点を見つけ、その点でのヘッセ行列の符号（正定値など）を調べる。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 212, category: "2. 多変数・最適化", title: "凸最適化とは何ですか", formula: "f(tx + (1-t)y) \\le t f(x) + (1-t) f(y)", definition: "凸関数を最小化する、確実に解が求まる問題。", oral30: "目的関数がお椀のような形（凸関数）をしていて、極小値が必ず全体の最小値（大域的最小値）に一致するという、数学的に非常に解きやすい最適化問題のことです。", explanation: "どんな場所からスタートしても、坂を下っていけば確実に一番底にたどり着けるため、機械学習などで好まれる性質です。", application: "ポートフォリオ最適化や最小二乗法など、実用的なデータ分析のモデルの多くが凸最適化に帰着するように設計されています。", followups: [{q: "逆に、凸ではない（凹凸が入り組んだ）関数の場合、どんな問題が起きますか？", a: "「局所的最小値（小さな谷底）にハマってしまい、全体での本当の最小値（大域的最小値）が見つけられないという問題が起きます」"}, {q: "局所的最小値と大域的最小値の違いは何ですか？", a: "「局所的はその周辺での一番の底、大域的は定義域全体での本当の一番の底のことです。」"}], rank: "B" },
  { id: 213, category: "2. 多変数・最適化", title: "ヤコビアン（ヤコビ行列式）とは何ですか", formula: "J = \\det \\begin{pmatrix} \\frac{\\partial x}{\\partial u} & \\frac{\\partial x}{\\partial v} \\\\ \\frac{\\partial y}{\\partial u} & \\frac{\\partial y}{\\partial v} \\end{pmatrix}", definition: "変数変換に伴う、面積や体積の「拡大・縮小の倍率」。", oral30: "複数の変数を別の座標系に変換する際、元の微小な面積や体積が、新しい座標系で「どれくらい拡大・縮小されるか」という歪みの倍率を表す行列式のことです。", explanation: "重積分などで変数を置き換えるとき、面積のつじつまを合わせるために掛け合わせる補正値です。", application: "統計学において、複雑な確率分布を変数変換して扱いやすくする際（正規分布の証明など）に必須の処理となります。", followups: [{q: "直交座標 (x,y) から極座標 (r,θ) に変換する際のヤコビアンはどうなりますか？", a: "「計算すると r になります。そのため重積分の dxdy は r dr dθ に変わります。」"}], rank: "B" },
  { id: 214, category: "2. 多変数・最適化", title: "陰関数定理とは何ですか", formula: "\\frac{dy}{dx} = - \\frac{F_x}{F_y}", formulaMust: true, definition: "方程式をyについて解かずに、微分の値（傾き）を求める定理。", oral30: "$F(x,y)=0$ という方程式をわざわざ $y=\\dots$ の形（陽関数）に解き直さなくても、元の関数Fをxとyでそれぞれ偏微分した値の比から、直接 $\\frac{dy}{dx}$（傾き）を求められるという強力な定理です。", explanation: "経済学では「効用関数を一定（U=定数）」としたまま、x財とy財の交換比率（限界代替率）を求める際などに、この定理が無意識に使われています。", application: "比較静学（あるパラメータが変化した時に均衡がどう動くか）の分析において、複雑な連立方程式の微小変化を追うための必須ツールです。", followups: [{q: "この定理を使うための条件（分母に関する条件）は何ですか？", a: "「分母にくる $y$ での偏微分 $F_y$ が、その点で $0$ でないことです（0割りを防ぐため）。」"}], rank: "S", trap: true },
  { id: 215, category: "2. 多変数・最適化", title: "重積分とは何ですか", formula: "\\iint_D f(x,y) dxdy", definition: "多変数関数の積分。", oral30: "2つ以上の変数を持つ多変数関数に対する積分です。1変数の積分が「面積」を求めるのに対し、2変数の重積分はグラフの下にできる立体の「体積」を求める操作になります。", explanation: "領域ごとに積分を順番に行う「累次積分」に直して計算します。領域が円形などの場合は極座標へ変数変換すると計算が楽になります。", application: "複数の確率変数が絡む「同時確率密度関数」から、特定の条件を満たす確率を計算する際などに必須となります。", followups: [{q: "変数変換する際に掛ける補正値の名前は何ですか？", a: "「ヤコビアン（ヤコビ行列式）です。」"}], rank: "B" },
  
  // ▼ ここに追加：グリーンの定理
  { id: 216, category: "2. 多変数・最適化", title: "グリーンの定理とは何ですか", formula: "\\oint_C (P dx + Q dy) = \\iint_D \\left( \\frac{\\partial Q}{\\partial x} - \\frac{\\partial P}{\\partial y} \\right) dx dy", definition: "線積分と二重積分を結びつける定理。", oral30: "閉じた曲線に沿った「線積分」と、その曲線が囲む領域内の「二重積分」を結びつける定理です。", explanation: "境界での振る舞い（線積分）から、内部の様子（面積分）を知ることができる強力な定理です。", application: "物理の仕事や流体の循環の計算によく使われます。マクロな経済変数の循環を数理モデル化する際にも応用可能な考え方です。", followups: [{q: "この定理を3次元に拡張したものを何と呼びますか？", a: "「ストークスの定理やガウスの発散定理です。」"}], rank: "B" },

  {"id": 217,"category": "2. 多変数・最適化","title": "法線ベクトルとは何ですか","formula": "\\nabla f","definition": "曲線・曲面に垂直な方向を表すベクトル。","oral30": "法線ベクトルとは、曲線や曲面に対して垂直な方向を表すベクトルです。等高線や等位曲面 $f(x,y)=c$ においては、勾配ベクトル $\\nabla f$ がその法線ベクトルになります。","explanation": "接線方向に動くと関数値は変わらないため、関数値が最も変化する勾配方向は等高線に垂直になります。これが勾配と法線ベクトルのつながりです。","application": "制約付き最適化では、最適点で目的関数の等高線と制約曲線が接し、法線方向、つまり勾配方向が平行になります。","followups": [{"q": "法線ベクトルと接ベクトルの関係は？","a": "「互いに直交します。接ベクトルは曲線に沿う方向、法線ベクトルはそれに垂直な方向です。」"}],"rank": "A"},

  // --- 第3群 ラグランジュ未定乗数法 ---
  { id: 301, category: "3. ラグランジュ", title: "ラグランジュ未定乗数法とは何ですか", formula: "L(x, y, \\lambda) = f(x, y) - \\lambda g(x, y)", formulaMust: true, definition: "制約条件のもとで極値を求める手法。", oral30: "制約条件のもとで、目的関数の極値を求めるための数学的手法。", explanation: "制約関数 $g(x,y)=0$ を、ペナルティ項として目的関数に組み込むことで、連立方程式として解けるようにします。", application: "限られた予算で満足度（効用）を最大化する消費者行動の分析に必須です。", followups: [{q: "これを解く際、Lをどの変数で偏微分して0とおきますか？", a: "「$x, y$ に加えて、設定した $\\lambda$ の3つすべてで偏微分して0とおき、連立方程式を解きます。$\\lambda$で偏微分した式は、元の制約条件そのものになります」"}], rank: "S" },
  { id: 302, category: "3. ラグランジュ", title: "なぜ λg(x,y) を足す（引く）のですか", formula: "", definition: "ペナルティ項としての意味", oral30: "制約を目的関数に『ペナルティ』として組み込むため。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 303, category: "3. ラグランジュ", title: "なぜ勾配が一致するのですか", formula: "", definition: "最適点の幾何学的意味", oral30: "最適点では、目的関数の等高線と制約条件の線が接するから。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 304, category: "3. ラグランジュ", title: "λ は何を意味しますか", formula: "\\lambda = \\frac{\\partial f^*}{\\partial c}", formulaMust: true, definition: "ラグランジュ乗数であり、最適点での制約の限界価値。", oral30: "ラグランジュ乗数と呼ばれ、最適点においては制約の限界価値を表します。つまり、制約を1単位緩めたときに目的関数の最大値がどれだけ増えるかを示します。", explanation: "計算上の係数であると同時に、「あと1円予算が増えたら、どれくらい利益が増えるか」という『影の価格』としての意味も持ちます。", application: "リソースを追加投入したときの費用対効果を示すため、経営判断に直結する重要な数値です。", followups: [{q: "λ=0になった場合、その制約はどういう状態だと言えますか？", a: "「その制約が全く足かせになっていない、例えば予算が余っていて使い切っていない状態です」"}, {q: "環境問題などで、この「影の価格」の考え方はどう使われますか？", a: "「二酸化炭素の排出枠（制約）の『影の価格』を計算することで、排出権取引における適切な価格設定などに直接応用されます。」"}], rank: "S", trap: true },
  { id: 305, category: "3. ラグランジュ", title: "影の価格とは何ですか", formula: "", definition: "潜在価格", oral30: "経済学における、ラグランジュ乗数 λ の呼び名（潜在価格）。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 306, category: "3. ラグランジュ", title: "効用最大化とどう関係しますか", formula: "", definition: "消費者理論への応用", oral30: "予算制約のもとで満足度を最大にする組み合わせを求める計算そのもの。", explanation: "", application: "", followups: [], rank: "S" },

  // --- 第4群 テイラー展開 ---
  { id: 401, category: "4. テイラー展開", title: "テイラー展開とは何ですか", formula: "f(x) \\approx \\sum_{n=0}^{k} \\frac{f^{(n)}(a)}{n!} (x-a)^n", formulaMust: true, definition: "関数を多項式で近似する手法。", oral30: "複雑な関数を、ある点の近くで多項式で近似する方法です。", explanation: "sinやexpなどのそのままでは計算しづらい曲線を、一次（接線）や二次（放物線）の式に落とし込んで解析します。", application: "非線形の経済モデルを線形化したり、リスク管理で価格変動を近似計算する際に多用されます。", followups: [{q: "展開する中心の点を x=0 とした特別なテイラー展開を何と呼びますか？", a: "「マクローリン展開です」"}], rank: "S", trap: true },
  { id: 402, category: "4. テイラー展開", title: "一次近似とは何ですか", formula: "", definition: "接線による近似", oral30: "関数の曲線を、ある点の付近で『接線（直線）』とみなして近似すること。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 403, category: "4. テイラー展開", title: "なぜ接線で近似できるのですか", formula: "", definition: "局所的な線形性", oral30: "ごく狭い範囲で見れば、どんな滑らかな曲線も直線に限りなく近くなるから。", explanation: "", application: "", followups: [], rank: "B" },
  { id: 404, category: "4. テイラー展開", title: "なぜ一次近似だけでは不十分なのですか", formula: "", definition: "曲線の曲がり具合", oral30: "基準点から離れると、直線と実際の曲線のズレ（誤差）が大きくなるから。", explanation: "", application: "", followups: [], rank: "B" },
  { id: 405, category: "4. テイラー展開", title: "二次近似とは何ですか", formula: "", definition: "放物線による近似", oral30: "直線だけでなく、曲がり具合も考慮して『放物線』で近似すること。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 406, category: "4. テイラー展開", title: "二次項は何を表していますか", formula: "", definition: "曲率", oral30: "関数の曲がり具合（二階微分の情報）。", explanation: "", application: "", followups: [], rank: "B" },
  { id: 407, category: "4. テイラー展開", title: "テイラー展開は何に役立ちますか", formula: "", definition: "多項式化", oral30: "解析が困難な関数を、扱いやすい多項式に落とし込めること。", explanation: "", application: "", followups: [], rank: "S" },
  { id: 408, category: "4. テイラー展開", title: "テイラー展開と最適化はどう関係しますか", formula: "", definition: "二階条件の導出", oral30: "極値付近を二次近似することで、最大・最小の判定条件が導かれる。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 409, category: "4. テイラー展開", title: "テイラー展開と経済工学はどうつながりますか", formula: "", definition: "モデルの線形化", oral30: "非線形の複雑な経済現象を、数理的に処理可能な形へ変換する橋渡し。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 410, category: "4. テイラー展開", title: "一次近似はなぜ限界分析とつながるのですか", formula: "", definition: "限界分析との関係", oral30: "限界分析の『1単位の追加的変化』は、微小変化の一次近似そのものだから。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 411, category: "4. テイラー展開", title: "ニュートン法とは何ですか", formula: "x_{n+1} = x_n - \\frac{f(x_n)}{f'(x_n)}", definition: "方程式の解（f(x)=0）を反復計算で探すアルゴリズム。", oral30: "方程式の解を求めるために、ある点での接線を引き、その接線とx軸との交点を次の候補とする計算を繰り返して、徐々に真の解に近づけていく数値計算の手法です。", explanation: "裏側では関数を一次近似（テイラー展開の1次まで）して、直線の方程式の解を求める操作を繰り返しています。", application: "解析的に解けない複雑な方程式の解や、最適化問題（微分の値が0になる点）をコンピュータで高速に見つけ出すアルゴリズムです。", followups: [{q: "ニュートン法が上手く解にたどり着けない（発散してしまう）のはどんなケースですか？", a: "「スタート地点が本当の解から遠すぎる場合や、途中で関数の傾き（微分）が0に近くなって接線が平行になり、次の点が飛んでいってしまうようなケースです」"}], rank: "B" },
  { id: 412, category: "4. テイラー展開", title: "マクローリン展開の具体例 (e^x, sin x, cos x)", formula: "e^x = 1 + x + \\frac{x^2}{2!} + \\dots \\quad \\sin x = x - \\frac{x^3}{3!} + \\dots", formulaMust: true, definition: "x=0を中心としたテイラー展開の代表的な公式。", oral30: "$e^x$ は微分しても形が変わらないため全項がプラスで階乗がつき、$\\sin x$ は奇関数なので奇数乗のみ、$\\cos x$ は偶関数なので偶数乗のみが現れ、それぞれ符号が交互に入れ替わります。", explanation: "この3つはホワイトボードでサラッと書けるようにしておくことが必須です。$e^x$ に $ix$ を代入するとオイラーの公式が導ける点までセットで覚えておくと面接で強いです。", application: "複雑な関数の計算を四則演算に落とし込む際の基本中の基本です。", followups: [{q: "cos x の展開式をホワイトボードに書いてみてください。", a: "「$1 - \\frac{x^2}{2!} + \\frac{x^4}{4!} - \\dots$ となります。（偶数乗のみで符号が交互）」"}, {q: "なぜ sin x の展開式には奇数乗しか出てこないのですか？", a: "「$\\sin x$ は原点対称な奇関数であり、何回微分しても $x=0$ での偶数階の微分係数がすべて0になるためです。」"}], rank: "S", trap: true },
  { id: 413, category: "4. テイラー展開", title: "テイラー展開の「剰余項」とは何ですか", formula: "f(x) = P_n(x) + R_n(x)", definition: "多項式近似した際の「誤差」を表す項。", oral30: "テイラー展開を途中のn次で打ち切った場合に、実際の関数の値と、近似した多項式の値との間に生じる「誤差」の部分のことです。", explanation: "テイラー展開は「無限に足せば完全に一致」しますが、現実には途中で打ち切ります。その際、「この近似はどれくらい正確か（誤差は最大でどれくらいか）」を保証するために剰余項を評価します。", application: "シミュレーションや数値計算において、計算結果が信頼できる範囲にあるかを証明するために使われます。", followups: [{q: "代表的な剰余項の形（〇〇の剰余項）を一つ挙げてください。", a: "「ラグランジュの剰余項です。微分の中間値の定理の応用のような形で表されます。」"}], rank: "B" },

  // --- 第5群 線形代数 ---
  { id: 501, category: "5. 線形代数", title: "ベクトルとは何ですか", formula: "", definition: "量と向き", oral30: "大きさと向きを持つ量。また、複数のデータを一列に並べたもの。", explanation: "", application: "", followups: [], rank: "B" },
  { id: 502, category: "5. 線形代数", title: "単位ベクトルとは何ですか", formula: "", definition: "ノルムが1のベクトル", oral30: "大きさ（長さ・ノルム）がちょうど 1 のベクトル。", explanation: "", application: "", followups: [], rank: "B" },
  { id: 518, category: "5. 線形代数", title: "内積とは何ですか", formula: "\\mathbf{a} \\cdot \\mathbf{b} = \\sum_{i=1}^{n} a_i b_i = |\\mathbf{a}||\\mathbf{b}|\\cos\\theta", formulaMust: true, definition: "2つのベクトルの向きの近さを表すスカラー量。", oral30: "内積とは、2つのベクトルの対応する成分を掛けて足し合わせた値で、幾何学的には2つのベクトルがどれくらい同じ方向を向いているかを表すスカラー量です。", explanation: "内積が正なら同じ方向寄り、0なら直交、負なら反対方向寄りと解釈できます。計算結果がベクトルではなく数値になる点も重要です。", application: "データ分析では類似度や相関、最小二乗法における直交条件、主成分分析などで使われます。特にコサイン類似度は内積をベクトルの長さで割って、向きの近さだけを取り出したものです。", followups: [{q: "内積が0とは何を意味しますか？", a: "「2つのベクトルが直交している、つまり互いに90度で独立した方向を向いていることを意味します。」"}, {q: "内積と外積の違いは何ですか？", a: "「内積の結果はスカラーですが、外積の結果は2つのベクトルに垂直な新しいベクトルです。」"}, {q: "コサイン類似度は内積とどう関係しますか？", a: "「内積をそれぞれのベクトルの長さの積で割ったもので、ベクトルの大きさではなく向きの近さを測ります。」"}], rank: "S", trap: true },
  { id: 503, category: "5. 線形代数", title: "基底とは何ですか", formula: "", definition: "空間を張るベクトル群", oral30: "ある空間のすべての場所を表現するために必要な、独立なベクトルのセット。", explanation: "", application: "", followups: [], rank: "B" },
  { id: 504, category: "5. 線形代数", title: "単位ベクトルと基底の違いは何ですか", formula: "", definition: "状態と役割の違い", oral30: "単位ベクトルは『長さが1』という状態。基底は空間を張る『役割』のこと。", explanation: "", application: "", followups: [], rank: "B" },
  { id: 505, category: "5. 線形代数", title: "次元とは何ですか", formula: "", definition: "独立な情報の数", oral30: "その空間を表現するために必要な、独立な情報（基底ベクトル）の数。", explanation: "", application: "", followups: [], rank: "B" },
  { id: 506, category: "5. 線形代数", title: "行列とは何ですか", formula: "", definition: "変換のルール", oral30: "数を長方形に並べたもの。ベクトルを別のベクトルへ変換する『写像（ルール）』。", explanation: "", application: "", followups: [], rank: "B" },
  { id: 507, category: "5. 線形代数", title: "行列の掛け算とは何ですか", formula: "", definition: "合成写像", oral30: "2つの変換を連続して行う操作（合成写像）。", explanation: "", application: "", followups: [], rank: "B" },
  { id: 508, category: "5. 線形代数", title: "なぜ行列の掛け算は順番を変えるとダメなのですか", formula: "", definition: "非可換性", oral30: "変換の順番が変わると、結果の行き先が変わってしまう（非可換）から。", explanation: "", application: "", followups: [], rank: "B" },
  { id: 509, category: "5. 線形代数", title: "連立方程式と Ax=b の関係は何ですか", formula: "A\\mathbf{x} = \\mathbf{b}", formulaMust: true, definition: "連立方程式の行列表現。", oral30: "複数の式を、行列Aによる変数xの変換結果がbになる、と1つにまとめたもの。", explanation: "バラバラの式をベクトルと行列で一括りにすることで、逆行列を使った全体最適解の計算が一発で可能になります。", application: "複雑な需要・供給の均衡モデルを解く際、変数が増えてもコンピュータで瞬時に計算できる基盤になります。", followups: [{q: "この形式のメリットは、未知数xが何百個に増えてもどうなることですか？", a: "「行列のサイズが大きくなるだけで、$A^{-1}b$ という逆行列を使った解の導き方は全く変わりません。そのため、コンピュータで一気に計算するのに非常に適しています」"}, {q: "逆行列A^-1が存在する場合、解xはどうやって求まりますか？", a: "「$A^{-1}$ を両辺の左から掛けて、$x = A^{-1}b$ で一発で求まります。」"}], rank: "S" },
  { id: 510, category: "5. 線形代数", title: "解がないとはどういうことですか", formula: "", definition: "不能", oral30: "変換先の空間に目標のベクトルbが存在しない（矛盾している）状態。", explanation: "", application: "", followups: [], rank: "B" },
  { id: 511, category: "5. 線形代数", title: "解が無数にあるとはどういうことですか", formula: "", definition: "不定", oral30: "変換によって情報が潰れ、同じbに行く元のベクトルxが無限にある状態。", explanation: "", application: "", followups: [], rank: "B" },
  { id: 512, category: "5. 線形代数", title: "行列式とは何ですか", formula: "\\det(A) = |A|", definition: "空間の拡大・縮小率。", oral30: "行列変換によって空間のボリューム（面積・体積）が何倍になるかを示すスカラー。", explanation: "行列式が0の場合、空間がペチャンコに潰れて次元が下がってしまったことを意味し、逆行列を持たなくなります。", application: "データ分析において、変数間に無駄な重複がなく、システムとして正しく解けるかを判定するチェッカーになります。", followups: [{q: "行列式がマイナスの値になった場合、図形的にはどういう状態ですか？", a: "「空間が裏返しに反転した状態です。鏡写しになったようなイメージです」"}, {q: "固有値と行列式の間には、どんな関係（公式）がありますか？", a: "「行列式は、その行列が持つすべての固有値を掛け合わせた値に等しくなります。」"}], rank: "A" },
  { id: 513, category: "5. 線形代数", title: "行列式が0とは何ですか", formula: "", definition: "特異行列", oral30: "空間がペチャンコに潰れてボリュームが0になり、次元が下がること。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 514, category: "5. 線形代数", title: "逆行列とは何ですか", formula: "A^{-1}", definition: "変換の巻き戻し", oral30: "行列の変換を完全に元に戻す（巻き戻す）行列。", explanation: "", application: "", followups: [], rank: "S" },
  { id: 515, category: "5. 線形代数", title: "なぜ逆行列で元に戻せるのですか", formula: "", definition: "単位行列の生成", oral30: "Aと逆行列A^(-1)を掛けると、何もしない変換（単位行列I）になるから。", explanation: "", application: "", followups: [], rank: "B" },
  { id: 516, category: "5. 線形代数", title: "逆行列が存在しないとはどういうことですか", formula: "", definition: "情報量の喪失", oral30: "情報が潰れてしまい、元の状態を一意に復元できない状態。", explanation: "", application: "", followups: [], rank: "A" },
  
  // ▼ ここを修正：固有値に追撃質問を追加
  { id: 517, category: "5. 線形代数", title: "固有値とは何ですか", formula: "A\\mathbf{x} = \\lambda \\mathbf{x}", formulaMust: true, definition: "向きが変わらない特別なベクトルに対する、長さの倍率。", oral30: "行列変換において、向きが変わらず長さだけが変化するベクトルの『倍率（スカラー）』のことであり、そのシステム固有の振る舞いを表す値です。", explanation: "固有ベクトルというブレない軸に沿って、どれだけのパワー（固有値）で伸縮するかを表します。", application: "主成分分析で「どの軸がデータの情報を一番多く持っているか」を評価する際や、動学モデルの安定性を測る指標になります。", followups: [{q: "固有値を求めるための方程式（特性方程式）を式で言えますか？", a: "「$\\det(A - \\lambda I) = 0$ です。」"}, {q: "固有値に1つでも「0」が含まれていると、その行列の逆行列はどうなりますか？", a: "「行列式はすべての固有値の掛け算なので、1つでも0があると行列式全体も0になります。つまり、空間が潰れてしまうため逆行列は存在しません」"}, {q: "行列を対角化できると何が嬉しいのですか？", a: "「対角成分に固有値が並んだシンプルな形になるため、行列のn乗（長期的な状態の予測）が、単なる各固有値のn乗の計算になり、劇的に楽になります。」"}], rank: "S", trap: true },
  { id: 520, category: "5. 線形代数", title: "固有値0とは何ですか", formula: "", definition: "核（Kernel）の存在", oral30: "その固有ベクトルの方向の情報が完全に潰されてゼロになること。", explanation: "", application: "", followups: [], rank: "A" },
  
  // ▼ ここを修正：線形独立の説明を強化
  { id: 521, category: "5. 線形代数", title: "線形独立とは何ですか", formula: "c_1 \\mathbf{v}_1 + \\dots + c_n \\mathbf{v}_n = \\mathbf{0} \\implies c_1 = \\dots = c_n = 0", definition: "一次独立", oral30: "あるベクトルを、他のベクトルの足し算や定数倍で作ることができない、無駄のない完全に独立した状態のことです。", explanation: "数式では、「線形結合がゼロベクトルになるのは、係数がすべてゼロの時だけ」と定義されます。", application: "分析に使うデータ群の中に、お互いに依存しない独自の要素がしっかり含まれていることを保証します。", followups: [{q: "2つのベクトルが線形独立でない場合、なす角は何度？", a: "「0度または180度（平行）です。」"}], rank: "S" },
  { id: 524, category: "5. 線形代数", title: "直交とは何ですか", formula: "", definition: "内積0", oral30: "ベクトルのなす角が90度で、互いに影響を与え合わない独立した関係。", explanation: "", application: "", followups: [], rank: "A" },
  
  // ▼ ここを修正：ランクの説明を強化
  { id: 525, category: "5. 線形代数", title: "行列のランク（階数）とは何ですか", formula: "\\text{rank}(A)", definition: "独立なベクトル数", oral30: "行列の中に含まれる、互いに線形独立な（ダブりのない）列ベクトルまたは行ベクトルの最大数のことです。", explanation: "行列が持つ「実質的な次元数」や「本質的な情報量」を表します。変数が3つあってもランクが2なら、実質2次元の情報しかありません。", application: "データの中に重複がないかを確認するチェッカーとして機能します。", followups: [{q: "3x3の正則行列のランクはいくつ？", a: "「3（フルランク）です。」"}, {q: "ランクが落ちると何が起きますか？", a: "「行列式が0になり逆行列を持たなくなるため、連立方程式の解が1つに定まらなくなります。」"}], rank: "S" },
  { id: 528, category: "5. 線形代数", title: "コーシー・シュワルツの不等式", formula: "|\\mathbf{a} \\cdot \\mathbf{b}| \\le |\\mathbf{a}||\\mathbf{b}|", definition: "内積の絶対値は、各ベクトルの長さの積以下になるという法則。", oral30: "2つのベクトルの内積の大きさは、それぞれのベクトルの長さを掛け合わせたものより常に小さくなるか等しい、という線形代数の強力な不等式です。", explanation: "内積の公式に現れる cosθ が必ず -1 から 1 の間に収まることから直感的に導かれます。", application: "統計学において、相関係数が必ず「-1 から 1 の間に収まる」ことの数学的な証明にそのまま使われます。", followups: [{q: "この不等式で「等号（＝）」が成り立つのは、2つのベクトルがどんな関係の時ですか？", a: "「2つのベクトルが全く同じ方向を向いている、つまり平行（一方がもう一方の定数倍）の時です」"}, {q: "これを確率変数 X, Y の期待値の形で表すとどうなりますか？", a: "「$E[XY]^2 \\le E[X^2]E[Y^2]$ という形になります。」"}], rank: "B" },
  { id: 529, category: "5. 線形代数", title: "正定値行列とは何ですか（軽く）", formula: "\\mathbf{x}^T A \\mathbf{x} > 0 \\quad (\\mathbf{x} \\neq \\mathbf{0})", definition: "どんなゼロでないベクトルを掛けても、結果が必ずプラスになる行列。", oral30: "どんなベクトルを掛けても二次形式が必ずプラスになる行列のことです。多変数関数の最適化において、ヘッセ行列が正定値であれば、そこが「最小値（谷底）」であると判定できます。", explanation: "1変数の「二階微分がプラス（下に凸）」という概念を、多変数（行列）に拡張したものです。", application: "最適化問題での最小値の判定条件として必須の概念です。", followups: [{q: "逆に、結果が必ずマイナスになる行列を何と呼びますか？", a: "「負定値行列です。」"}, {q: "正定値行列の固有値は、どのような値になりますか？", a: "「すべてプラス（正の実数）になります。」"}], rank: "B" },
  { id: 530, category: "5. 線形代数", title: "行列の対角化とは何ですか", formula: "P^{-1}AP = \\begin{pmatrix} \\lambda_1 & 0 \\\\ 0 & \\lambda_2 \\end{pmatrix}", definition: "行列を、固有値が対角線に並んだ扱いやすい行列に変換すること。", oral30: "正方行列Aに対して、正則行列Pを用いて P^{-1}AP の形にし、対角成分に固有値が並ぶ「対角行列」に変換する操作です。Aがn個の一次独立な固有ベクトルを持つことが条件です。", explanation: "対角行列になると、行列のn乗の計算が単なる各成分のn乗になり、計算が劇的に簡単になります。過去問でも『対角化の条件』が頻出しています。", application: "マルコフ連鎖などで「n年後の状態」といった行列の累乗を計算する際や、微分方程式のシステムを解く際に必須となるテクニックです。", followups: [{q: "対角化できるための必要十分条件は何ですか？", a: "「n次正方行列が、n個の『一次独立な』固有ベクトルを持つことです。」"}, {q: "固有値に重複がある（重解を持つ）場合、必ず対角化できませんか？", a: "「いいえ、重解を持っていても、その固有値に対応する固有ベクトルが複数（重解の数だけ）存在して一次独立であれば対角化可能です。」"}], rank: "S" },
  { id: 531, category: "5. 線形代数", title: "対称行列の対角化（直交対角化）", formula: "P^T A P = D \\quad (P^T = P^{-1})", formulaMust: true, definition: "対称行列は必ず直交行列を用いて対角化できるという性質。", oral30: "元の行列Aが『対称行列（転置しても元のまま）』である場合、必ず対角化が可能であり、さらに変換に使う行列Pを『直交行列』として選ぶことができるという非常に強力な定理です。", explanation: "対称行列の固有値はすべて『実数』になり、異なる固有値に対応する固有ベクトルは必ず『直交する』という美しい性質を持っています。試験で対称行列が出たらボーナス問題です。", application: "統計学における分散共分散行列（対称行列）の主成分分析において、データを無相関な直交軸に回転させる基礎理論となります。", followups: [{q: "直交行列とはどのような行列ですか？", a: "「転置行列が逆行列と等しくなる（$P^T = P^{-1}$）行列のことです。図形的には『回転』や『反転』を表し、ベクトルの長さを変えません。」"}], rank: "S", trap: true },
  { id: 532, category: "5. 線形代数", title: "ケイリー・ハミルトンの定理", formula: "A^2 - (a+d)A + (ad-bc)I = O", definition: "行列自身が、自分の特性方程式を満たすという定理。", oral30: "行列の固有値を求めるための『特性方程式』の変数を、行列そのものに置き換えても、結果が零行列になるという定理です。主に行列の累乗や逆行列を素早く計算するのに使います。", explanation: "2×2行列の場合は上記の公式になります。n次行列にも拡張でき、「行列の高次式を、低次式に次数下げする」ための強力なテクニックです。", application: "対角化が面倒な場合や、対角化できない行列の累乗を計算する際の裏技的なアプローチとして機能します。", followups: [{q: "この定理を使って、正則行列Aの逆行列 A^-1 をどうやって求めますか？", a: "「定理の式 $A^2 - (a+d)A + (ad-bc)I = O$ の両辺に $A^{-1}$ を掛け、$A^{-1} = \\dots$ の形に変形して求めます。」"}], rank: "B" },
  { id: 533, category: "5. 線形代数", title: "ランクと連立方程式の解（Ax=b）にはどんな関係がありますか", formula: "", definition: "ルーシェ・カペリの定理", oral30: "係数行列Aと、拡大係数行列(A|b)のランクを比較することで解の有無を判定できる（ルーシェ・カペリの定理）。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 534, category: "5. 線形代数", title: "転置行列とは何ですか", formula: "(A^T)_{ij} = A_{ji}", definition: "行と列を入れ替えた行列。", oral30: "行列の行と列をそっくり入れ替えてできる新しい行列のことです。", explanation: "主対角線（左上から右下への対角線）を軸にして、成分をパタンと折り返した（対称移動させた）行列になります。", application: "データの方向を変えたり、対称行列（転置しても元のままの行列）の定義や、内積を行列の積で表現する際（ベクトルの内積は $x^T y$）に多用されます。", followups: [{q: "行列の積の転置 $(AB)^T$ はどう展開されますか？", a: "「順番が入れ替わって $B^T A^T$ になります。」"}], rank: "A" },
  { id: 535, category: "5. 線形代数", title: "外積とは何ですか", formula: "\\mathbf{a} \\times \\mathbf{b}", definition: "2つのベクトルに直交するベクトルを作る演算。", oral30: "空間内の2つのベクトルから、その両方に対して垂直（直交）な新しいベクトルを作り出す演算です。内積と違い、計算結果はベクトルになります。", explanation: "作られたベクトルの「長さ」は、元の2つのベクトルが張る「平行四辺形の面積」と等しくなります。", application: "経済やデータサイエンスの理論よりも、物理学（トルクや電磁気）や3Dグラフィクスにおいて多用される概念です。", followups: [{q: "内積と外積の計算結果の決定的な違いは何ですか？", a: "「内積の結果は『スカラー（単なる数値）』ですが、外積の結果は『ベクトル』になる点です。」"}], rank: "B" },
  { id: 536, category: "5. 線形代数", title: "ガウスの消去法（掃き出し法）とは何ですか", formula: "", definition: "行列の行基本変形を用いたアルゴリズム。", oral30: "連立方程式の係数を行列の形に並べ、「行同士を足し引きする」などの基本変形を繰り返すことで、機械的に解を求めるアルゴリズムです。", explanation: "対角成分を1、それ以外を0にしていく（単位行列に近づける）プロセスです。連立方程式を解く以外にも、逆行列や行列のランク（階数）を求めるのにも使われます。", application: "コンピュータプログラムにおいて、大規模な連立方程式や逆行列を計算させる際の最も標準的な手法です。", followups: [{q: "行の基本変形でやっていい3つの操作とは？", a: "「①ある行を定数倍する、②2つの行を入れ替える、③ある行の定数倍を別の行に足す、の3つです。」"}], rank: "A" },
  { id: 537, category: "5. 線形代数", title: "余因子展開とクラーメルの公式", formula: "x_i = \\frac{|A_i|}{|A|}", definition: "行列式を用いた逆行列や連立方程式の解法。", oral30: "『余因子展開』は大きな行列式を小さな行列式の計算に分解していく手法で、『クラーメルの公式』はそれら行列式の値を使って連立方程式の解を直接求める公式です。", explanation: "手計算では2次や3次の行列で逆行列を求めるのに便利ですが、変数の数が増えると計算量が爆発的に増えるため、コンピュータでの計算にはガウスの消去法が好まれます。", application: "小規模な経済モデル（マクロ経済のIS-LMモデルなど）の連立方程式を、パラメータ文字のまま解析的に解く際によく使われます。", followups: [], rank: "B" },

  {"id": 538,"category": "5. 線形代数","title": "正則行列とは何ですか","formula": "\\det(A) \\ne 0","formulaMust": true,"definition": "逆行列を持つ正方行列。","oral30": "正則行列とは、逆行列を持つ正方行列のことです。判定条件としては、行列式が0でないこと、ランクが最大であること、連立方程式 $Ax=b$ の解が一意に定まることと同値です。","explanation": "行列式が0でないということは、線形変換で空間が潰れていないという意味です。そのため元のベクトルを一意に復元できます。","application": "経済モデルの連立方程式や回帰の正規方程式で、解が一意に定まるかを判定する基礎になります。","followups": [{"q": "正則でない行列を何と呼びますか？","a": "「特異行列です。行列式が0で、逆行列を持ちません。」"}],"rank": "S"},
  {"id": 539,"category": "5. 線形代数","title": "直交行列・対称行列・交代行列とは何ですか","formula": "Q^TQ=I, \\quad A^T=A, \\quad A^T=-A","formulaMust": true,"definition": "転置行列を使って定義される代表的な特殊行列。","oral30": "直交行列は $Q^TQ=I$ を満たし、長さや角度を保つ行列です。対称行列は $A^T=A$ を満たす行列、交代行列は $A^T=-A$ を満たす行列です。いずれも転置によって特徴づけられます。","explanation": "対称行列は直交対角化できる重要な行列です。交代行列は対角成分が必ず0になります。直交行列は回転や反転を表し、数値計算でも安定です。","application": "主成分分析では対称行列である分散共分散行列を直交対角化し、互いに直交する情報軸を取り出します。","followups": [{"q": "交代行列の対角成分はなぜ0ですか？","a": "「$a_{ii}=-a_{ii}$ となるので、$2a_{ii}=0$、つまり $a_{ii}=0$ です。」"}],"rank": "S","trap": true},

  // --- 第6群 最小二乗・回帰 ---
  { id: 601, category: "6. 最小二乗・回帰", title: "最小二乗法とは何ですか", formula: "S = \\sum_{i=1}^n (y_i - (ax_i + b))^2 \\to \\min", formulaMust: true, definition: "誤差の二乗和を最小にする直線を引く手法。", oral30: "データと予測値のズレ（誤差）の二乗の合計を最も小さくする直線を引く手法。", explanation: "二乗することでプラスマイナスの相殺を防ぎつつ、大きな誤差に重いペナルティを与え、かつ微分がしやすいというメリットがあります。", application: "回帰分析のモデルを作る際の、最も標準的で強力な計算アルゴリズムです。", followups: [{q: "なぜ『絶対値』ではなく『二乗』を使うのですか？", a: "「絶対値はV字型のグラフになって底が尖るため微分がしづらいですが、二乗なら綺麗な放物線（二次関数）になるため、微分して0とおいて最小値を求めるのが非常に簡単だからです」"}, {q: "誤差関数を最小化するために、具体的にどんな数学の操作（微分）をしますか？", a: "「誤差関数を各パラメータ（傾きや切片）でそれぞれ偏微分し、すべてを0とおいた連立方程式（正規方程式）を解きます。」"}], rank: "S" },
  { id: 602, category: "6. 最小二乗・回帰", title: "なぜ誤差を二乗するのですか", formula: "", definition: "相殺の防止と微分可能性", oral30: "プラスとマイナスの相殺を防ぎ、大きなズレに重いペナルティを与えるため。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 603, category: "6. 最小二乗・回帰", title: "なぜ微分して0にすると最小値になるのですか", formula: "", definition: "凸関数の性質", oral30: "誤差の二乗和が下に凸の二次関数（放物線）になるため。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 604, category: "6. 最小二乗・回帰", title: "微分で最小二乗法をどう解きますか", formula: "", definition: "正規方程式の導出過程", oral30: "誤差関数を各パラメータ（傾きや切片）で偏微分し、=0の連立方程式を解く。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 605, category: "6. 最小二乗・回帰", title: "射影と最小二乗法はどう関係しますか", formula: "", definition: "幾何学的解釈", oral30: "最小二乗法は、目標データを説明変数の空間へ『直交射影』する操作そのもの。", explanation: "", application: "", followups: [], rank: "B" },
  { id: 606, category: "6. 最小二乗・回帰", title: "なぜ誤差が直交するのですか", formula: "", definition: "最短距離の原理", oral30: "平面内の点で目標に一番近い（最短距離）のは、垂直に下ろした点だから。", explanation: "", application: "", followups: [], rank: "B" },
  { id: 607, category: "6. 最小二乗・回帰", title: "正規方程式とは何ですか", formula: "", definition: "最適解の行列表現", oral30: "最小二乗法の最適パラメータを一発で求めるための、行列の連立方程式。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 608, category: "6. 最小二乗・回帰", title: "回帰分析とは何ですか", formula: "", definition: "モデルの当てはめ", oral30: "変数間の関係性を数式モデルに当てはめ、予測や要因分析を行う手法。", explanation: "", application: "", followups: [], rank: "S" },
  { id: 609, category: "6. 最小二乗・回帰", title: "回帰分析と最小二乗法の違いは何ですか", formula: "", definition: "分析の目的と、そのための計算手段。", oral30: "回帰分析は『目的・分析手法』、最小二乗法はそのための『計算手段』。", explanation: "家を建てる（回帰分析）ための、トンカチ（最小二乗法）という関係性です。", application: "実務では、データの特徴によって最小二乗法以外のトンカチ（他の推定法）を使うこともあります。", followups: [{q: "回帰分析における「説明変数」と「目的変数」の違いを説明してください。", a: "「説明変数は原因となる変数（x）、目的変数は結果として予測したい変数（y）です。」"}, {q: "最小二乗法は外れ値（異常なデータ）に対して強いですか？弱いですか？", a: "「弱いです。誤差を二乗して評価するため、1つでも遠く離れた外れ値があると、その二乗のペナルティが大きくなりすぎて、直線全体がそっちに引っ張られてしまいます」"}], rank: "A" },
  { id: 610, category: "6. 最小二乗・回帰", title: "相関とは何ですか", formula: "", definition: "連動性", oral30: "2つのデータがどれくらい連動して動くかを表す関係性の強さ。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 611, category: "6. 最小二乗・回帰", title: "相関と因果はどう違いますか", formula: "", definition: "連動することと、原因・結果であることの違い。", oral30: "相関は『一緒に動くこと』、因果は『Aが原因でBが起こること』。", explanation: "例えば「広告費」と「売上」に正の相関があっても、広告の効果で売上が上がった（因果）のか、売上が良い時期だから広告を多く出せた（逆の因果）のかは式だけでは分かりません。", application: "データ分析の「見せかけの相関」に騙されて、誤ったビジネスの意思決定をしないために最も警戒すべき概念です。", followups: [{q: "広告費と売上の背後にあるかもしれない、第3の要因（交絡因子）の例を挙げられますか？", a: "「例えば『季節』や『ボーナス月』です。ボーナス月だから売上が上がり、同時に広告費も多く投入していただけで、直接の因果はないというケースが考えられます」"}, {q: "因果関係を正しく証明するためには、実務でどんなアプローチをとりますか？", a: "「ランダム化比較試験（A/Bテスト）を行ったり、操作変数法などの統計的因果推論の手法を用いて、純粋な効果を切り分けます。」"}], rank: "S", trap: true },

  {"id": 612,"category": "6. 最小二乗・回帰","title": "相関関係と因果関係の数学的・論理的違いは何ですか","formula": "\\operatorname{Cov}(X,Y) \\ne 0 \\;\\not\\Rightarrow\\; X \\to Y","formulaMust": true,"definition": "相関は同時に動く統計的関係、因果は介入した時に結果が変わる論理的・構造的関係。","oral30": "数学的には、相関は共分散や相関係数が0でないという『一緒に動く関係』です。一方、因果は $X$ を変化させる介入を行ったときに $Y$ が変化するという構造的な関係です。相関があっても、交絡因子や逆因果があるため、因果とは限りません。","explanation": "相関は観測データの対称的な関係ですが、因果は方向を持つ非対称な関係です。$X$ と $Y$ が相関していても、$Z$ が両方を動かしているだけなら、$X$ から $Y$ への因果とは言えません。","application": "政策評価やマーケティングでは、単なる相関ではなく、介入・実験・操作変数などで因果効果を識別する必要があります。","followups": [{"q": "なぜ相関係数だけでは因果を証明できないのですか？","a": "「相関係数は同時変動の強さだけを表し、どちらが原因か、第三の要因があるかを区別できないからです。」"}],"rank": "S","trap": true},

  // --- 第7群 確率統計 ---
  { id: 701, category: "7. 確率・統計", title: "確率とは何ですか", formula: "", definition: "不確実性の尺度", oral30: "ある事象が起こる『期待される割合』や『不確実性の度合い』。", explanation: "", application: "", followups: [], rank: "B" },
  { id: 702, category: "7. 確率・統計", title: "期待値とは何ですか", formula: "E[X] = \\sum x_i P(x_i)", formulaMust: true, definition: "確率を考慮した平均値。", oral30: "起こりうるすべての結果に対して、それぞれの確率を掛けて足し合わせた「平均的に期待される見込みの値」のことです。", explanation: "宝くじで「1枚買ったら平均していくら戻ってくるか」という数値です。", application: "投資案件を評価する際、リターンの期待値がプラスかマイナスかで、その投資を実行すべきかの基準になります。", followups: [{q: "期待値がマイナスの投資やゲームに参加する合理的な理由はありますか？", a: "「保険がその代表例です。期待値としては損をしますが、万が一の莫大な損失（家が燃えるなど）を回避するために、安心という価値を買っています」"}, {q: "確率変数の定数倍 aX の期待値 E[aX] はどう変形できますか？", a: "「定数aはそのまま外に出せるので、$aE[X]$ となります。」"}], rank: "S" },
  { id: 703, category: "7. 確率・統計", title: "分散とは何ですか", formula: "V[X] = E[(X - \\mu)^2] = E[X^2] - (E[X])^2", formulaMust: true, definition: "平均からの散らばり度合い。", oral30: "データが平均値（期待値）からどれくらい散らばっているか、ブレているかを示す指標です。", explanation: "平均との差を二乗して平均をとることで計算されます。これをルートに戻したものが標準偏差です。", application: "金融工学において「分散＝リスクの大きさ」です。同じ期待値でも、分散が大きい資産ほどハイリスクと見なされます。", followups: [{q: "分散を計算する時、なぜ平均との差を「二乗」するのですか？", a: "「そのまま足すと、プラスとマイナスのブレが相殺して必ず0になってしまうからです。二乗することで全てプラスになり、かつ計算（微分など）がしやすくなります」"}, {q: "分散の公式 E[X^2] - (E[X])^2 を口頭で説明できますか？", a: "「『二乗の平均』から『平均の二乗』を引いたもの、と覚えられます。」"}], rank: "S" },
  { id: 705, category: "7. 確率・統計", title: "条件付き確率とは何ですか", formula: "P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}", definition: "ある事象が起こったという前提の下で、別の事象が起こる確率。", oral30: "「事象Bがすでに起こった」という新しい情報（条件）が与えられた時に、事象Aが起こる確率のことです。ベイズの定理の基礎になります。", explanation: "全体の確率の中で考えるのではなく、前提条件によって絞り込まれた世界の中で確率を計算し直す概念です。", application: "特定の経済指標が悪化したという条件下で、株価が暴落するリスクを評価するような実践的な分析で使います。", followups: [{q: "ベイズの定理を条件付き確率を使って説明できますか？", a: "「$P(B|A) = \\frac{P(A|B)P(B)}{P(A)}$ です。新しい情報が入ったときに事後確率をアップデートするために使います。」"}, {q: "事象AとBが独立の場合、P(A|B) はどうなりますか？", a: "「ただの $P(A)$ になります。Bが起こったという情報が、Aの確率に一切影響を与えないからです」"}], rank: "S" },
  { id: 706, category: "7. 確率・統計", title: "信頼区間とは何ですか", formula: "", definition: "区間推定", oral30: "『真の値はこの範囲に高確率で収まっているだろう』という幅を持たせた推定。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 707, category: "7. 確率・統計", title: "確率変数とは何ですか", formula: "", definition: "確率的な値をとる変数", oral30: "結果が出るまでどんな値をとるか分からないが、値ごとの「確率」が決まっている変数。", explanation: "", application: "", followups: [], rank: "A" },
  { id: 711, category: "7. 確率・統計", title: "正規分布とはどんな分布ですか。なぜ重要なんですか。", formula: "f(x) = \\frac{1}{\\sqrt{2\\pi\\sigma^2}} e^{-\\frac{(x-\\mu)^2}{2\\sigma^2}}", formulaMust: true, definition: "自然界に最もよく現れる釣鐘型の分布。", oral30: "平均を中心に左右対称な釣鐘型を描く確率分布。自然界や社会で最も頻繁に現れる。", explanation: "「平均」と「分散（標準偏差）」の2つのパラメータだけで、グラフの形が完全に決定されます。", application: "データ分析や金融工学の多くが、「データの誤差や価格の変動は正規分布に従う」という前提で計算式を組んでいます。", followups: [{q: "正規分布において、平均±1標準偏差(1σ)の中にデータ全体の約何％が収まりますか？", a: "「約68%です。ちなみに2σの中には約95%が収まります」"}, {q: "現実の株価の変動は、綺麗な正規分布と比べてどんな違いがありますか？", a: "「現実の市場では、極端な暴落や暴騰が正規分布の予測よりも頻繁に起きる『ファットテール（裾野が厚い）』という特徴があります。」"}], rank: "S" },
  { id: 712, category: "7. 確率・統計", title: "仮説検定における「帰無仮説」と「対立仮説」とは何ですか", formula: "H_0 \\text{ vs } H_1", definition: "否定したい仮説と、主張したい仮説。", oral30: "帰無仮説は「差がない」とする仮定。対立仮説は「差がある」と主張したい仮説。", explanation: "背理法のような考え方で、統計的にエビデンスを示すための基本的なフレームワークです。", application: "新しいマーケティング施策を打った時に、売上の増加が「単なる偶然」なのか「本当に施策の効果」なのかを白黒つけるのに使います。", followups: [{q: "帰無仮説を捨てる基準となる確率のことを何と呼びますか？", a: "「有意水準（例えば5%など）と呼びます。」"}, {q: "p値が有意水準より「小さい」とき、帰無仮説はどうなりますか？", a: "「帰無仮説のもとでこんなデータが出るのはレアケースだと判断して『帰無仮説を棄却』します。つまり、対立仮説（自分の主張）を支持します」"}], rank: "A" },
  { id: 713, category: "7. 確率・統計", title: "大数の法則と中心極限定理の違い", formula: "\\bar{X} \\to \\mu, \\quad Z \\to N(0,1)", definition: "サンプルサイズを大きくした時の、平均値の「近づき先」と「分布の形」。", oral30: "『大数の法則』は、サンプルを増やすと標本平均が真の平均（母平均）に限りなく近づくという法則です。『中心極限定理』は、元のデータがどんな分布であっても、サンプルを足し合わせた平均の「分布の形」が、正規分布に近づくという定理です。", explanation: "「どこに近づくか（値）」を保証するのが大数、「どんな形になるか（分布）」を保証するのが中心極限定理です。統計的推測はこの2大定理の上に成り立っています。", application: "アンケート調査や製品検査で、一部のサンプル（標本）から全体（母集団）の性質を確率的に推測して意思決定する際の根拠となります。", followups: [{q: "サイコロを振る回数を増やすとどうなるか、この2つの定理を使って説明して", a: "「大数の法則により、出た目の平均値は次第に3.5に近づきます。さらに中心極限定理により、その『平均値のばらつき方（ヒストグラム）』を描くと、3.5を中心とした綺麗な釣鐘型（正規分布）になります。」"}], rank: "S" },
  { id: 714, category: "7. 確率・統計", title: "推定量の一致性と不偏性の違い", formula: "E[\\hat{\\theta}] = \\theta \\quad (\\text{不偏})", definition: "良い推定量の持つべき2つの性質。", oral30: "『不偏性』は、推定量の期待値（平均的な結果）が真の値に一致すること、つまり「偏りがない」ことです。『一致性』は、サンプルサイズを無限に大きくすれば、推定量が真の値そのものに限りなく近づく（大数の法則が成り立つ）性質です。", explanation: "ダーツに例えると、不偏性は「たくさん投げた重心が真ん中にある（けどバラけているかも）」、一致性は「投げる回数を増やすほど、矢が真ん中に一点集中していく」というイメージです。", application: "回帰分析などで使われる最小二乗推定量は、この「不偏性」と「一致性（および有効性）」を満たす最良の推定量（BLUE）であることが証明されています。", followups: [{q: "標本分散を計算するとき、n ではなく n-1 で割るのはなぜですか？", a: "「nで割ると、真の分散よりも少し小さめに見積もってしまう『偏り』が出るため、n-1で割ることで『不偏性（期待値が真の分散と一致する）』を持たせるためです。（これを不偏分散と呼びます）」"}], rank: "S", trap: true },
  { id: 715, category: "7. 確率・統計", title: "ベイズの定理", formula: "P(A \\mid B) = \\frac{P(B \\mid A) P(A)}{P(B)}", formulaMust: true, definition: "結果から原因の確率を逆算する定理。", oral30: "ある結果（B）が観測されたという新しい情報をもとに、その原因（A）が起きていた事後確率を、事前の確率からアップデートして求めるための定理です。", explanation: "「病気の検査で陽性が出た時、本当に病気である確率は？」といった、直感と実際の確率がズレやすい問題（条件付き確率の逆）を正確に計算できます。", application: "スパムメールの判定フィルターや、機械学習のベイズ推定、不確実な情報下での意思決定など、現代のデータサイエンスの根幹をなす定理です。", followups: [{q: "ベイズの定理における『事前確率』と『事後確率』を、検査の例で説明してください。", a: "「事前確率は『検査前に持っていた、その人が病気である確率（罹患率）』、事後確率は『陽性という結果が出た後にアップデートされた、本当に病気である確率』です。」"}], rank: "S" },
  { id: 716, category: "7. 確率・統計", title: "有意水準（やp値）とは何ですか", formula: "", definition: "検定の基準", oral30: "有意水準は「帰無仮説を捨てる基準の確率」。p値は「帰無仮説が正しいと仮定した時に、今のデータが偶然得られる確率」。", explanation: "", application: "", followups: [], rank: "A" },

  {"id": 717,"category": "7. 確率・統計","title": "ド・モルガンの法則とは何ですか","formula": "(A \\cup B)^c = A^c \\cap B^c, \\quad (A \\cap B)^c = A^c \\cup B^c","formulaMust": true,"definition": "和集合・共通部分と補集合の関係を表す法則。","oral30": "ド・モルガンの法則は、『AまたはBでない』は『Aでなく、かつBでない』に等しく、『AかつBでない』は『Aでない、またはBでない』に等しいという集合の法則です。","explanation": "確率では余事象を使う計算で非常によく使います。論理式では、否定が中に入ると AND と OR が入れ替わる、と覚えると整理しやすいです。","application": "複雑な確率事象を補集合に変形して計算しやすくする時や、条件分岐の論理を整理する時に使います。","followups": [{"q": "論理記号で言うとどうなりますか？","a": "「$\\neg(P\\lor Q)=\\neg P\\land \\neg Q$、$\\neg(P\\land Q)=\\neg P\\lor \\neg Q$ です。」"}],"rank": "A"},

  // --- 第8群 微分方程式 ---
  { id: 802, category: "8. 微分方程式", title: "変数分離形とは何ですか", formula: "\\frac{dy}{dt} = g(t)h(y)", definition: "変数ごとに辺を分けて積分する解法。", oral30: "微分方程式の中で、tの式とyの式を掛け算の形に分解でき、左辺にy、右辺にtをまとめて両辺を積分することで解ける最も基本的な形です。", explanation: "経済学の成長モデルなどで、変化率が現在の規模に比例する（$\\frac{dy}{dt} = ky$）ようなケースは変数分離形で簡単に解けます。", application: "複利計算や人口増加モデルなど、最も基本的な動学モデルの導出に使われます。", followups: [{q: "$\\frac{dy}{dt} = y$ の一般解はどうなりますか？", a: "「$y = Ce^t$ です。（$C$は積分定数）」"}], rank: "A" },
  { id: 803, category: "8. 微分方程式", title: "一般解と特殊解の違いは何ですか", formula: "", definition: "積分定数の有無", oral30: "一般解は積分定数を含んだ「無数の関数の集まり」であり、特殊解は初期条件などが与えられて積分定数が特定された「1つの具体的な関数」のことです。", explanation: "微分方程式を解くと最初は必ず一般解が出ます。現実のシミュレーションをするには、「$t=0$ のとき $y=100$ だった」というような初期条件を使って特殊解を求める必要があります。", application: "将来予測のシミュレーションを行う際、スタート地点のデータ（初期条件）を代入して特殊解を求めるプロセスが必須になります。", followups: [], rank: "A" },
  { id: 801, category: "8. 微分方程式", title: "微分方程式とは何ですか", formula: "\\frac{dy}{dt} = f(y, t)", formulaMust: true, definition: "未知の「関数」と「導関数」を含む方程式。", oral30: "普通の方程式が『特定の数字』を当てるクイズだとすれば、微分方程式は「変化のルール」から「元の関数の形そのもの」を復元するクイズです。", explanation: "時間変化を表す動学的なシステムを数式化するための最強のツールです。", application: "経済成長モデルにおいて、資本や人口が時間とともにどう変化し、最終的に定常状態に落ち着くのかというシミュレーションに使われます。", followups: [{q: "微分方程式を解く際に、スタート地点の条件（t=0の時の値）を何と呼びますか？", a: "「初期条件です。これがないと、積分定数（C）が残ったままの一般解しか求まらず、具体的な軌道が確定しません」"}, {q: "2階の微分方程式の解が「波のように振動する」のは、特性方程式の解がどんな数の時ですか？", a: "「解が虚数（複素数）になる時です。オイラーの公式により三角関数が現れるため振動します。」"}], rank: "A" },

  // ▼ ここに追加：1階線形微分方程式
  { id: 808, category: "8. 微分方程式", title: "1階線形微分方程式の解法", formula: "y' + P(x)y = Q(x)", formulaMust: true, definition: "積分因子を用いた一般解の公式。", oral30: "未知関数 y とその微分 y' が共に1次である微分方程式です。積分因子 $e^{\\int P(x)dx}$ を両辺に掛けることで、左辺を積の微分の形にまとめ、公式的に一般解を求めることができます。", explanation: "九大などの数学試験でも頻出の形です。同次形（$Q(x)=0$）の場合は変数分離法でも解けます。", application: "資本蓄積のモデルなど、減衰（$P(x)y$）と外部からの投入（$Q(x)$）が同時に存在するシステムの解析に使われます。", followups: [{q: "同次形と非同次形の違いは何ですか？", a: "「右辺の $Q(x)$ が 0 の場合が同次形、0でない場合が非同次形です。」"}], rank: "A" },

  // --- 第9群 経済学基礎 ---

const buildInterviewPracticeCards = (sections) => sections.map(section => {
  const override = interviewPracticeCardOverrides[section.id] || {};
  const fallbackAnswer = (section.body || []).slice(0, 2).join(" ");
  return {
    id: `guide-practice-${section.id}`,
    sectionId: section.id,
    category: "面接資料",
    rank: "S",
    title: section.isEdited ? `${section.title}について面接で説明してください` : (override.title || `${section.title}について面接で説明してください`),
    oral30: section.isEdited ? (fallbackAnswer || override.oral30 || section.title) : (override.oral30 || fallbackAnswer || section.title),
    explanation: [...(section.body || []), ...(section.bullets || [])].join("\n"),
    followups: override.followups || GUIDE_COMMON_FOLLOWUPS
  };
});

        displayMode: isDisplay,

    } catch (e) {

    }
  };

  const renderTextWithMath = (text) => {
    if (!text || typeof text !== 'string') return text;
    const parts = text.split(/(\$.*?\$)/g);
    return parts.map((part, index) => {
      if (part.startsWith('$') && part.endsWith('$')) {
        const math = part.slice(1, -1);
        return <span key={index} className="inline-block mx-0.5">{renderFormula(math, false)}</span>;

      return <span key={index}>{part}</span>;
    });
  };

  const dueCardIds = useMemo(() => {
    const ids = new Set();
    const intervals = [1, 3, 7, 14, 30];
    mergedQuizData.forEach(q => {
      const id = String(q.id);
      let consecutiveMastered = 0;
      let nextReviewDate = null;
      let lastStudiedDate = null;
      const sortedDates = Object.keys(dailyHistory).sort();
      for (const date of sortedDates) {
        if (date > selectedDate) continue;
        const status = dailyHistory[date]?.[id];
        if (!status) continue;
        lastStudiedDate = date;
        if (status === 'review') {
          consecutiveMastered = 0;
          const d = new Date(date); d.setDate(d.getDate() + 1);
          nextReviewDate = d.toISOString().split('T')[0];
        } else if (status === 'mastered') {
          consecutiveMastered += 1;
          const interval = intervals[Math.min(consecutiveMastered - 1, intervals.length - 1)];
          const d = new Date(date); d.setDate(d.getDate() + interval);
          nextReviewDate = d.toISOString().split('T')[0];
        }
      }
      if (nextReviewDate && selectedDate >= nextReviewDate && lastStudiedDate !== selectedDate) {
        ids.add(q.id);
      }
    });
    return ids;
  }, [dailyHistory, selectedDate, mergedQuizData]);

    const scores = {};
    const details = {};

      const id = String(q.id);
      let reviewCount = 0;
      let masteredCount = 0;
      let lastStatus = null;
      let lastDate = null;

      Object.keys(dailyHistory).sort().forEach(date => {
        const status = dailyHistory[date]?.[id];
        if (!status) return;
        lastStatus = status;
        lastDate = date;
        if (status === 'review') reviewCount += 1;
        if (status === 'mastered') masteredCount += 1;
      });

      const checks = checklists[q.id] || {};
      const missingChecks = q.category !== "0. 志望理由・面接"
        ? ['def', 'mean', 'eco'].filter(key => !checks[key]).length
        : 0;

      let score = (reviewCount * 4) - (masteredCount * 1.5);
      if (lastStatus === 'review') score += 3;
      if (dueCardIds.has(q.id)) score += 2;
      score += missingChecks * 0.6;

      if (reviewCount > 0 && score > 0) {
        scores[q.id] = score;
        details[q.id] = { reviewCount, masteredCount, lastStatus, lastDate, missingChecks, score };
      }
    });

    return {
      ids: new Set(Object.keys(scores).map(Number)),
      scores,
      details,
      count: Object.keys(scores).length
    };
  }, [dailyHistory, checklists, dueCardIds, mergedQuizData]);

      rankB: { total: 0, mastered: 0 },
      categories: {}
    };

    mergedQuizData.forEach(q => {
      const isMastered = allMasteredIds.has(q.id);
      
      stats.total.total++;
      if (isMastered) stats.total.mastered++;

      if (q.rank === 'S') {
        stats.rankS.total++;
        if (isMastered) stats.rankS.mastered++;
      }
      if (q.rank === 'A') {
        stats.rankA.total++;
        if (isMastered) stats.rankA.mastered++;
      }
      if (q.rank === 'B') {
        stats.rankB.total++;
        if (isMastered) stats.rankB.mastered++;
      }

      if (!stats.categories[q.category]) {
        stats.categories[q.category] = { total: 0, mastered: 0 };
      }
      stats.categories[q.category].total++;
      if (isMastered) stats.categories[q.category].mastered++;
    });

    return stats;
  }, [allMasteredIds, mergedQuizData]);

  const last7DaysStats = useMemo(() => {
    const stats = [];
    let maxCount = 0;
    let weeklyTotal = 0;
    
    const targetDate = new Date(selectedDate);
    
    for (let i = 6; i >= 0; i--) {
      const d = new Date(targetDate);
      d.setDate(d.getDate() - i);
      const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      
      const dayRecord = dailyHistory[dateStr] || {};
      let mastered = 0;
      let review = 0;
      Object.values(dayRecord).forEach(status => {
        if (status === 'mastered') mastered++;
        if (status === 'review') review++;
      });
      
      const total = mastered + review;
      if (total > maxCount) maxCount = total;
      weeklyTotal += total;
      
      stats.push({ 
        date: dateStr, 
        displayDate: `${d.getMonth() + 1}/${d.getDate()}`, 
        mastered, 
        review, 
        total 
      });
    }
    return { stats, maxCount, weeklyTotal };

  }), [guideMarks]);

  const motivationTimerTotal = useMemo(() => MOTIVATION_TIMER_PHASES.reduce((sum, phase) => sum + phase.seconds, 0), []);
  const motivationElapsed = motivationTimerTotal - motivationTimeLeft;
  const motivationProgress = Math.min(100, Math.max(0, Math.round((motivationElapsed / motivationTimerTotal) * 100)));
  const motivationTimerText = `${String(Math.floor(motivationTimeLeft / 60)).padStart(2, '0')}:${String(motivationTimeLeft % 60).padStart(2, '0')}`;
  const motivationPhaseInfo = useMemo(() => {
    let cursor = 0;
    for (let index = 0; index < MOTIVATION_TIMER_PHASES.length; index += 1) {
      const phase = MOTIVATION_TIMER_PHASES[index];
      const nextCursor = cursor + phase.seconds;
      if (motivationElapsed < nextCursor || index === MOTIVATION_TIMER_PHASES.length - 1) {
        return {
          index,
          phase,
          phaseElapsed: Math.max(0, motivationElapsed - cursor),
          phaseRemaining: Math.max(0, nextCursor - motivationElapsed),
          nextPhase: MOTIVATION_TIMER_PHASES[index + 1] || null
        };
      }
      cursor = nextCursor;
    }
    return { index: 0, phase: MOTIVATION_TIMER_PHASES[0], phaseElapsed: 0, phaseRemaining: MOTIVATION_TIMER_PHASES[0].seconds, nextPhase: MOTIVATION_TIMER_PHASES[1] };

    ctx.lineWidth = 1;
    for (let x = 24; x < width; x += 24) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, height);
      ctx.stroke();
    }
    for (let y = 24; y < height; y += 24) {

    ctx.strokeStyle = sketchMode === "eraser" ? "#ffffff" : sketchColor;
    ctx.lineWidth = sketchMode === "eraser" ? sketchSize * 4 : sketchSize;
    ctx.beginPath();
    ctx.moveTo(sketchDrawingRef.current.lastX, sketchDrawingRef.current.lastY);
    ctx.lineTo(point.x, point.y);
    ctx.stroke();
    sketchDrawingRef.current.lastX = point.x;

  const getStylusTouch = (touches, touchId = null) => {

  const startSketchStroke = (e) => {
    if (!isPenPointer(e)) return;
    e.preventDefault();
    e.stopPropagation();
    if (e.pointerId !== undefined) e.currentTarget.setPointerCapture?.(e.pointerId);
    clearPendingSketchSave();
    captureSketchHistory();
    const point = getSketchPoint(e.currentTarget, e);
    sketchDrawingRef.current = { drawing: true, lastX: point.x, lastY: point.y, pointerId: e.pointerId, touchId: null };
  };

  const moveSketchStroke = (e) => {
    if (!sketchDrawingRef.current.drawing) return;
    if (!isPenPointer(e) || sketchDrawingRef.current.pointerId !== e.pointerId) return;
    e.preventDefault();
    e.stopPropagation();
    const canvas = sketchCanvasRef.current;
    if (!canvas) return;
    const events = e.getCoalescedEvents?.() || [e];
    events.forEach(event => drawSketchLineTo(canvas, getSketchPoint(canvas, event)));
  };

  const endSketchStroke = async (e) => {
    if (!sketchDrawingRef.current.drawing) return;
    if (!isPenPointer(e) || sketchDrawingRef.current.pointerId !== e.pointerId) return;
    e.preventDefault();
    e.stopPropagation();
    if (e.pointerId !== undefined) e.currentTarget.releasePointerCapture?.(e.pointerId);
    sketchDrawingRef.current = { drawing: false, lastX: 0, lastY: 0, pointerId: null, touchId: null };
    scheduleSketchSave();
  };

    const touch = getStylusTouch(e.touches);
    if (!touch) return;
    e.preventDefault();
    e.stopPropagation();
    clearPendingSketchSave();
    captureSketchHistory();
    const point = getTouchSketchPoint(e.currentTarget, touch);
    sketchDrawingRef.current = { drawing: true, lastX: point.x, lastY: point.y, pointerId: null, touchId: touch.identifier };

  const compressMaterialImage = (file) => new Promise((resolve, reject) => {
    if (!file.type?.startsWith("image/")) {
      reject(new Error("画像ファイルを選んでください。"));
      return;
    }
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, MAX_MATERIAL_IMAGE_SIDE / Math.max(img.width, img.height));
      const width = Math.max(1, Math.round(img.width * scale));
      const height = Math.max(1, Math.round(img.height * scale));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(img, 0, 0, width, height);
      URL.revokeObjectURL(url);
      resolve({
        imageData: canvas.toDataURL("image/jpeg", MATERIAL_IMAGE_QUALITY),
        width,
        height
      });
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error("画像を読み込めませんでした。別の画像を試してください。"));
    };
    img.src = url;
  });
