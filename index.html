<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="口頭試問対策">
  <title>九大経済工学 口頭試問対策</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fafc;
      --paper: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --brand: #e11d48;
      --brand-soft: #fff1f2;
      --indigo: #4f46e5;
      --indigo-soft: #eef2ff;
      --amber: #d97706;
      --amber-soft: #fffbeb;
      --green: #059669;
      --green-soft: #ecfdf5;
      --blue: #2563eb;
      --blue-soft: #eff6ff;
      --shadow: 0 14px 36px rgba(15, 23, 42, .10);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Noto Sans JP", "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body { margin: 0; background: var(--bg); color: var(--ink); line-height: 1.6; }
    button, input { font: inherit; }
    button { touch-action: manipulation; }
    .app { min-height: 100dvh; padding-bottom: env(safe-area-inset-bottom); }
    header { position: sticky; top: 0; z-index: 20; background: rgba(255,255,255,.96); border-bottom: 1px solid var(--line); backdrop-filter: blur(10px); }
    .wrap { width: min(100%, 980px); margin: 0 auto; padding: 16px; }
    .top { display: grid; gap: 14px; }
    .brand-row { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .mark { display: grid; place-items: center; width: 38px; height: 38px; border-radius: 12px; color: #fff; background: #0f172a; font-weight: 900; flex: 0 0 auto; }
    h1 { margin: 0; font-size: clamp(1.25rem, 5vw, 2rem); line-height: 1.25; letter-spacing: 0; }
    .subtitle { margin: 2px 0 0; color: var(--muted); font-size: .86rem; }
    .head-tools { display: grid; gap: 10px; }
    .date-box, .progress-box { background: #f1f5f9; border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; }
    .date-box { display: flex; gap: 8px; align-items: center; justify-content: center; color: #3730a3; background: var(--indigo-soft); border-color: #c7d2fe; font-weight: 800; }
    input[type="date"] { border: 0; outline: 0; background: transparent; color: #312e81; font-weight: 800; min-width: 0; }
    .progress-line { display: flex; justify-content: space-between; gap: 12px; align-items: center; font-size: .82rem; font-weight: 800; color: #475569; }
    .progress-line strong { color: var(--brand); }
    .meter { height: 10px; background: #e2e8f0; border-radius: 999px; overflow: hidden; margin: 8px 0 4px; }
    .bar { height: 100%; width: 0; background: var(--brand); border-radius: inherit; transition: width .25s ease; }
    .count { text-align: right; color: var(--muted); font-size: .76rem; }
    main.wrap { padding-top: 22px; }
    .controls { display: grid; gap: 12px; margin-bottom: 18px; }
    .scroll-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .scroll-row::-webkit-scrollbar { display: none; }
    .chip { border: 1px solid var(--line); background: #fff; color: #475569; border-radius: 999px; padding: 9px 13px; font-size: .9rem; font-weight: 800; white-space: nowrap; min-height: 42px; }
    .chip.active { color: #fff; background: #0f172a; border-color: #0f172a; box-shadow: 0 8px 18px rgba(15, 23, 42, .16); }
    .chip.important.active { color: #be123c; background: var(--brand-soft); border-color: #fda4af; }
    .chip.untouched.active { color: #1d4ed8; background: var(--blue-soft); border-color: #93c5fd; }
    .summary { color: var(--muted); font-size: .86rem; margin: -4px 0 14px; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .card { width: 100%; text-align: left; border: 2px solid var(--line); background: var(--paper); color: inherit; border-radius: 8px; padding: 14px; box-shadow: none; transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease; }
    .card:active { transform: scale(.99); }
    .card.mastered { border-color: #34d399; background: var(--green-soft); }
    .card.review { border-color: #f59e0b; background: var(--amber-soft); }
    .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .badges { display: flex; flex-wrap: wrap; gap: 6px; min-width: 0; }
    .badge { display: inline-flex; align-items: center; gap: 4px; border-radius: 6px; padding: 4px 8px; background: #f1f5f9; color: #475569; font-size: .72rem; font-weight: 800; }
    .badge.hot { color: #be123c; background: var(--brand-soft); }
    .status { display: flex; gap: 4px; flex: 0 0 auto; }
    .icon-btn { width: 40px; height: 40px; display: grid; place-items: center; border: 0; border-radius: 8px; background: transparent; color: #cbd5e1; font-weight: 900; font-size: 1.1rem; }
    .icon-btn.review.on { color: var(--amber); background: #fef3c7; }
    .icon-btn.mastered.on { color: var(--green); background: #d1fae5; }
    .card h2 { margin: 0 0 6px; font-size: 1.04rem; line-height: 1.45; letter-spacing: 0; }
    .def { margin: 0; color: var(--muted); font-size: .9rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .empty { padding: 48px 12px; text-align: center; color: var(--muted); }
    .modal-backdrop { position: fixed; inset: 0; z-index: 50; background: rgba(15,23,42,.62); padding: 14px; display: grid; place-items: center; }
    .modal { width: min(100%, 720px); max-height: min(88dvh, 820px); background: #fff; border-radius: 10px; overflow: hidden; box-shadow: var(--shadow); display: flex; flex-direction: column; }
    .modal-head, .modal-foot { flex: 0 0 auto; padding: 12px 14px; border-color: var(--line); background: #f8fafc; display: flex; align-items: center; gap: 10px; }
    .modal-head { border-bottom: 1px solid var(--line); justify-content: space-between; }
    .modal-foot { border-top: 1px solid var(--line); justify-content: space-between; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
    .close { border: 0; background: #e2e8f0; color: #334155; width: 40px; height: 40px; border-radius: 999px; font-size: 1.2rem; font-weight: 900; }
    .modal-body { overflow-y: auto; padding: 18px 16px 22px; -webkit-overflow-scrolling: touch; }
    .modal h2 { margin: 0 0 18px; font-size: clamp(1.28rem, 6vw, 2rem); line-height: 1.35; letter-spacing: 0; }
    .section { margin-top: 16px; }
    .box { background: #f8fafc; border: 1px solid #eef2f7; border-radius: 8px; padding: 14px; }
    .label { margin: 0 0 7px; font-size: .78rem; color: var(--muted); font-weight: 900; }
    .label.rose { color: var(--brand); }
    .label.indigo { color: var(--indigo); }
    .label.amber { color: #b45309; }
    .answer { margin: 0; font-weight: 800; font-size: 1.05rem; }
    .quote { margin: 0; padding-left: 12px; border-left: 4px solid #fecdd3; color: #334155; font-weight: 700; }
    .quote.indigo { border-left-color: #c7d2fe; font-weight: 500; }
    .deep { border-top: 1px solid var(--line); padding-top: 16px; margin-top: 18px; }
    .dash { width: 100%; min-height: 54px; border: 2px dashed #cbd5e1; background: #fff; border-radius: 8px; color: #475569; font-weight: 900; padding: 12px; }
    .tsukkomi { background: var(--amber-soft); border: 1px solid #fde68a; border-radius: 8px; padding: 14px; }
    .note { color: #92400e; font-size: .84rem; margin: 10px 0 0; }
    .footer-actions { display: flex; gap: 8px; flex: 1; justify-content: flex-end; }
    .action { min-height: 44px; border-radius: 8px; padding: 9px 12px; border: 2px solid transparent; font-weight: 900; }
    .action.secondary { color: #475569; background: transparent; border: 0; }
    .action.review { color: #b45309; border-color: #fde68a; background: #fff; }
    .action.review.on { color: #92400e; background: #fef3c7; border-color: #f59e0b; }
    .action.mastered { color: #fff; background: #0f172a; }
    .action.mastered.on { color: #047857; background: #d1fae5; border-color: #34d399; }
    .hidden { display: none !important; }
    @media (min-width: 720px) {
      .wrap { padding-left: 24px; padding-right: 24px; }
      .top { grid-template-columns: 1fr auto; align-items: center; }
      .head-tools { grid-template-columns: auto 260px; align-items: center; }
      .controls { grid-template-columns: 1fr auto; align-items: start; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
      .card:hover { border-color: #cbd5e1; box-shadow: 0 10px 28px rgba(15, 23, 42, .08); }
      .modal-backdrop { padding: 24px; }
      .modal-body { padding: 24px 28px 28px; }
      .modal-head, .modal-foot { padding-left: 22px; padding-right: 22px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="wrap top">
        <div class="brand-row">
          <div class="mark" aria-hidden="true">Q</div>
          <div>
            <h1>九大経済工学 口頭試問対策</h1>
            <p class="subtitle">編入面接に向けた定義・説明・深掘り質問</p>
          </div>
        </div>
        <div class="head-tools">
          <label class="date-box">日付 <input id="dateInput" type="date"></label>
          <div class="progress-box">
            <div class="progress-line"><span>累計 習得度</span><strong id="progressPct">0%</strong></div>
            <div class="meter"><div class="bar" id="progressBar"></div></div>
            <div class="count" id="progressCount">0 / 0 問</div>
          </div>
        </div>
      </div>
    </header>
    <main class="wrap">
      <div class="controls">
        <div class="scroll-row" id="categoryTabs" aria-label="カテゴリ"></div>
        <div class="scroll-row" aria-label="絞り込み">
          <button class="chip important" id="importantBtn" type="button">頻出最重要のみ</button>
          <button class="chip untouched" id="untouchedBtn" type="button">未着手のみ</button>
        </div>
      </div>
      <p class="summary" id="summary"></p>
      <div class="grid" id="cardGrid"></div>
      <div class="empty hidden" id="empty">該当する問題がありません。カテゴリや条件を変更してください。</div>
    </main>
  </div>
  <div id="modalRoot"></div>
  <script>
    const quizData = [{"id":101,"category":"1. 一変数微積","title":"関数とは何ですか","definition":"1つの入力に対して、必ず1つの出力を返す規則。","explanation":"自販機のように、ある値（入力）を入れると、決まった結果（出力）が1つだけ返ってくる仕組みのことです。","application":"価格から需要量が決まるなど、経済変数の関係を数式化する大前提となります。","tsukkomi":"現実の経済データはピッタリ1つの結果にならないことが多いですが、関数でモデル化する意味は何ですか？","isImportant":false},{"id":102,"category":"1. 一変数微積","title":"1つの入力に2つの出力があるものは関数ですか","definition":"いいえ。関数としては定義されません。","explanation":"関数は『入力に対して結果がただ1つに定まる』必要があります。2つ以上の出力があるものは単なる『関係』や『対応』と呼びます。","application":"一意に結果が決まらないと予測モデルとして使えないため、システムを設計する際は関数になるよう変数を調整します。","tsukkomi":"円の方程式（x^2+y^2=1）はyについて解くと±が出ますが、これは関数ではない？","isImportant":false},{"id":103,"category":"1. 一変数微積","title":"極限とは何ですか","definition":"変数をある値に限りなく近づけたときに、関数が近づく目標値。","explanation":"実際にその値にならなくても、『限りなく近づくと、結果はどこに向かっていくか』という着地点を予測する概念です。","application":"連続複利の計算など、時間を限りなく細かく分割した際の変化を捉える金融工学の基礎になります。","tsukkomi":"lim(x→0) (1/x) は極限が存在しますか？","isImportant":false},{"id":104,"category":"1. 一変数微積","title":"微分とは何ですか","definition":"関数の変化の割合、つまりある点での『接線の傾き』を求める操作。","explanation":"ある変数をほんの少し（限界的に）増やしたときに、結果がどれくらい変化するかという『瞬間の変化率』を求める操作です。","application":"経済学における『限界（Marginal）』の概念そのもので、限界費用や限界効用の計算に直結します。","tsukkomi":"離散的なデータしかない場合、微分の考え方をどう応用しますか？","isImportant":true},{"id":105,"category":"1. 一変数微積","title":"導関数とは何ですか","definition":"各点での微分の値（傾き）を返す新しい関数。","explanation":"微分して出てきた式のことです。xを入れると、その場所の傾きがポンと出てくる便利な計算機のようなものです。","application":"時間によって変動する変化率を関数として持っておくことで、システム全体の動的なシミュレーションが可能になります。","tsukkomi":"元の関数が連続でも、導関数が連続にならないことはありますか？","isImportant":false},{"id":106,"category":"1. 一変数微積","title":"微分は何を表していますか","definition":"限界的な変化。1単位追加した時の影響。","explanation":"『今の状態から、あと1歩だけ進んだらどうなるか』という未来予測の指標を表しています。","application":"『あと1人生産者を増やしたら利益はどうなるか』という限界分析の根本的な指標になります。","tsukkomi":"傾きが急な状態と緩やかな状態では、経済的にどんな違いがありますか？","isImportant":false},{"id":107,"category":"1. 一変数微積","title":"接線とは何ですか","definition":"ある点で曲線に最もよく似た（触れるだけの）直線。","explanation":"複雑な曲線を、その一瞬だけ『まっすぐな線』だと見なして近似したものと言えます。","application":"非線形な複雑な経済モデルを、扱いやすい線形（一次関数）に落とし込んで解析するために使います。","tsukkomi":"グラフが尖っている点（絶対値のグラフの原点など）で接線は引けますか？","isImportant":false},{"id":108,"category":"1. 一変数微積","title":"最大値と最小値はどう判断しますか","definition":"微分が0になる点（停留点）を探し、その前後の傾きの変化を見る。","explanation":"まず傾きが0で平らになる点を探し、さらにそれが『山』なのか『谷』なのかを前後の微分の符号や二階微分で確かめます。","application":"利益関数の最大化や、コスト関数の最小化という、最適化問題の最も基本的なアプローチです。","tsukkomi":"微分が0でも、最大でも最小でもない点は存在しますか？","isImportant":false},{"id":109,"category":"1. 一変数微積","title":"なぜ微分の符号で増減が分かるのですか","definition":"微分＝傾きだから。プラスなら右上がり、マイナスなら右下がり。","explanation":"微分がプラスということは、xが増えればyも増える（右肩上がり）。マイナスならxが増えるとyが減る（右肩下がり）からです。","application":"価格を上げた時に需要が増えるか減るかなど、直感的な方向性を数学的に証明する根拠になります。","tsukkomi":"微分が常にプラスの関数を経済の言葉で何と言いますか？（ヒント：単調〜）","isImportant":false},{"id":110,"category":"1. 一変数微積","title":"なぜ微分の符号を見ると最大・最小が分かるのですか","definition":"増加から減少へ変われば山（最大）、減少から増加へ変われば谷（最小）だから。","explanation":"坂道を登って（プラス）から下る（マイナス）と頂上ですよね。逆に下ってから登ると谷底になります。その切り替わりを見るからです。","application":"企業の利益が伸び悩んで下落に転じるポイント（最大利益点）を見つけるロジックです。","tsukkomi":"グラフの端っこ（境界）にある最大・最小値は微分で見つけられますか？","isImportant":false},{"id":111,"category":"1. 一変数微積","title":"二階微分は何を意味しますか","definition":"傾きの変化の割合。曲線の曲がり方（凸性）。","explanation":"速度に対する加速度のようなものです。増え方が『加速している』のか『減速している』のかという曲がり具合を表します。","application":"限界効用逓減の法則（満足度が増えにくくなる）など、増加率の鈍化を数学的に証明する際に使います。","tsukkomi":"二階微分が0の点を図形的に何と呼びますか？","isImportant":false},{"id":112,"category":"1. 一変数微積","title":"なぜ下に凸だと最小になるのですか","definition":"傾きがマイナスからプラスへ変化するから（谷底の形）。","explanation":"下に凸（U字型）ということは、傾きがどんどん増えていく（マイナス→0→プラス）ので、傾き0の場所が一番低い谷底になるからです。","application":"コスト最小化問題を解く際、求めた解が本当に一番コストが低いか（谷底か）の確認に使います。","tsukkomi":"下に凸の関数を二階微分の符号で言うとどうなりますか？","isImportant":false},{"id":113,"category":"1. 一変数微積","title":"なぜ上に凸だと最大になるのですか","definition":"傾きがプラスからマイナスへ変化するから（山の形）。","explanation":"上に凸（逆U字型）ということは、傾きがどんどん減っていく（プラス→0→マイナス）ので、傾き0の場所が一番高い山の頂上になります。","application":"利益の最大化や効用の最大化など、頂点を見つける問題が正しく解けているかの条件になります。","tsukkomi":"限界効用逓減の法則が成り立つ関数は、上に凸ですか、下に凸ですか？","isImportant":false},{"id":114,"category":"1. 一変数微積","title":"合成関数の微分（チェインルール）とは何ですか","definition":"関数の中に別の関数が入っている（y = f(g(x))）ものを微分する連鎖律の法則。","explanation":"「xが動けばuが動き、uが動けばyが動く」という連鎖的な変化を、それぞれの微分の掛け算として求める計算ルールです。","application":"「原油価格が上がると物流コストが上がり、最終的な物価が上がる」といった、連鎖的影響を数式で追う時に使います。","tsukkomi":"これを多変数の全微分に拡張するとどうなりますか？","isImportant":false},{"id":201,"category":"2. 多変数・最適化","title":"偏微分とは何ですか","definition":"多変数関数のうち、1つの変数だけを動かし、他は定数として扱う微分。","explanation":"結果に影響を与える要因が複数あるとき、『他の要因はすべて固定して、ある1つの要因だけをいじったらどうなるか』を見る操作です。","application":"経済学の基本である『他の条件を一定とした場合（Ceteris Paribus）』の分析そのものです。","tsukkomi":"労働と資本で生産量が決まる時、労働で偏微分したものは何と呼ばれますか？","isImportant":false},{"id":202,"category":"2. 多変数・最適化","title":"なぜ他の変数を固定するのですか","definition":"特定の要因が与える『純粋な影響』を知りたいから。","explanation":"全部が同時に動いてしまうと、どの要因が原因で結果が変わったのか分からなくなるため、影響を切り分けるためです。","application":"マーケティングで、気温の影響を排除して、割引キャンペーンだけの効果を測定するようなイメージです。","tsukkomi":"全部が同時に変化した時の総変化量を知りたい時は何を使いますか？","isImportant":false},{"id":203,"category":"2. 多変数・最適化","title":"勾配とは何ですか","definition":"各変数での偏微分を並べたベクトル（∇f）。","explanation":"すべての方向に対する『傾き』の情報をまとめたものです。山の斜面で『どの方向にどれくらいキツいか』を示す矢印です。","application":"機械学習のパラメータ更新など、関数を最も効率よく最大化（または最小化）する方向を決定するナビとして機能します。","tsukkomi":"勾配ベクトルは、関数の等高線に対してどのような角度を持ちますか？","isImportant":true},{"id":204,"category":"2. 多変数・最適化","title":"なぜ勾配は最も増加する方向なのですか","definition":"各変数の変化率のベクトル和であり、数学的に最大傾斜を向くから。","explanation":"偏微分した各成分を組み合わせたベクトルは、方向微分の公式から、最も傾斜が急になる方向（等高線と直交する方向）を向く性質があるからです。","application":"最急降下法など、アルゴリズムが『最短ルートで最適解に向かう』ための方向指示器になります。","tsukkomi":"逆に、最も急激に減少する方向を見つけるにはどうすればいい？","isImportant":false},{"id":205,"category":"2. 多変数・最適化","title":"勾配が0とは何を意味しますか","definition":"どの方向に動いても変化しない平坦な場所（停留点）。","explanation":"山の頂上か、谷底か、あるいは峠のような平らな場所のいずれかにいる状態です。","application":"多変数の最適化問題において、最大・最小の『候補地』を見つけたことを意味します。","tsukkomi":"勾配がゼロなら、必ずそこが最大値または最小値だと言い切れますか？","isImportant":false},{"id":206,"category":"2. 多変数・最適化","title":"なぜ勾配=0だけでは十分でないのですか","definition":"鞍点（馬の鞍のような形）の可能性があるため。","explanation":"ある方向からは頂上に見えても、別の方向からは谷底に見える『ねじれた平坦な場所』があるからです。極大か極小かの確定には二階偏微分が必要です。","application":"システムが誤った最適化（偽のゴール）で止まってしまわないよう、ヘッセ行列によるチェックが不可欠です。","tsukkomi":"鞍点を判定するために使う行列の名前は何ですか？","isImportant":false},{"id":207,"category":"2. 多変数・最適化","title":"制約なし最適化とは何ですか","definition":"条件に縛られず、関数そのものの純粋な最大・最小を探すこと。","explanation":"予算や資源の限界を気にせず、『もし何でもできるならどこがベストか』を見つける問題です。","application":"データ分析で、誤差を最小化するパラメータを自由空間の中から探し出す（最小二乗法など）際に使われます。","tsukkomi":"現実の経済問題で、制約なし最適化がそのまま使えるケースは多いですか？","isImportant":false},{"id":208,"category":"2. 多変数・最適化","title":"制約付き最適化とは何ですか","definition":"予算や資源などの制限ルールの下で、目的関数を最大化・最小化すること。","explanation":"『お小遣い1万円以内で、一番満足度が高くなる買い物の組み合わせは？』のように、現実の縛りの中でベストを探すことです。","application":"経済学の意思決定（効用最大化、費用最小化）は、ほぼすべてこの制約付き最適化でモデル化されます。","tsukkomi":"制約付き最適化を解くための代表的な数学の手法は何ですか？","isImportant":false},{"id":209,"category":"2. 多変数・最適化","title":"全微分とは何ですか。（偏微分との違いは？）","definition":"すべての変数が同時に微小変化したときの、関数全体の総変化量。","explanation":"偏微分が「他の変数を止めて1つだけ動かす」のに対し、全微分は「全部の変数がちょっとずつ同時に動いたら結果はどうなるか」を足し合わせて計算したものです。","application":"複数の経済的ショック（例：金利上昇と円安）が同時に起きた時の、全体としての市場への影響を計算するのに使います。","tsukkomi":"全微分の式は、各変数の「偏微分」と「微小変化(dx, dyなど)」を使ってどう表されますか？","isImportant":false},{"id":210,"category":"2. 多変数・最適化","title":"ヘッセ行列とは何ですか","definition":"多変数関数のすべての2階偏微分を成分として並べた正方行列。","explanation":"1変数の「二階微分（曲がり具合）」を、多変数の空間に拡張したものです。各方向に対して関数がどう反っているかの情報が詰まっています。","application":"最適化問題を解いたときに、そこが本当に山の頂上（利益最大化）なのか、単なる峠道（鞍点）なのかを判定するために必須のツールです。","tsukkomi":"ヘッセ行列は通常、ある特別な性質（形）を持った行列になりますが、何行列になりますか？（ヒント：対角線を挟んで対称）","isImportant":true},{"id":211,"category":"2. 多変数・最適化","title":"多変数関数で、そこが最大（または最小）だとどうやって判定しますか","definition":"勾配が0の停留点を見つけ、その点でのヘッセ行列の符号（正定値など）を調べる。","explanation":"まず1階偏微分が全て0になる平らな場所を探します。次に、その場所のヘッセ行列の行列式や固有値を調べて、全方向に凹んでいれば最大（山）、全方向に反っていれば最小（谷）と判定します。","application":"複数の制約がない状況での利益最大化・費用最小化問題の、最終的な「答え合わせ」の基準として機能します。","tsukkomi":"ヘッセ行列の行列式がマイナスのとき、その点は最大でも最小でもない「何」と呼ばれますか？","isImportant":false},{"id":301,"category":"3. ラグランジュ","title":"ラグランジュ未定乗数法とは何ですか","definition":"制約条件のもとで、目的関数の極値を求めるための数学的手法。","explanation":"新しい変数λ（ラグランジュ乗数）を使って、制約付きの問題を『制約なしの最適化問題』にすり替えて解くテクニックです。","application":"限られた予算で効用を最大化する消費者行動や、限られたコストで生産を最大化する企業行動の分析に必須の手法です。","tsukkomi":"目的関数が f(x,y)、制約が g(x,y)=0 のとき、ラグランジュ関数 L をどう立てますか？","isImportant":true},{"id":302,"category":"3. ラグランジュ","title":"なぜ λg(x,y) を足す（引く）のですか","definition":"制約を目的関数に『ペナルティ』として組み込むため。","explanation":"制約から外れると関数全体の値が悪化するように仕向けることで、自然と制約を満たす場所が極値になるように設計されているからです。","application":"工学の制御理論でも、ルールを破ったときのペナルティコストを関数に組み込む同じ考え方をします。","tsukkomi":"g(x,y)=0 という制約を満たしているとき、追加した項 λg(x,y) の値はいくつになりますか？","isImportant":false},{"id":303,"category":"3. ラグランジュ","title":"なぜ勾配が一致するのですか","definition":"最適点では、目的関数の等高線と制約条件の線が接するから。","explanation":"制約の線上を歩いているとき、これ以上目的関数の値を上げられない（等高線を越えられない）限界のポイントだからです。このとき、2つの線の法線（勾配）は平行になります。","application":"無差別曲線と予算制約線が接する点が最適消費点である、という経済学の図形的な説明の数学的裏付けです。","tsukkomi":"勾配が一致するということを、数式（∇f と ∇g を使って）で表すとどうなりますか？","isImportant":false},{"id":304,"category":"3. ラグランジュ","title":"λ は何を意味しますか","definition":"制約を1単位緩めたときに、目的関数の最大値がどれだけ増えるか。","explanation":"数学的なただの係数ではなく、『予算が1円増えたら、満足度はあとどれくらい増えるか』という限界的な価値を表しています。","application":"リソースを追加投入したときの費用対効果（限界効用）を示すため、経営判断に直接使える数値です。","tsukkomi":"λ=0 になった場合、その制約条件はどういう状態だと言えますか？","isImportant":false},{"id":305,"category":"3. ラグランジュ","title":"影の価格とは何ですか","definition":"経済学における、ラグランジュ乗数 λ の呼び名（潜在価格）。","explanation":"市場で取引される実際の価格ではなく、その制約（資源など）が関数にとって内部的にどれだけの価値・利益を持っているかを表す隠れた価格です。","application":"環境問題などで、市場価格のない資源（きれいな空気など）の価値をモデル内で評価する際に使われます。","tsukkomi":"ある工場の生産制約の影の価格が非常に高い場合、経営者としてどう判断すべきですか？","isImportant":false},{"id":306,"category":"3. ラグランジュ","title":"効用最大化とどう関係しますか","definition":"予算制約のもとで満足度を最大にする組み合わせを求める計算そのもの。","explanation":"目的関数を『効用関数』、制約を『予算』と置き換えれば、ラグランジュ未定乗数法の手順がそのまま消費者の意思決定モデルになります。","application":"需要関数を導出するためのスタート地点となるため、ミクロ経済学を数理的に扱う上で避けて通れません。","tsukkomi":"効用最大化を解いて出てきた最適解の条件（限界代替率＝価格比）を説明できますか？","isImportant":false},{"id":401,"category":"4. テイラー展開","title":"テイラー展開とは何ですか","definition":"複雑な関数を、ある点の周りで多項式の足し算（無限級数）に展開して近似する手法。","explanation":"そのままでは計算できない複雑な曲線を、xの1乗、2乗、3乗…といった扱いやすい計算の足し合わせに置き換える操作です。","application":"コンピュータやプログラムの裏側で、sinやexpなどの関数を四則演算だけで計算するアルゴリズムの根幹です。","tsukkomi":"展開する中心の点を x=0 とした特別なテイラー展開を何と呼びますか？","isImportant":true},{"id":402,"category":"4. テイラー展開","title":"一次近似とは何ですか","definition":"関数の曲線を、ある点の付近で『接線（直線）』とみなして近似すること。","explanation":"テイラー展開の最初の2項（定数項とxの1乗の項）だけで打ち切る近似です。一番シンプルに傾向を捉える方法です。","application":"複雑な経済モデルを線形化し、行列計算や連立方程式として扱いやすくするために多用されます。","tsukkomi":"一次近似の式を、f(a)と微分f'(a)を使って言ってみてください。","isImportant":false},{"id":403,"category":"4. テイラー展開","title":"なぜ接線で近似できるのですか","definition":"ごく狭い範囲で見れば、どんな滑らかな曲線も直線に限りなく近くなるから。","explanation":"地球は丸いですが、人間が立っている狭い範囲では平ら（直線）に感じるのと同じ理屈です。","application":"微小な変化（限界分析）を前提とする経済学において、局所的な分析であれば直線近似で十分実用に耐えるからです。","tsukkomi":"では、近似する基準点から大きく離れた場所の値を予測したい場合はどうなりますか？","isImportant":false},{"id":404,"category":"4. テイラー展開","title":"なぜ一次近似だけでは不十分なのですか","definition":"基準点から離れると、直線と実際の曲線のズレ（誤差）が大きくなるから。","explanation":"曲線は曲がっているのに、直線はまっすぐ進んでしまうため、遠くに行けば行くほど予測と現実のギャップが広がるからです。","application":"市場の小さな変動なら一次近似で予測可能ですが、リーマンショックのような大きな変動には対応できなくなります。","tsukkomi":"誤差を小さくするためには、近似のレベルをどうすればいいですか？","isImportant":false},{"id":405,"category":"4. テイラー展開","title":"二次近似とは何ですか","definition":"直線だけでなく、曲がり具合も考慮して『放物線』で近似すること。","explanation":"テイラー展開をxの2乗の項まで取る近似です。傾きに加えて『曲がりのクセ』まで合わせるので、より広範囲で正確になります。","application":"最適化問題において、目的関数の極値付近の形状（山か谷か）を捉えるために必須の近似レベルです。","tsukkomi":"二次近似で追加される項には、何階の微分が使われていますか？","isImportant":false},{"id":406,"category":"4. テイラー展開","title":"二次項は何を表していますか","definition":"関数の曲がり具合（二階微分の情報）。","explanation":"速度に対する『加速度』のようなもので、グラフがどちらにカーブしているか（凸か凹か）という性質を表しています。","application":"投資の文脈で言うと、債券価格の金利に対する感応度のうち、曲がり具合を示す『コンベクシティ』の概念そのものです。","tsukkomi":"多変数関数の場合、この二次項の情報をまとめた行列を何と呼びますか？","isImportant":false},{"id":407,"category":"4. テイラー展開","title":"テイラー展開は何に役立ちますか","definition":"解析が困難な関数を、扱いやすい多項式に落とし込めること。","explanation":"どんなに複雑な現象でも、四則演算（足し算と掛け算）だけで処理できるようになるため、計算機との相性が抜群に良いです。","application":"金融工学におけるオプション価格の計算など、解析的に解けないモデルを数値計算でシミュレーションする際に不可欠です。","tsukkomi":"近似の精度を上げたい時は、展開する項数をどうすればいい？","isImportant":false},{"id":408,"category":"4. テイラー展開","title":"テイラー展開と最適化はどう関係しますか","definition":"極値付近を二次近似することで、最大・最小の判定条件が導かれる。","explanation":"停留点（一次微分が0）の周りを二次近似すると、二次項（ヘッセ行列）の符号だけで関数の形状（山か谷か）が判定できるからです。","application":"ニュートン法など、コンピュータが自動で最適解を探し出すアルゴリズムの理論的な基盤になっています。","tsukkomi":"一次微分が0のとき、テイラー展開の式の中で一番影響力を持つのはどの項になりますか？","isImportant":false},{"id":409,"category":"4. テイラー展開","title":"テイラー展開と経済工学はどうつながりますか","definition":"非線形の複雑な経済現象を、数理的に処理可能な形へ変換する橋渡し。","explanation":"現実の経済は複雑な曲線ですが、テイラー展開で近似することで、線形代数や微積分などの強力な数学ツールが適用できるようになります。","application":"リスク管理ツール（デルタ・ガンマヘッジ）などは、価格変動をテイラー展開の一次・二次項として捉えた実例です。","tsukkomi":"あなたが作った分析ツールの中で、複雑なデータを近似して処理した経験はありますか？","isImportant":false},{"id":410,"category":"4. テイラー展開","title":"一次近似はなぜ限界分析とつながるのですか","definition":"限界分析の『1単位の追加的変化』は、微小変化の一次近似そのものだから。","explanation":"限界分析は『労働をちょっと増やしたらどうなるか』を見ますが、これは曲線をその点での接線（一次近似）に沿ってちょっと進むのと同じ計算です。","application":"限界効用や限界費用を求めることは、関数を一次近似してその傾きを取り出していることに他なりません。","tsukkomi":"変化量が『1単位』ではなくもっと大きな変化になった場合、限界分析（一次近似）の信頼性はどうなりますか？","isImportant":false},{"id":501,"category":"5. 線形代数","title":"ベクトルとは何ですか","definition":"大きさと向きを持つ量。また、複数のデータを一列に並べたもの。","explanation":"矢印として空間上の位置や動きを表すだけでなく、経済学では『価格と数量のセット』のように複数の要素をまとめたデータとして扱います。","application":"顧客の購買履歴などを特徴ベクトルとして並べ、機械学習で類似度を分析するベースになります。","tsukkomi":"ベクトルの『次元』が増えるというのは、データ的にどういうことですか？","isImportant":false},{"id":502,"category":"5. 線形代数","title":"単位ベクトルとは何ですか","definition":"大きさ（長さ・ノルム）がちょうど 1 のベクトル。","explanation":"向きだけの情報を純粋に取り出したベクトルです。他のベクトルを測るための『1メモリ分の基準』になります。","application":"データ分析において、スケールの違うデータを比較するために正規化（長さを1に揃える）する際によく使います。","tsukkomi":"任意のベクトルを単位ベクトルに変換する操作を何と呼びますか？","isImportant":false},{"id":503,"category":"5. 線形代数","title":"基底とは何ですか","definition":"ある空間のすべての場所を表現するために必要な、独立なベクトルのセット。","explanation":"XYZ座標系のx軸、y軸、z軸にあたる『座標の骨組み』のことです。これらを伸縮・足し合わせることで空間内のどこへでも行けます。","application":"主成分分析などで、データを最も見やすく説明できる『新しい軸（基底）』を見つける操作に直結します。","tsukkomi":"2次元平面を表現するための基底は、最低何本必要ですか？","isImportant":false},{"id":504,"category":"5. 線形代数","title":"単位ベクトルと基底の違いは何ですか","definition":"単位ベクトルは『長さが1』という状態。基底は空間を張る『役割』のこと。","explanation":"基底ベクトルは空間の骨組みであれば長さが1である必要はありません。逆に、長さ1の単位ベクトルでも、同じ方向を向いていれば基底にはなれません。","application":"ただし、計算を楽にするために、お互いに直交していて長さが1の『正規直交基底』がデータ処理では最も重宝されます。","tsukkomi":"基底のベクトル同士が線形従属（平行など）であってはいけないのはなぜ？","isImportant":false},{"id":505,"category":"5. 線形代数","title":"次元とは何ですか","definition":"その空間を表現するために必要な、独立な情報（基底ベクトル）の数。","explanation":"点を特定するために、いくつの変数（座標）が必要かという数です。平面なら2つ（2次元）、立体なら3つ（3次元）です。","application":"データ分析における『変数の数』です。高次元の複雑なデータを、本質を損なわずに低次元に落とす（次元削減）技術が重要になります。","tsukkomi":"ランク（階数）と次元の関係を説明できますか？","isImportant":false},{"id":506,"category":"5. 線形代数","title":"行列とは何ですか","definition":"数を長方形に並べたもの。ベクトルを別のベクトルへ変換する『写像（ルール）』。","explanation":"ある時点の状態を入力すると、別の状態を出力するシステムの動きそのものをパッケージ化したものです。","application":"産業連関表のように、各部門間の波及効果をまとめて計算するシステムとして機能します。","tsukkomi":"正方行列（行と列が同じ）の変換は、空間の次元を変えますか？","isImportant":false},{"id":507,"category":"5. 線形代数","title":"行列の掛け算とは何ですか","definition":"2つの変換を連続して行う操作（合成写像）。","explanation":"ある変換（A）をしたあとに、さらに別の変換（B）を行うという『ルールの連続適用』を意味します。","application":"マルコフ連鎖のように、時間ごとに状態が変化する確率モデルを何ステップも先まで予測する際に使います。","tsukkomi":"内積も行列の掛け算の一種とみなすことができますが、どうやって書きますか？","isImportant":false},{"id":508,"category":"5. 線形代数","title":"なぜ行列の掛け算は順番を変えるとダメなのですか","definition":"変換の順番が変わると、結果の行き先が変わってしまう（非可換）から。","explanation":"『右を向いてから前に進む』と『前に進んでから右を向く』では行き止まる場所が違うように、変換は順番が命だからです。","application":"複数の経済政策やショックを与える順番によって、最終的な市場への影響が変わることを数理的に示しています。","tsukkomi":"順番を変えても結果が同じになる（可換な）特別な行列の組み合わせはありますか？","isImportant":false},{"id":509,"category":"5. 線形代数","title":"連立方程式と Ax=b の関係は何ですか","definition":"複数の式を、行列Aによる変数xの変換結果がbになる、と1つにまとめたもの。","explanation":"バラバラの連立方程式を、行列Aというシステムに未知の状態xを入れたら、観測された結果bが出てきた、という視点で捉え直したものです。","application":"複雑な需要・供給の均衡モデルを解く際、逆行列を使って一発で全体最適な変数を求めるベースになります。","tsukkomi":"この形式のメリットは、未知数xが何百個に増えてもどうなることですか？","isImportant":true},{"id":510,"category":"5. 線形代数","title":"解がないとはどういうことですか","definition":"変換先の空間に目標のベクトルbが存在しない（矛盾している）状態。","explanation":"行列Aの変換で作れる範囲（平面など）の外側に、目標とするbが浮いてしまっている状態です。","application":"全ての制約（条件）を同時に満たすような経済的な均衡点は存在しない、ということを意味します。","tsukkomi":"解がない場合、実務のデータ分析ではどうやって妥協点を探しますか？（ヒント：最小二乗法）","isImportant":false},{"id":511,"category":"5. 線形代数","title":"解が無数にあるとはどういうことですか","definition":"変換によって情報が潰れ、同じbに行く元のベクトルxが無限にある状態。","explanation":"立体を平面に影として落とすように、奥行きの情報が失われたため、影の形から元の立体を1つに特定できない状態です。","application":"方程式の数より変数の数が多い場合など、条件が不足していて最適解が絞りきれない状態を意味します。","tsukkomi":"この状態のとき、行列Aの行列式はどうなっていますか？","isImportant":false},{"id":512,"category":"5. 線形代数","title":"行列式とは何ですか","definition":"行列変換によって空間のボリューム（面積・体積）が何倍になるかを示すスカラー。","explanation":"行列というシステムを通したときに、空間全体がビヨーンとどれくらい拡大・縮小されるかの倍率です。","application":"確率変数を変換したときの確率の濃さ（密度）を補正するヤコビアンとして、統計分析の裏側で機能します。","tsukkomi":"行列式がマイナスの値になった場合、空間はどう変化したと言えますか？","isImportant":false},{"id":513,"category":"5. 線形代数","title":"行列式が0とは何ですか","definition":"空間がペチャンコに潰れてボリュームが0になり、次元が下がること。","explanation":"3次元の立体が平面や線に押し潰されてしまう状態です。","application":"データの中に重複（マルチコ）があり、実質的な情報量が不足しているサインとしてデータ分析で警戒すべき状態です。","tsukkomi":"行列式が0の行列のことを、専門用語で何と呼びますか？","isImportant":false},{"id":514,"category":"5. 線形代数","title":"逆行列とは何ですか","definition":"行列の変換を完全に元に戻す（巻き戻す）行列。","explanation":"掛け合わせると何もしない行列（単位行列）になる存在です。結果bから、原因xを逆算するためのツールです。","application":"産業連関分析（レオンチェフ逆行列）など、最終需要から必要な総生産量を逆算するような経済モデルで威力を発揮します。","tsukkomi":"すべての行列に逆行列は存在しますか？","isImportant":false},{"id":515,"category":"5. 線形代数","title":"なぜ逆行列で元に戻せるのですか","definition":"Aと逆行列A^(-1)を掛けると、何もしない変換（単位行列I）になるから。","explanation":"Ax=b の両辺に左から逆行列を掛けると、左辺のAが相殺されて x=A^(-1)b となり、直接xの中身を取り出せるからです。","application":"連立方程式をガリガリ手計算しなくても、行列の操作だけでシステム全体の解を一括で求められるからです。","tsukkomi":"逆行列を掛ける順番（右からか、左からか）は重要ですか？","isImportant":false},{"id":516,"category":"5. 線形代数","title":"逆行列が存在しないとはどういうことですか","definition":"情報が潰れてしまい、元の状態を一意に復元できない状態。","explanation":"行列式が0（空間がペチャンコ）になり、違う場所から来た点が同じ場所に重なってしまったため、巻き戻しが不可能な状態です。","application":"回帰分析で変数が多重共線性を起こしていると、逆行列が計算できずパラメータが求まらないというエラーに直結します。","tsukkomi":"逆行列が存在する行列のことを何と呼びますか？","isImportant":false},{"id":517,"category":"5. 線形代数","title":"固有値とは何ですか","definition":"行列変換をかけたときに、向きが変わらず長さだけが何倍になるかを示す倍率。","explanation":"そのシステム（行列）が持つ固有の『伸縮のパワー』を表すスカラー値です。","application":"主成分分析において、どの新しい軸（特徴）がデータの情報を一番多く持っているか（重要度）を表す指標になります。","tsukkomi":"固有値を求めるための方程式（det(A - λI) = 0）を何と呼びますか？","isImportant":true},{"id":518,"category":"5. 線形代数","title":"固有ベクトルとは何ですか","definition":"行列による変換を受けても、自分の向きが変わらない特殊なベクトル。","explanation":"変換の前後で、伸び縮みはするけれど、向いているライン（軸）が一切ブレない強靭なベクトルのことです。","application":"複雑なデータの散らばりの中から、データの変動が最も大きい『主成分の方向』を見つけ出す軸になります。","tsukkomi":"固有ベクトルは長さを変えても（スカラー倍しても）固有ベクトルですか？","isImportant":false},{"id":519,"category":"5. 線形代数","title":"固有値と固有ベクトルの違いは何ですか","definition":"固有値は『倍率（スカラー）』、固有ベクトルはその『方向（ベクトル）』。","explanation":"固有ベクトルという『ブレない軸』に沿って、固有値という『パワー』でビヨーンと伸び縮みする、とセットで捉えています。","application":"マルコフ過程（状態遷移）において、長期的に安定する状態（定常分布）は固有値1に対応する固有ベクトルとして求まります。","tsukkomi":"固有値・固有ベクトルを調べることで、行列を対角化するメリットは何ですか？","isImportant":false},{"id":520,"category":"5. 線形代数","title":"固有値0とは何ですか","definition":"その固有ベクトルの方向の情報が完全に潰されてゼロになること。","explanation":"倍率が0ということは、その軸に沿った情報が完全に押し潰されて消滅してしまうことを意味します。","application":"行列式は固有値の掛け算なので、固有値に1つでも0があると行列式も0になり、逆行列を持たない（エラーになる）と判定できます。","tsukkomi":"固有値が0のとき、方程式 Ax=0 は自明な解（x=0）以外の解を持ちますか？","isImportant":false},{"id":521,"category":"5. 線形代数","title":"線形独立とは何ですか","definition":"ベクトル同士が互いに違う方向を向いていて、使い回しがきかない状態。","explanation":"あるベクトルを、他のベクトルの組み合わせ（足し算や定数倍）で作ることができない、無駄のない独立した状態です。","application":"分析に使うデータ群の中に、全く新しい独自の要素がしっかり含まれている（情報がフルにある）状態を指します。","tsukkomi":"2つのベクトルが線形独立でない（平行な）場合、それらのなす角は何度ですか？","isImportant":false},{"id":522,"category":"5. 線形代数","title":"線形従属とは何ですか","definition":"あるベクトルが他のベクトルの組み合わせで作れてしまう（無駄がある）状態。","explanation":"『右に2歩、上に2歩』という動きが、『右斜め上に進む』という別のベクトルで代用できてしまうような、情報が重複している状態です。","application":"経済データで『体重』と『身長』と『BMI』を同時に分析に入れるようなものです。BMIは他の2つから作れるため、情報として冗長になります。","tsukkomi":"線形従属なベクトルを行列の列に並べたとき、その行列の行列式はどうなりますか？","isImportant":false},{"id":523,"category":"5. 線形代数","title":"射影とは何ですか","definition":"あるベクトルに光を当てて、別の空間やベクトル上に落とした『影』。","explanation":"手持ちの情報を、特定の視点（軸）から見たときにどれくらいの大きさになるか、都合よく抽出する操作です。","application":"複雑な高次元データを2次元のグラフに分かりやすく表示する際など、情報を落として視覚化するのに使います。","tsukkomi":"落とした影と元のベクトルのズレ（誤差）を最小にする射影を何と呼びますか？","isImportant":false},{"id":524,"category":"5. 線形代数","title":"直交とは何ですか","definition":"ベクトルのなす角が90度で、互いに影響を与え合わない独立した関係。","explanation":"内積が0になる状態です。一方がどれだけ増減しても、もう一方の成分には一切干渉しないという強固な独立性を持ちます。","application":"無相関な（完全に別の動きをする）投資資産のペアを見つけるなど、リスク分散の極意を幾何学的に表したものです。","tsukkomi":"直交するベクトル同士は、必ず線形独立ですか？","isImportant":false},{"id":525,"category":"5. 線形代数","title":"行列のランク（階数）とは何ですか","definition":"行列の中に含まれる、互いに線形独立な（無駄のない）列ベクトルまたは行ベクトルの最大数。","explanation":"その行列が持っている「本当に有効な情報の次元数」のことです。重複した情報を削ぎ落とした後に残る本質的な情報量とも言えます。","application":"データセットの中に「体重」と「身長」と「BMI」のような重複情報（多重共線性）が含まれていないかを確認する指標になります。","tsukkomi":"3x3の正方行列でランクが2の場合、行列式はいくつになりますか？","isImportant":false},{"id":526,"category":"5. 線形代数","title":"ランクと連立方程式の解（Ax=b）にはどんな関係がありますか","definition":"係数行列Aと、拡大係数行列(A|b)のランクを比較することで解の有無を判定できる（ルーシェ・カペリの定理）。","explanation":"行列Aのランクと、目標bを付け足した行列のランクが等しければ解が存在します。さらに、そのランクが変数の数と同じなら解はただ1つに決まります。","application":"複雑な経済モデルの方程式を組んだ時に、計算を始める前に「そもそも答えが1つに決まるシステムなのか」を判定できます。","tsukkomi":"ランクが変数の数より少ない場合、方程式の解はどうなりますか？","isImportant":false},{"id":527,"category":"5. 線形代数","title":"内積とは何ですか","definition":"2つのベクトルが「どれくらい同じ方向を向いているか」を表すスカラー値。a・b = |a||b|cosθ","explanation":"片方のベクトルに光を当てて、もう片方のベクトルに落とした「影の長さ」を掛け合わせたものです。方向の類似度を示します。","application":"統計学の「共分散」や「相関係数」は、データをベクトルと見なした時の内積（とcosθ）そのものです。","tsukkomi":"内積が0のとき、2つのベクトルは幾何学的にどういう関係にありますか？","isImportant":true},{"id":601,"category":"6. 最小二乗・回帰","title":"最小二乗法とは何ですか","definition":"データと予測値のズレ（誤差）の二乗の合計を最も小さくする直線を引く手法。","explanation":"バラバラのデータ点の真ん中を通る、一番しっくりくる『トレンドライン』を引くための数学的な方法です。","application":"過去の売上データから将来の売上予測線を引くなど、経済予測モデルを構築する際の最も標準的な手法です。","tsukkomi":"なぜ『誤差の絶対値の和』ではなく『二乗和』を使うのですか？","isImportant":true},{"id":602,"category":"6. 最小二乗・回帰","title":"なぜ誤差を二乗するのですか","definition":"プラスとマイナスの相殺を防ぎ、大きなズレに重いペナルティを与えるため。","explanation":"二乗することで全てプラスになり、かつ、遠く外れた外れ値ほど二乗効果で数値が跳ね上がるため、大きな予測外しを厳しく防ぐ設計になっています。","application":"また、二乗すると綺麗な二次関数（下に凸）になるため、微分して最小値を求めるのが非常に簡単だからです。","tsukkomi":"外れ値（極端におかしなデータ）がある場合、最小二乗法の結果はどうなりやすいですか？","isImportant":false},{"id":603,"category":"6. 最小二乗・回帰","title":"なぜ微分して0にすると最小値になるのですか","definition":"誤差の二乗和が下に凸の二次関数（放物線）になるため。","explanation":"誤差を二乗して足し合わせた関数は、お椀のような形になります。なので、傾き（微分）が0の場所が確実に一番底（最小値）になるからです。","application":"目的関数が凸関数であるという性質を利用して、最適解を一発で求める解析的アプローチです。","tsukkomi":"パラメータが複数ある場合（重回帰など）は、どうやって微分しますか？","isImportant":false},{"id":604,"category":"6. 最小二乗・回帰","title":"微分で最小二乗法をどう解きますか","definition":"誤差関数を各パラメータ（傾きや切片）で偏微分し、=0の連立方程式を解く。","explanation":"傾きと切片、それぞれについて『ここを動かしても誤差が減らなくなった』という底のポイント（偏微分=0）を同時に満たす値を連立方程式で探します。","application":"機械学習のモデル学習において、最適な重み（パラメータ）を更新していく根本的な計算プロセスです。","tsukkomi":"この偏微分=0から導き出される連立方程式のことを何と呼びますか？","isImportant":false},{"id":605,"category":"6. 最小二乗・回帰","title":"射影と最小二乗法はどう関係しますか","definition":"最小二乗法は、目標データを説明変数の空間へ『直交射影』する操作そのもの。","explanation":"目標ベクトルに届かないときに、作れる範囲（平面）の中で『一番近い点（影）』を探す幾何学的な操作と同じ意味になります。","application":"統計的な予測を、空間上のベクトルと影の距離という視覚的なイメージで捉え直すことで、多変量解析の理解が深まります。","tsukkomi":"射影した予測値と、実際のデータとのズレのベクトルのことを統計で何と呼びますか？","isImportant":false},{"id":606,"category":"6. 最小二乗・回帰","title":"なぜ誤差が直交するのですか","definition":"平面内の点で目標に一番近い（最短距離）のは、垂直に下ろした点だから。","explanation":"ある点から床までの最短距離が、斜めではなく『真下（垂直）』に線を引いた長さになるのと同じ幾何学的な理由です。","application":"『残差（誤差）は説明変数と無相関（直交）になる』という回帰分析の重要な性質を証明しています。","tsukkomi":"残差ベクトルと、予測値ベクトルを内積するとどうなりますか？","isImportant":false},{"id":607,"category":"6. 最小二乗・回帰","title":"正規方程式とは何ですか","definition":"最小二乗法の最適パラメータを一発で求めるための、行列の連立方程式。","explanation":"偏微分=0 の条件を行列の形に整理した X^T X β = X^T y という式のことです。これを解けば最適な係数が求まります。","application":"複雑なループ計算をしなくても、逆行列の計算さえできれば一瞬で予測モデルが完成するため、実装上非常に強力です。","tsukkomi":"正規方程式を解くために、X^T X の逆行列を計算しますが、これが計算できないのはどんな時ですか？","isImportant":false},{"id":608,"category":"6. 最小二乗・回帰","title":"回帰分析とは何ですか","definition":"変数間の関係性を数式モデルに当てはめ、予測や要因分析を行う手法。","explanation":"『広告費をいくらかけたら、売上がいくら増えるか』という関係を一本の線や式で表し、見えない要因の強さを測る分析です。","application":"計量経済学の中心的なツールであり、経済理論が現実のデータに合致しているかを検証する際に不可欠です。","tsukkomi":"説明変数が1つの場合を単回帰分析と呼びますが、2つ以上ある場合は何と呼びますか？","isImportant":false},{"id":609,"category":"6. 最小二乗・回帰","title":"回帰分析と最小二乗法の違いは何ですか","definition":"回帰分析は『目的・分析手法』、最小二乗法はそのための『計算手段』。","explanation":"回帰分析という『関係性を調べたい』という目的を達成するために、直線を引く『計算テクニック』として最小二乗法を使っているという関係です。","application":"実務では、回帰分析の計算手段として、最小二乗法以外にも最尤法など別の数学アプローチをとることもあります。","tsukkomi":"誤差が正規分布に従うという前提を置いた場合、最小二乗法は別のどんな推定法と結果が一致しますか？","isImportant":false},{"id":610,"category":"6. 最小二乗・回帰","title":"相関とは何ですか","definition":"2つのデータがどれくらい連動して動くかを表す関係性の強さ。","explanation":"一方が増えた時にもう一方も増える（正の相関）、あるいは減る（負の相関）という、一緒に動く傾向のことです。","application":"ポートフォリオ理論において、相関の低い資産を組み合わせてリスクを打ち消し合う分散投資の基本概念です。","tsukkomi":"相関係数は、どの範囲の数値をとりますか？","isImportant":false},{"id":611,"category":"6. 最小二乗・回帰","title":"相関と因果はどう違いますか","definition":"相関は『一緒に動くこと』、因果は『Aが原因でBが起こること』。","explanation":"夏に『アイスの売上』と『水難事故』は同時に増えます（相関あり）が、アイスを食べたから事故が起きた（因果関係）わけではありません。","application":"データ分析で『見せかけの相関』に騙されて間違った経済政策や投資判断を下さないために、最も警戒すべき概念です。","tsukkomi":"このアイスと水難事故の例のように、両方に影響を与えている背後の要因（気温）のことを統計で何と呼びますか？","isImportant":true},{"id":701,"category":"7. 確率・統計","title":"確率とは何ですか","definition":"ある事象が起こる『期待される割合』や『不確実性の度合い』。","explanation":"サイコロの目のように、何度も繰り返したときに落ち着く割合（客観的確率）や、明日の株価が上がるという信念の強さ（主観的確率）を表します。","application":"不確実な未来に対して、リスク（確率分布）を数値化し、合理的な意思決定を行うための基礎言語です。","tsukkomi":"確率の合計は必ずいくつになりますか？","isImportant":false},{"id":709,"category":"7. 確率・統計","title":"信頼区間とは何ですか","definition":"『真の値はこの範囲に高確率で収まっているだろう』という幅を持たせた推定。","explanation":"『平均はズバリ50です』と言うのではなく、『95%の確率で45〜55の間にあります』と、バッファ（幅）を持たせて伝える方法です。","application":"経済成長率の予測などで、予測のブレ幅を提示することで、最悪のシナリオも想定した政策決定が可能になります。","tsukkomi":"『95%信頼区間』の95%という数字は、正確には何を意味していますか？","isImportant":false},{"id":710,"category":"7. 確率・統計","title":"確率変数とは何ですか","definition":"結果が出るまでどんな値をとるか分からないが、値ごとの「確率」が決まっている変数。","explanation":"代数の x や y は「決まった数字の代わり」ですが、確率変数は「サイコロの目」のように、振るたびに変わり、背後に確率のルール（確率分布）を背負っている変数です。","application":"株価や為替レートなど、明日の確実な値は分からないが、変動の確率分布は想定できるものをモデル化するのに不可欠です。","tsukkomi":"確率変数がとる値を全て足し合わせて、それぞれの確率を掛けたものを何と呼びますか？","isImportant":false},{"id":711,"category":"7. 確率・統計","title":"正規分布とはどんな分布ですか。なぜ重要なんですか。","definition":"平均を中心に左右対称な釣鐘型を描く確率分布。自然界や社会で最も頻繁に現れる。","explanation":"平均付近のデータが一番多く、そこから離れるほど極端に減っていく分布です。どんなデータでも数多く集めれば最終的にこの形に近づく（中心極限定理）ため、統計学の主役になります。","application":"データ分析や検定、金融工学のほとんどが、「誤差や変動は正規分布に従う」という前提で計算式が組まれています。","tsukkomi":"正規分布の形は、いくつのパラメータ（変数）だけで完全に決定されますか？","isImportant":true},{"id":712,"category":"7. 確率・統計","title":"仮説検定における「帰無仮説」と「対立仮説」とは何ですか","definition":"帰無仮説は「差がない」とする仮定。対立仮説は「差がある」と主張したい仮説。","explanation":"自分が見つけた「新しい薬の効果」などを証明したい時、あえて「効果なんてない（帰無仮説）」と仮定して、それが『確率的にあり得ない！』と矛盾を突くことで、自分の主張（対立仮説）を通すためのアプローチです。","application":"新しいマーケティング施策を打った時に、売上の増加が「単なる偶然」なのか「本当に施策の効果」なのかを白黒つけるのに使います。","tsukkomi":"本当は効果がない（帰無仮説が正しい）のに、間違って「効果がある！」と判断してしまうエラーを何エラーと呼びますか？","isImportant":false},{"id":713,"category":"7. 確率・統計","title":"有意水準（やp値）とは何ですか","definition":"有意水準は「帰無仮説を捨てる基準の確率」。p値は「帰無仮説が正しいと仮定した時に、今のデータが偶然得られる確率」。","explanation":"p値は「単なるまぐれでこんな結果になる確率」です。これが有意水準（例えば5%）より小さければ、「こんなまぐれは滅多に起きない。つまり仮説が間違っていたんだ！」と判定します。","application":"データ分析の結果をレポートする際、その結果が統計的に信頼できる（有意である）かどうかを客観的な数値で示すエビデンスになります。","tsukkomi":"p値が0.01だった場合、帰無仮説は棄却されますか、それとも採択されますか？（有意水準は5%とする）","isImportant":false},{"id":801,"category":"8. 微分方程式","title":"微分方程式とは何ですか","definition":"未知の「関数」と、その「導関数（微分）」が含まれている方程式。","explanation":"普通の方程式は x=3 のように「特定の数字」を当てるクイズですが、微分方程式は y=e^x のように、変化のルールから「元の関数の形そのもの」を当てるクイズです。","application":"経済成長モデル（ソロー・モデルなど）において、資本や人口が時間とともにどう変化し、最終的に定常状態に落ち着くのかという動学的なシミュレーションに使われます。","tsukkomi":"微分方程式を解く際に、初期の条件（t=0の時の値など）を与えないと、答えには何が含まれたままになりますか？","isImportant":true}];

    function touchedIds() {
      const ids = new Set();
      Object.values(state.dailyHistory).forEach(day => Object.keys(day || {}).forEach(id => ids.add(Number(id))));
      return ids;
    }

    function currentDayRecord() {
      return state.dailyHistory[state.selectedDate] || {};
    }

    function filteredData() {
      const touched = touchedIds();
      return quizData.filter(item => {
        if (state.showOnlyImportant && !item.isImportant) return false;
        if (state.showUntouchedOnly && touched.has(item.id)) return false;
        if (state.activeCategory !== 'すべて' && item.category !== state.activeCategory) return false;
        return true;
      });
    }

    function setStatus(id, status) {
      const day = { ...currentDayRecord() };
      day[id] = day[id] === status ? undefined : status;
      Object.keys(day).forEach(key => day[key] === undefined && delete day[key]);
      state.dailyHistory = { ...state.dailyHistory, [state.selectedDate]: day };
      saveProgress();
      render();
    }

    function renderTabs() {
      els.categoryTabs.innerHTML = categories.map(cat => `<button type="button" class="chip ${state.activeCategory === cat ? 'active' : ''}" data-category="${escapeHtml(cat)}">${escapeHtml(shortCategory(cat))}</button>`).join('');
      els.categoryTabs.querySelectorAll('button').forEach(button => {
        button.addEventListener('click', () => { state.activeCategory = button.dataset.category; render(); });
      });
    }

    function renderProgress() {
      const mastered = masteredIds();
      const pct = Math.round((mastered.size / quizData.length) * 100);
      els.progressPct.textContent = pct + '%';
      els.progressBar.style.width = pct + '%';
      els.progressCount.textContent = mastered.size + ' / ' + quizData.length + ' 問';
    }

    function renderCards() {
      const day = currentDayRecord();
      const data = filteredData();
      els.summary.textContent = data.length + '問を表示中 / 全' + quizData.length + '問';
      els.empty.classList.toggle('hidden', data.length !== 0);
      els.cardGrid.classList.toggle('hidden', data.length === 0);
      els.cardGrid.innerHTML = data.map(item => {
        const status = day[item.id];
        return `
          <article class="card ${status === 'mastered' ? 'mastered' : status === 'review' ? 'review' : ''}" data-open="${item.id}">
            <div class="card-head">
              <div class="badges">
                <span class="badge">${escapeHtml(shortCategory(item.category))}</span>
                ${item.isImportant ? '<span class="badge hot">最重要</span>' : ''}
              </div>
              <div class="status">
                <button class="icon-btn review ${status === 'review' ? 'on' : ''}" type="button" data-status="review" data-id="${item.id}" aria-label="要復習にする">△</button>
                <button class="icon-btn mastered ${status === 'mastered' ? 'on' : ''}" type="button" data-status="mastered" data-id="${item.id}" aria-label="覚えたにする">✓</button>
              </div>
            </div>
            <h2>${escapeHtml(item.title)}</h2>
            <p class="def">${escapeHtml(item.definition)}</p>
          </article>`;
      }).join('');
      els.cardGrid.querySelectorAll('[data-open]').forEach(card => card.addEventListener('click', () => openModal(Number(card.dataset.open))));
      els.cardGrid.querySelectorAll('[data-status]').forEach(button => {
        button.addEventListener('click', event => {
          event.stopPropagation();
          setStatus(Number(button.dataset.id), button.dataset.status);
        });
      });
    }

    function openModal(id) {
      state.selectedId = id;
      state.showTsukkomi = false;
      renderModal();
    }

    function closeModal() {
      state.selectedId = null;
      state.showTsukkomi = false;
      renderModal();
    }

    function renderModal() {
      const item = quizData.find(q => q.id === state.selectedId);
      if (!item) {
        els.modalRoot.innerHTML = '';
        document.body.style.overflow = '';
        return;
      }
      document.body.style.overflow = 'hidden';
      const day = currentDayRecord();
      const status = day[item.id];
      els.modalRoot.innerHTML = `
        <div class="modal-backdrop" id="modalBackdrop">
          <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <div class="modal-head">
              <div class="badges">
                <span class="badge">${escapeHtml(item.category)}</span>
                ${item.isImportant ? '<span class="badge hot">頻出</span>' : ''}
              </div>
              <button class="close" type="button" id="closeModal" aria-label="閉じる">×</button>
            </div>
            <div class="modal-body">
              <h2 id="modalTitle">${escapeHtml(item.title)}</h2>
              <div class="box">
                <p class="label">定義・公式の確認</p>
                <p class="answer">${escapeHtml(item.definition)}</p>
              </div>
              <div class="section">
                <p class="label rose">面接での口頭説明（例）</p>
                <p class="quote">「${escapeHtml(item.explanation)}」</p>
              </div>
              <div class="section">
                <p class="label indigo">経済・工学への応用視点</p>
                <p class="quote indigo">「${escapeHtml(item.application)}」</p>
              </div>
              <div class="deep">
                ${state.showTsukkomi ? `
                  <div class="tsukkomi">
                    <p class="label amber">面接官からの深掘り質問</p>
                    <p class="answer">「${escapeHtml(item.tsukkomi)}」</p>
                    <p class="note">この質問に対して、自分の言葉で短く打ち返す練習をしよう。</p>
                  </div>` : `
                  <button type="button" class="dash" id="showTsukkomi">面接官からの「ツッコミ」をシミュレーションする</button>`
                }
              </div>
            </div>
            <div class="modal-foot">
              <button type="button" class="action secondary" id="footerClose">閉じる</button>
              <div class="footer-actions">
                <button type="button" class="action review ${status === 'review' ? 'on' : ''}" data-modal-status="review">△ 詰まった</button>
                <button type="button" class="action mastered ${status === 'mastered' ? 'on' : ''}" data-modal-status="mastered">✓ 言えた</button>
              </div>
            </div>
          </section>
        </div>`;
      document.getElementById('modalBackdrop').addEventListener('click', event => { if (event.target.id === 'modalBackdrop') closeModal(); });
      document.getElementById('closeModal').addEventListener('click', closeModal);
      document.getElementById('footerClose').addEventListener('click', closeModal);
      const showButton = document.getElementById('showTsukkomi');
      if (showButton) showButton.addEventListener('click', () => { state.showTsukkomi = true; renderModal(); });
      els.modalRoot.querySelectorAll('[data-modal-status]').forEach(button => {
        button.addEventListener('click', () => { setStatus(item.id, button.dataset.modalStatus); closeModal(); });
      });
    }

    function render() {
      els.dateInput.value = state.selectedDate;
      els.importantBtn.classList.toggle('active', state.showOnlyImportant);
      els.untouchedBtn.classList.toggle('active', state.showUntouchedOnly);
      renderTabs();
      renderProgress();
      renderCards();
      if (state.selectedId) renderModal();
    }

    els.dateInput.addEventListener('change', event => { state.selectedDate = event.target.value || today(); render(); });
    els.importantBtn.addEventListener('click', () => { state.showOnlyImportant = !state.showOnlyImportant; render(); });
    els.untouchedBtn.addEventListener('click', () => { state.showUntouchedOnly = !state.showUntouchedOnly; render(); });
    window.addEventListener('keydown', event => { if (event.key === 'Escape') closeModal(); });
    render();
  </script>
</body>
</html>
